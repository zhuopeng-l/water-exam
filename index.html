<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>水安题库 · CloudBase 静态托管版</title>
    <!-- 腾讯云官方稳定 SDK -->
    <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
        :root{
            --bg:#f7f8fa;--card:#fff;--text:#1e2a3e;--text2:#5b6e8c;--border:#e2e8f0;
            --primary:#2c5f8a;--primary-light:#3b82f6;--success:#10b981;--danger:#ef4444;
            --warning:#f59e0b;--header:#0f2b3d;--sidebar-bg:#f1f5f9;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        [data-theme="dark"]{--bg:#121212;--card:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--border:#334155;--header:#0a1a2a;--sidebar-bg:#0f172a}
        [data-theme="eye-care"]{--bg:#e6f4e8;--card:#f0f7f0;--text:#2c3e2f;--text2:#4a6741;--border:#c0dbc0;--primary:#3c6e47;--primary-light:#5b8c5c;--success:#2e7d32;--danger:#c62828;--warning:#ef6c00;--header:#2b4d2f;--sidebar-bg:#d9ead9}
        body{background:var(--bg);color:var(--text);transition:background 0.2s,color 0.2s;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:16px;}
        .header{background:var(--header);color:#fff;padding:10px 12px;font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;flex-shrink:0;}
        .header-buttons{display:flex;gap:6px;flex-wrap:wrap;}
        .header-buttons button{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 12px;border-radius:24px;font-size:13px;cursor:pointer;transition:0.2s;white-space:nowrap;min-height:40px;}
        #importBtn{background:#3b82f6}#resetDefaultBtn{background:#f59e0b}#resetStatsBtn{background:#ef4444}#toggleChartBtn{background:#10b981}#toggleAnswerCardBtn{background:#8b5cf6}#clearWrongBtn{background:#f97316}
        .main-layout{display:flex;flex:1;overflow:hidden;padding:10px;gap:10px;min-height:0;position:relative;}
        .sidebar-left,.sidebar-right{width:300px;flex-shrink:0;background:var(--sidebar-bg);border-radius:20px;padding:14px;overflow-y:auto;transition:all 0.25s;border:1px solid var(--border);z-index:20;}
        .sidebar-left.show,.sidebar-right.show{display:block;}
        .main-content{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-width:0;padding-bottom:calc(20px + var(--safe-bottom));-webkit-overflow-scrolling:touch;}
        .stats-bar{background:var(--card);padding:8px 12px;border-radius:16px;margin-bottom:10px;border:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;}
        .modules{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
        .modules button{padding:12px 4px;border-radius:40px;border:none;background:var(--card);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:0.2s;min-height:48px;}
        .modules button.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 8px rgba(0,0,0,0.15);}
        .type-group{margin-bottom:12px;}.type-label{font-size:13px;color:var(--text2);margin-bottom:6px;}
        .tabs{display:flex;gap:6px;flex-wrap:wrap;}.tab{padding:10px 16px;border-radius:40px;background:var(--card);border:1px solid var(--border);font-size:14px;cursor:pointer;white-space:nowrap;min-height:44px;}
        .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
        .progress-bar{width:100%;height:6px;background:var(--border);border-radius:6px;margin-bottom:12px;}
        .progress{height:100%;background:var(--success);width:0%;transition:width 0.2s;}
        .timer{text-align:center;font-size:24px;font-weight:700;background:#fee2e2;color:#b91c1c;padding:12px;border-radius:40px;margin-bottom:12px;display:none;letter-spacing:2px;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
        .question-box{background:var(--card);border-radius:20px;padding:16px;margin-bottom:16px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04);}
        .q-index{font-size:13px;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between;}
        .q-title{font-size:18px;font-weight:600;line-height:1.45;margin-bottom:16px;}
        .answer-item{padding:14px 16px;border-radius:16px;border:1px solid var(--border);margin-bottom:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--card);transition:0.1s;min-height:56px;}
        .answer-item.selected{background:rgba(59,130,246,0.1)!important;border-color:var(--primary-light)!important;border-left:5px solid var(--primary-light);}
        .answer-item.right{background:#dcfce7!important;border-color:var(--success)!important;}
        .answer-item.wrong{background:#fee2e2!important;border-color:var(--danger)!important;}
        .answer-item.disabled{pointer-events:none;opacity:0.7;}
        .analyze{margin-top:16px;padding:14px;background:rgba(0,0,0,0.02);border-radius:14px;font-size:14px;border-left:3px solid var(--primary);display:none;}
        .analyze.show{display:block;}
        .toggle-analyze-btn{background:transparent;border:1px solid var(--border);color:var(--primary);padding:10px 18px;border-radius:30px;font-size:14px;cursor:pointer;margin-top:12px;display:inline-flex;align-items:center;gap:6px;}
        .action-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px;margin-bottom:4px;}
        .action-row button{padding:16px 6px;border-radius:60px;border:none;font-size:15px;font-weight:600;cursor:pointer;min-width:0;white-space:nowrap;}
        .btn-submit, .btn-confirm {grid-column: span 2;}
        .btn-prev{background:var(--card);border:1px solid var(--border);}
        .btn-next{background:var(--primary);color:#fff;}
        .btn-star{background:#fff7e6;color:#d97706;border:1px solid #fed7aa;}
        .btn-remove-wrong{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
        .btn-submit{background:var(--danger);color:#fff;}
        .btn-confirm{background:var(--success);color:#fff;display:none;}
        .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:8px;max-height:60vh;overflow-y:auto;padding:4px;}
        .card-item{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;background:#cbd5e1;min-height:44px;}
        .card-item.current{outline:3px solid var(--primary);outline-offset:1px;font-weight:700;}
        .exam-card-item.answered{background:#10b981;color:#fff;}
        .result-modal,.import-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px;}
        .result-box,.import-box{background:var(--card);width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px;border-radius:24px;}
        .import-box textarea{width:100%;height:180px;margin:12px 0;padding:12px;border-radius:16px;border:1px solid var(--border);background:var(--bg);}
        .file-import-area{display:flex;gap:12px;margin-bottom:10px;align-items:center;flex-wrap:wrap;}
        .file-import-area label{background:var(--primary);color:#fff;padding:10px 18px;border-radius:40px;cursor:pointer;font-size:14px;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 20px;border-radius:40px;font-size:14px;z-index:10001;display:none;}
        @media (max-width: 768px){
            .header{font-size:15px;padding:8px 10px;}
            .header-buttons button{padding:6px 10px;font-size:12px;}
            .modules{grid-template-columns:repeat(2,1fr);}
            .main-layout{padding:8px;gap:8px;}
            .sidebar-left,.sidebar-right{position:fixed;top:0;bottom:0;width:85%;max-width:320px;z-index:100;box-shadow:4px 0 16px rgba(0,0,0,0.15);border-radius:0;display:none;margin:0;height:100vh;padding-top:70px;}
            .sidebar-left{left:0;}.sidebar-right{right:0;}
            .sidebar-left.show,.sidebar-right.show{display:block;}
            .mobile-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:99;display:none;}
            .mobile-mask.show{display:block;}
            .action-row{grid-template-columns:repeat(2,1fr);}
            .btn-prev, .btn-next, .btn-star, .btn-remove-wrong {grid-column: span 1;}
            .btn-submit, .btn-confirm {grid-column: span 2;}
        }
        @media (max-width: 480px){.tabs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}.tab{flex-shrink:0;}}
        .hide{display:none!important;}
        .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;}
        .legend-color{width:20px;height:20px;border-radius:6px;}
        .auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:99999;padding:16px;}
        .auth-card{background:var(--card);border-radius:32px;padding:32px 24px;width:100%;max-width:400px;}
        .auth-tabs{display:flex;gap:8px;margin-bottom:24px;}
        .auth-tab{flex:1;text-align:center;padding:14px;border-radius:40px;background:var(--bg);color:var(--text2);font-weight:600;cursor:pointer;border:1px solid var(--border);}
        .auth-tab.active{background:var(--primary);color:#fff;}
        .auth-form{display:flex;flex-direction:column;gap:16px;}
        .auth-input{padding:16px;border-radius:40px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;outline:none;}
        .auth-btn{padding:16px;border-radius:40px;border:none;background:var(--primary);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;}
        .auth-error{color:var(--danger);font-size:13px;text-align:center;min-height:20px;}
        .logout-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;margin-left:8px;}
        .user-info{font-size:13px;margin-left:12px;opacity:0.9;}
    </style>
</head>
<body>
<div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
        <div class="auth-tabs"><div id="loginTab" class="auth-tab active">登录</div><div id="registerTab" class="auth-tab">注册</div></div>
        <div id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" class="auth-input" placeholder="邮箱" autocomplete="email">
            <input type="password" id="loginPassword" class="auth-input" placeholder="密码" autocomplete="current-password">
            <button id="loginBtn" class="auth-btn">登 录</button>
            <div id="loginError" class="auth-error"></div>
        </div>
        <div id="registerForm" class="auth-form" style="display:none;">
            <input type="email" id="regEmail" class="auth-input" placeholder="邮箱" autocomplete="email">
            <input type="password" id="regPassword" class="auth-input" placeholder="密码" autocomplete="new-password">
            <input type="password" id="regConfirm" class="auth-input" placeholder="确认密码">
            <button id="registerBtn" class="auth-btn">注 册</button>
            <div id="regError" class="auth-error"></div>
        </div>
        <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text2);">数据云端同步，多端一致</p>
    </div>
</div>

<div class="mobile-mask" id="mobileMask"></div>
<div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
        <span>💧 水安题库</span>
        <span id="currentUserDisplay" class="user-info"></span>
        <button id="logoutBtn" class="logout-btn" style="display:none;">🚪 退出</button>
    </div>
    <div class="header-buttons">
        <button id="themeToggle">🌙</button>
        <button id="toggleChartBtn">📊</button>
        <button id="toggleAnswerCardBtn">📋</button>
        <button id="importBtn">📂</button>
        <button id="resetDefaultBtn">🔄</button>
        <button id="resetStatsBtn">📊</button>
        <button id="clearWrongBtn">🗑️</button>
    </div>
</div>
<div class="main-layout">
    <div class="sidebar-left" id="sidebarLeft">
        <h3>📈 每日学习统计</h3>
        <div class="chart-container"><canvas id="dailyChart" width="300" height="150" style="width:100%;height:150px"></canvas></div>
        <div class="stats-summary" id="statsSummary"></div>
        <h3 style="margin-top:16px">📊 考试成绩趋势</h3>
        <div class="chart-container"><canvas id="scoreChart" width="300" height="130" style="width:100%;height:130px"></canvas></div>
        <div id="scoreStats" style="font-size:12px;text-align:center;margin-top:6px;color:var(--text2)"></div>
    </div>
    <div class="main-content">
        <div class="stats-bar" id="stats">加载题库…</div>
        <div class="modules">
            <button data-mode="normal">📘 练习</button><button data-mode="recite">📖 背题</button>
            <button data-mode="exam">📝 考试</button><button data-mode="wrong">🔁 错题</button>
            <button data-mode="star" style="grid-column:span 4">⭐ 收藏</button>
        </div>
        <div class="type-group"><div class="type-label">🔍 题型筛选：</div>
            <div class="tabs"><div class="tab active" data-type="all">全部</div><div class="tab" data-type="single">单选</div><div class="tab" data-type="multi">多选</div><div class="tab" data-type="judge">判断</div></div>
        </div>
        <div class="timer" id="timer">02:30:00</div>
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div class="question-box">
            <div class="q-index"><span id="qMeta">—</span></div>
            <div class="q-title" id="qTitle">加载题目中…</div>
            <div id="qOptions"></div>
            <div class="question-stats" id="qStats"></div>
            <div class="analyze" id="qAnalyze"><h4>📌 试题解析</h4><span id="analyzeContent"></span></div>
            <button id="toggleAnalyzeBtn" class="toggle-analyze-btn">🔍 查看解析</button>
        </div>
        <div class="action-row">
            <button class="btn-prev">◀ 上一题</button><button class="btn-next">下一题 ▶</button>
            <button class="btn-star" id="starBtn">⭐ 收藏</button><button class="btn-remove-wrong" id="removeWrongBtn">🗑️ 移出错题</button>
            <button class="btn-confirm" id="confirmAns">✅ 确认</button><button class="btn-submit" id="submitExam">📮 交卷</button>
        </div>
    </div>
    <div class="sidebar-right" id="sidebarRight">
        <h3>📋 答题卡</h3>
        <div class="legend" id="examLegend" style="display:none"><div class="legend-item"><div class="legend-color" style="background:#cbd5e1"></div>未答</div><div class="legend-item"><div class="legend-color" style="background:#10b981"></div>已答</div><div class="legend-item"><div class="legend-color" style="background:#3b82f6; outline:2px solid var(--primary)"></div>当前</div></div>
        <div id="cardGrid" class="card-grid"></div>
        <div id="examCardGrid" class="card-grid exam-card-grid" style="display:none"></div>
        <div style="margin-top:8px;font-size:12px;text-align:center;color:var(--text2)">点击题号跳转</div>
    </div>
</div>
<div class="result-modal" id="resultModal"><div class="result-box"><h2>📊 考试结果</h2><div class="score" id="finalScore">0分</div><p>总题数：<span id="totalQ"></span></p><p>正确：<span id="correctQ"></span></p><p>正确率：<span id="rate"></span>%</p><div id="examScoreDetail" class="exam-score-detail"></div><button onclick="closeResult()">继续学习</button></div></div>
<div id="importModal" class="import-modal"><div class="import-box"><h3>📥 导入题库</h3><div class="file-import-area"><label for="fileInput">📁 选择 .txt 文件</label><input type="file" id="fileInput" accept=".txt,.text/*" style="display:none;"></div><p>或粘贴文本：</p><textarea id="importTextArea" placeholder="1.题目…【判断】 正确答案：A 解析：..."></textarea><div><button id="confirmImportBtn" style="background:var(--success);color:#fff;padding:12px;border-radius:40px;width:100%;">确认导入</button><button id="cancelImportBtn" style="background:var(--border);margin-top:8px;width:100%;padding:12px;border-radius:40px;">取消</button></div></div></div>
<div id="toast" class="toast"></div>

<script>
    (function(){
        "use strict";
        // ************ 请替换为您的 CloudBase 环境 ID ************
        const ENV_ID = 'water-exam';  // 例如：water-exam-1a2b3c
        // ***********************************************

        // 检测 SDK 是否加载成功
        if (typeof tcb === 'undefined') {
            alert('网络异常，CloudBase SDK 加载失败。请刷新重试或检查网络。');
            return;
        }

        // 初始化 CloudBase
        const app = tcb.init({ env: ENV_ID });
        const auth = app.auth({ persistence: 'local' });
        const db = app.database();

        const DEFAULT_QUESTIONS_TEXT = `1.根据《职业病防治法》,职业病指企业、事业单位和个体经济组织等用人单位的劳动者在职业活动中，因接触粉尘、放射性物质和其他有毒、有害因素而引起的疾病。【判断】 正确答案：A 解析：符合《职业病防治法》对职业病的法定定义。
2.若患者确诊为职业病的，应当载明()等事项。□A.职业病的名称 □B.处理意见 □C.程度(期别) □D.诊断证明书保存建议 正确答案：A|B|C 解析：职业病诊断证明书需载明名称、期别、处理意见。
3.下列哪项不属于职业病危害因素？OA.粉尘 OB.噪声 OC.高温 OD.加班 正确答案：D 解析：加班不属于法定职业病危害因素。`;

        const $ = s => document.querySelector(s), $$ = s => document.querySelectorAll(s);
        const showToast = msg => { const t = $('#toast'); t.textContent = msg; t.style.display = 'block'; clearTimeout(window.toastTimer); window.toastTimer = setTimeout(() => t.style.display = 'none', 2000); };

        function parseQuestionsFromText(text) {
            const blocks = text.split(/(?=^\d+\.\s)/m).filter(b => b.trim());
            const qs = []; let id = 1;
            for (let block of blocks) {
                const hm = block.match(/^(\d+)\.\s*/); if (!hm) continue;
                let content = block.substring(hm[0].length).trim();
                let type = 'single';
                if (content.includes('【判断】')) type = 'judge';
                else if (content.includes('【多选】')) type = 'multi';
                else if (/□[A-D]\./.test(content)) type = 'multi';
                let ansRaw = '', analyze = '';
                const ansIdx = content.indexOf('正确答案：');
                if (ansIdx !== -1) {
                    const after = content.substring(ansIdx); content = content.substring(0, ansIdx).trim();
                    const am = after.match(/正确答案：\s*([A-D|]+)/i); if (am) ansRaw = am[1].toUpperCase();
                    const jm = after.match(/解析[：:]\s*(.+)/); if (jm) analyze = jm[1].trim();
                }
                let options = [];
                if (type === 'judge') options = ['正确', '错误'];
                else {
                    const re = /[O□]?([A-D])[\.、]\s*([^O□ABCD]+?)(?=\s*[O□]?[A-D][\.、]|正确答案|$)/g; let m;
                    while ((m = re.exec(content)) !== null) options.push(m[2].trim());
                    if (!options.length) { const parts = content.split(/\s*[O□]?[A-D][\.、]/); if (parts.length > 1) options = parts.slice(1).map(s => s.trim()).filter(s => s); }
                }
                if (!options.length) options = ['选项A', '选项B', '选项C', '选项D'].slice(0,4);
                let title = content.replace(/[O□]?[A-D][\.、][^正确答案]*/g, '').replace(/【判断】|【单选】|【多选】/g, '').trim();
                if (title.endsWith('()')) title = title.slice(0, -2);
                if (!title) title = '（题干）';
                let answer;
                if (type === 'judge') answer = (ansRaw === 'A' || ansRaw === '正确') ? 0 : 1;
                else if (type === 'single') { let code = ansRaw.charCodeAt(0) - 65; answer = (code >= 0 && code < options.length) ? code : 0; }
                else { let arr = ansRaw.includes('|') ? ansRaw.split('|').map(c => c.trim().charCodeAt(0) - 65) : ansRaw.split('').filter(c => /[A-D]/i.test(c)).map(c => c.toUpperCase().charCodeAt(0) - 65); answer = arr.filter(v => v >= 0 && v < options.length); if (!answer.length) answer = [0]; }
                qs.push({ id: id++, type, title, options, answer, analyze: analyze || '暂无解析', category: ['policy','technology','management','duty'][Math.floor(Math.random()*4)] });
            }
            return qs;
        }

        let currentUser = null, questions = [], userData = { questionsText: DEFAULT_QUESTIONS_TEXT, wrongList: [], starList: [], doneList: [], correctList: [], qStats: {}, examHistory: [], dailyStats: {} };
        let currentMode = 'normal', currentType = 'all', currentIndex = 0, filteredList = [];
        let examPaper = [], examFiltered = [], examFilterType = 'all', examAnswers = {};
        let examTimer = null, examSeconds = 9000;
        let userSelected = [], locked = false, leftVisible = false, rightVisible = false;
        let dailyChart, scoreChart;

        const authOverlay = $('#authOverlay'), logoutBtn = $('#logoutBtn');
        const cardGrid = $('#cardGrid'), examCardGrid = $('#examCardGrid');

        auth.onLoginStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                authOverlay.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                $('#currentUserDisplay').textContent = `👤 ${user.email}`;
                await loadUserData();
                initApp();
            } else {
                currentUser = null;
                authOverlay.style.display = 'flex';
                logoutBtn.style.display = 'none';
                $('#currentUserDisplay').textContent = '';
                $('#stats').innerHTML = '加载题库…';
                $('#qTitle').textContent = '加载题目中…';
                $('#qOptions').innerHTML = '';
            }
        });

        async function loadUserData() {
            if (!currentUser) return;
            try {
                const res = await db.collection('users').where({ uid: currentUser.uid }).get();
                if (res.data.length > 0) {
                    userData = res.data[0];
                } else {
                    await db.collection('users').add({ ...userData, uid: currentUser.uid });
                }
                questions = parseQuestionsFromText(userData.questionsText);
            } catch (e) { showToast('数据加载失败'); }
        }

        async function saveUserData(partial) {
            if (!currentUser) return;
            Object.assign(userData, partial);
            try {
                const res = await db.collection('users').where({ uid: currentUser.uid }).get();
                if (res.data.length > 0) {
                    await db.collection('users').doc(res.data[0]._id).update(userData);
                } else {
                    await db.collection('users').add({ ...userData, uid: currentUser.uid });
                }
            } catch (e) { showToast('保存失败'); }
        }

        $('#loginBtn').onclick = async () => {
            const email = $('#loginEmail').value.trim(), pwd = $('#loginPassword').value;
            try { await auth.signInWithEmailAndPassword(email, pwd); } catch (e) { $('#loginError').textContent = e.message; }
        };
        $('#registerBtn').onclick = async () => {
            const email = $('#regEmail').value.trim(), pwd = $('#regPassword').value, conf = $('#regConfirm').value;
            if (pwd !== conf) { $('#regError').textContent = '两次密码不一致'; return; }
            try { await auth.signUpWithEmailAndPassword(email, pwd); } catch (e) { $('#regError').textContent = e.message; }
        };
        logoutBtn.onclick = () => auth.signOut();
        $('#loginTab').onclick = () => { $('#loginTab').classList.add('active'); $('#registerTab').classList.remove('active'); $('#loginForm').style.display = 'flex'; $('#registerForm').style.display = 'none'; };
        $('#registerTab').onclick = () => { $('#registerTab').classList.add('active'); $('#loginTab').classList.remove('active'); $('#registerForm').style.display = 'flex'; $('#loginForm').style.display = 'none'; };

        function renderCharts() {
            if (!leftVisible) return;
            const dates = []; for (let i=6;i>=0;i--) { let d = new Date(); d.setDate(d.getDate()-i); dates.push(d.toISOString().slice(0,10)); }
            const totalData=[], correctData=[];
            dates.forEach(d => { const s = userData.dailyStats[d] || {total:0,correct:0}; totalData.push(s.total); correctData.push(s.correct); });
            const today = new Date().toISOString().slice(0,10), ts = userData.dailyStats[today] || {total:0,correct:0};
            $('#statsSummary').innerHTML = `<span>📚 今日:${ts.total}</span><span>✅ 正确:${ts.correct}</span><span>📊 正确率:${ts.total?Math.round(ts.correct/ts.total*100):0}%</span>`;
            const ctx1 = $('#dailyChart')?.getContext('2d');
            if(ctx1) { if(dailyChart) dailyChart.destroy(); dailyChart = new Chart(ctx1, {type:'bar', data:{labels:dates.map(d=>d.slice(5)), datasets:[{label:'答题总数',data:totalData},{label:'正确数',data:correctData}]}}); }
            const ctx2 = $('#scoreChart')?.getContext('2d');
            if(ctx2) { if(scoreChart) scoreChart.destroy(); const last10 = userData.examHistory.slice(-10); const scores = last10.map(h=>h.score); $('#scoreStats').innerHTML = `最近${scores.length}次 · 平均${scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):0}`; scoreChart = new Chart(ctx2, {type:'line', data:{labels:last10.map(h=>h.date.slice(5)), datasets:[{label:'成绩',data:scores,borderColor:'#f59e0b'}]}}); }
        }

        function renderAnswerCard() {
            if (currentMode === 'exam') return;
            if (!filteredList.length) { cardGrid.innerHTML = '<div>暂无题目</div>'; return; }
            let html = ''; filteredList.forEach((q,idx) => { const s = userData.qStats[q.id]; let bg = '#cbd5e1'; if (s && s.total) { const r = s.correct/s.total; if (r<0.6) bg='#ef4444'; else if (r<0.8) bg='#f59e0b'; else bg='#10b981'; } html += `<div class="card-item" data-index="${idx}" style="background:${bg}">${idx+1}</div>`; });
            cardGrid.innerHTML = html; const cur = cardGrid.querySelector(`[data-index="${currentIndex}"]`); if(cur) cur.classList.add('current');
        }
        cardGrid.addEventListener('click', e => { const c = e.target.closest('.card-item'); if (!c || currentMode==='exam') return; const idx = +c.dataset.index; if (!isNaN(idx) && idx>=0 && idx<filteredList.length) { currentIndex = idx; render(); if (rightVisible) renderAnswerCard(); } });
        function renderExamCard() {
            if (!examFiltered.length) { examCardGrid.innerHTML = ''; return; }
            let html = ''; examFiltered.forEach((q,idx) => { const ans = examAnswers[q.id]?.length > 0; html += `<div class="card-item exam-card-item" data-idx="${idx}" style="background:${ans?'#10b981':'#cbd5e1'}">${idx+1}</div>`; });
            examCardGrid.innerHTML = html; const cur = examCardGrid.querySelector(`[data-idx="${currentIndex}"]`); if(cur) cur.style.outline = '2px solid var(--primary)';
        }
        examCardGrid.addEventListener('click', e => { const c = e.target.closest('.card-item'); if (!c || currentMode!=='exam') return; const idx = +c.dataset.idx; if (!isNaN(idx) && idx>=0 && idx<examFiltered.length) { currentIndex = idx; renderExamQuestion(); } });

        function findFirstUnanswered(list, isExam=false) {
            if (!list.length) return 0;
            const idx = list.findIndex(q => isExam ? (!examAnswers[q.id] || examAnswers[q.id].length===0) : !userData.doneList.includes(q.id));
            return idx === -1 ? 0 : idx;
        }

        function renderExamQuestion() {
            if (!examFiltered.length) return; const q = examFiltered[currentIndex];
            $('#qTitle').innerHTML = q.title; $('#qMeta').innerHTML = `${ {single:'🔘单选', multi:'☑️多选', judge:'⚖️判断'}[q.type]} · ${currentIndex+1}/${examFiltered.length}`;
            $('#qOptions').innerHTML = q.options.map((opt,i) => `<div class="answer-item" data-i="${i}"><span>${String.fromCharCode(65+i)}.</span><span>${opt}</span></div>`).join('');
            $('#analyzeContent').innerHTML = q.analyze; $('#qAnalyze').classList.remove('show'); $('#toggleAnalyzeBtn').style.display = 'none';
            userSelected = examAnswers[q.id] ? [...examAnswers[q.id]] : [];
            $$('.answer-item').forEach((el,i) => el.classList.toggle('selected', userSelected.includes(i)));
            updateProgress(); renderExamCard();
        }

        function render() {
            if (currentMode === 'exam') return;
            updateStats(); if (!filteredList.length) { $('#qTitle').textContent = '暂无题目'; $('#qOptions').innerHTML = ''; return; }
            const q = filteredList[currentIndex];
            $('#qTitle').innerHTML = q.title; $('#qMeta').innerHTML = `${ {single:'🔘单选', multi:'☑️多选', judge:'⚖️判断'}[q.type]} · ${currentIndex+1}/${filteredList.length}`;
            $('#qOptions').innerHTML = q.options.map((opt,i) => `<div class="answer-item" data-i="${i}"><span>${String.fromCharCode(65+i)}.</span><span>${opt}</span></div>`).join('');
            $('#analyzeContent').innerHTML = q.analyze;
            const isPractice = (currentMode === 'normal' || currentMode === 'wrong' || currentMode === 'star');
            $('#toggleAnalyzeBtn').style.display = isPractice ? 'inline-flex' : 'none';
            $('#qAnalyze').classList.toggle('show', currentMode === 'recite');
            $('#toggleAnalyzeBtn').textContent = $('#qAnalyze').classList.contains('show') ? '🔍 隐藏解析' : '🔍 查看解析';
            const s = userData.qStats[q.id] || {total:0, correct:0};
            $('#qStats').innerHTML = `<span>📋 练习 ${s.total}次</span><span>✅ 正确 ${s.correct}</span><span>📈 正确率 ${s.total?Math.round(s.correct/s.total*100):0}%</span>`;
            updateProgress(); locked = false; userSelected = [];
            $('#confirmAns').style.display = q.type === 'multi' ? 'flex' : 'none';
            const items = $$('.answer-item'); items.forEach(el => el.classList.remove('disabled','right','wrong','selected'));
            if (currentMode === 'recite') { const correctIdx = Array.isArray(q.answer) ? q.answer : [q.answer]; items.forEach((el,i) => { if (correctIdx.includes(i)) el.classList.add('right'); el.classList.add('disabled'); }); }
            if (rightVisible && currentMode !== 'exam') renderAnswerCard();
        }

        function updateProgress() { const total = currentMode === 'exam' ? examFiltered.length : filteredList.length; $('#progress').style.width = total ? `${(currentIndex+1)/total*100}%` : '0%'; }
        function updateStats() {
            const typeIds = (currentType === 'all' ? questions : questions.filter(q => q.type === currentType)).map(q => q.id);
            const done = userData.doneList.filter(id => typeIds.includes(id)).length, correct = userData.correctList.filter(id => typeIds.includes(id)).length;
            $('#stats').innerHTML = `<span>📚 ${filteredList.length}题</span><span>✅已做:${done}</span><span>🎯正确率:${done?Math.round(correct/done*100):0}%</span>`;
        }

        async function recordAndJudge(q, selected) {
            if (locked) return;
            const isCorrect = Array.isArray(q.answer) ? JSON.stringify([...selected].sort()) === JSON.stringify([...q.answer].sort()) : selected[0] === q.answer;
            if (!userData.doneList.includes(q.id)) userData.doneList.push(q.id);
            if (isCorrect) { if (!userData.correctList.includes(q.id)) userData.correctList.push(q.id); userData.wrongList = userData.wrongList.filter(id => id !== q.id); }
            else { if (!userData.wrongList.includes(q.id)) userData.wrongList.push(q.id); }
            if (!userData.qStats[q.id]) userData.qStats[q.id] = {total:0, correct:0};
            userData.qStats[q.id].total++; if (isCorrect) userData.qStats[q.id].correct++;
            const today = new Date().toISOString().slice(0,10); if (!userData.dailyStats[today]) userData.dailyStats[today] = {total:0, correct:0};
            userData.dailyStats[today].total++; if (isCorrect) userData.dailyStats[today].correct++;
            await saveUserData({ doneList: userData.doneList, correctList: userData.correctList, wrongList: userData.wrongList, qStats: userData.qStats, dailyStats: userData.dailyStats });
            $('#qAnalyze').classList.add('show');
            const items = $$('.answer-item'), correctIdx = Array.isArray(q.answer) ? q.answer : [q.answer];
            items.forEach((el,i) => { el.classList.remove('right','wrong'); if (correctIdx.includes(i)) el.classList.add('right'); if (selected.includes(i) && !correctIdx.includes(i)) el.classList.add('wrong'); });
            locked = true; items.forEach(el => el.classList.add('disabled'));
            if (isCorrect && (q.type === 'single' || q.type === 'judge')) setTimeout(() => nextQ(), 500);
            updateStats();
        }

        function handleSelect(idx) {
            if (locked) return; const q = filteredList[currentIndex];
            if (q.type === 'single' || q.type === 'judge') { userSelected = [idx]; recordAndJudge(q, userSelected); }
            else { const pos = userSelected.indexOf(idx); pos > -1 ? userSelected.splice(pos,1) : userSelected.push(idx); $$('.answer-item').forEach((el,i) => el.classList.toggle('selected', userSelected.includes(i))); $('#confirmAns').style.display = 'flex'; }
        }

        function nextQ() {
            if (currentMode === 'exam' && examFiltered.length) { currentIndex = (currentIndex+1) % examFiltered.length; renderExamQuestion(); }
            else if (filteredList.length) { currentIndex = (currentIndex+1) % filteredList.length; render(); if (rightVisible) renderAnswerCard(); }
        }
        function prevQ() {
            if (currentMode === 'exam' && examFiltered.length) { currentIndex = (currentIndex-1+examFiltered.length) % examFiltered.length; renderExamQuestion(); }
            else if (filteredList.length) { currentIndex = (currentIndex-1+filteredList.length) % filteredList.length; render(); if (rightVisible) renderAnswerCard(); }
        }

        function filterQuestions() {
            let base = currentType === 'all' ? [...questions] : questions.filter(q => q.type === currentType);
            if (currentMode === 'wrong') base = base.filter(q => userData.wrongList.includes(q.id));
            if (currentMode === 'star') base = base.filter(q => userData.starList.includes(q.id));
            filteredList = base; currentIndex = findFirstUnanswered(filteredList); render(); if (rightVisible) renderAnswerCard();
        }

        function goMode(mode) {
            if (currentMode === 'exam' && mode !== 'exam' && !confirm('考试正在进行，确定退出？')) return;
            if (examTimer) { clearInterval(examTimer); examTimer = null; $('#timer').hide(); }
            $$('.modules button').forEach(b => b.classList.remove('active'));
            if (mode === 'exam') startExam();
            else {
                currentMode = mode;
                $('#submitExam').hide(); $('#starBtn,#removeWrongBtn').show();
                $(`.modules button[data-mode="${mode}"]`).classList.add('active');
                filterQuestions();
                $('#cardGrid').style.display = 'grid'; $('#examCardGrid,#examLegend').hide();
                $('#timer').hide();
            }
        }

        function generateExamPaper() {
            const pick = (pool, cnt) => { if (!pool.length) return []; const sh = [...pool]; for (let i=sh.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [sh[i],sh[j]]=[sh[j],sh[i]]; } if (sh.length>=cnt) return sh.slice(0,cnt); const res=[...sh]; while(res.length<cnt) res.push(...sh.slice(0,cnt-res.length)); return res; };
            return [...pick(questions.filter(q=>q.type==='single'),90), ...pick(questions.filter(q=>q.type==='multi'),20), ...pick(questions.filter(q=>q.type==='judge'),30)];
        }

        function startExam() {
            examPaper = generateExamPaper(); if (!examPaper.length) { showToast('题库不足'); goMode('normal'); return; }
            examAnswers = {}; examFilterType = 'all'; applyExamFilter(); currentMode = 'exam';
            $$('.modules button').forEach(b => b.classList.remove('active')); $('.modules button[data-mode="exam"]').classList.add('active');
            examSeconds = 9000; $('#timer').show(); updateTimerDisplay();
            $('#submitExam').show(); $('#confirmAns,#starBtn,#removeWrongBtn,#toggleAnalyzeBtn').hide();
            $('#cardGrid').hide(); $('#examCardGrid,#examLegend').show();
            $$('.tab').forEach(t => t.classList.remove('active')); $('.tab[data-type="all"]').classList.add('active');
            if (examTimer) clearInterval(examTimer);
            examTimer = setInterval(() => { if (examSeconds <= 0) { clearInterval(examTimer); alert('时间到'); submitExam(); } else { examSeconds--; updateTimerDisplay(); } }, 1000);
            renderExamQuestion();
        }
        function updateTimerDisplay() { const h = Math.floor(examSeconds/3600), m = Math.floor((examSeconds%3600)/60), s = examSeconds%60; $('#timer').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
        function applyExamFilter() { examFiltered = examFilterType === 'all' ? [...examPaper] : examPaper.filter(q => q.type === examFilterType); currentIndex = findFirstUnanswered(examFiltered, true); }
        function setExamFilter(type) { if (currentMode !== 'exam') return; examFilterType = type; applyExamFilter(); $$('.tab').forEach(t => t.classList.remove('active')); $(`.tab[data-type="${type}"]`).classList.add('active'); renderExamQuestion(); }

        async function submitExam() {
            if (!confirm('确定交卷？')) return; clearInterval(examTimer); $('#timer').hide();
            let correct = 0; const detail = {single:{c:0,t:0}, multi:{c:0,t:0}, judge:{c:0,t:0}};
            examPaper.forEach(q => { const ans = examAnswers[q.id] || []; const right = Array.isArray(q.answer) ? JSON.stringify([...ans].sort()) === JSON.stringify([...q.answer].sort()) : ans[0] === q.answer; if (right) correct++;
                if (q.type === 'single') { detail.single.t++; if (right) detail.single.c++; } else if (q.type === 'multi') { detail.multi.t++; if (right) detail.multi.c++; } else { detail.judge.t++; if (right) detail.judge.c++; }
                if (!userData.doneList.includes(q.id)) userData.doneList.push(q.id); if (right) { if (!userData.correctList.includes(q.id)) userData.correctList.push(q.id); } else { if (!userData.wrongList.includes(q.id)) userData.wrongList.push(q.id); }
                if (!userData.qStats[q.id]) userData.qStats[q.id] = {total:0, correct:0}; userData.qStats[q.id].total++; if (right) userData.qStats[q.id].correct++;
                const today = new Date().toISOString().slice(0,10); if (!userData.dailyStats[today]) userData.dailyStats[today] = {total:0, correct:0};
                userData.dailyStats[today].total++; if (right) userData.dailyStats[today].correct++;
            });
            const totalScore = detail.single.c*0.5 + detail.multi.c*2 + detail.judge.c*0.5;
            userData.examHistory.push({date: new Date().toISOString().slice(0,10), score: totalScore, total: examPaper.length});
            if (userData.examHistory.length > 30) userData.examHistory.shift();
            await saveUserData({ doneList: userData.doneList, correctList: userData.correctList, wrongList: userData.wrongList, qStats: userData.qStats, dailyStats: userData.dailyStats, examHistory: userData.examHistory });
            $('#finalScore').text(totalScore.toFixed(1)+'分'); $('#totalQ').text(examPaper.length); $('#correctQ').text(correct); $('#rate').text(((correct/examPaper.length)*100).toFixed(1));
            $('#resultModal').style.display = 'flex'; $('#cardGrid').show(); $('#examCardGrid,#examLegend').hide();
            if (leftVisible) renderCharts(); if (rightVisible) renderAnswerCard();
            currentMode = 'normal'; $$('.modules button').forEach(b => b.classList.remove('active')); $('.modules button[data-mode="normal"]').classList.add('active'); $('#submitExam').hide(); $('#starBtn,#removeWrongBtn').show();
        }
        window.closeResult = () => $('#resultModal').hide();

        async function importQuestionsFromText(txt) {
            if (!txt.trim()) { showToast('内容为空'); return false; } const qs = parseQuestionsFromText(txt); if (!qs.length) { showToast('解析失败'); return false; }
            questions = qs;
            await saveUserData({ questionsText: txt, wrongList: [], starList: [], doneList: [], correctList: [], qStats: {} });
            currentType='all'; $$('.tab').forEach(t=>t.classList.remove('active')); $('.tab[data-type="all"]').classList.add('active'); goMode('normal'); showToast(`导入成功 ${qs.length} 题`); return true;
        }

        function toggleLeft() { leftVisible=!leftVisible; $('#sidebarLeft').classList.toggle('show', leftVisible); $('#mobileMask').classList.toggle('show', leftVisible||rightVisible); $('#toggleChartBtn').textContent = leftVisible ? '📊↑' : '📊'; if(leftVisible) renderCharts(); }
        function toggleRight() { rightVisible=!rightVisible; $('#sidebarRight').classList.toggle('show', rightVisible); $('#mobileMask').classList.toggle('show', leftVisible||rightVisible); $('#toggleAnswerCardBtn').textContent = rightVisible ? '📋↑' : '📋'; if(rightVisible) currentMode==='exam'?renderExamCard():renderAnswerCard(); }
        $('#mobileMask').addEventListener('click', ()=>{ if(leftVisible) toggleLeft(); if(rightVisible) toggleRight(); });

        let theme = localStorage.getItem('theme')||'light';
        function applyTheme(t){ document.body.dataset.theme = t==='dark'?'dark':(t==='eye-care'?'eye-care':''); theme=t; localStorage.setItem('theme',t); $('#themeToggle').textContent = t==='light'?'🌙':(t==='dark'?'👁️':'☀️'); if(leftVisible) renderCharts(); }
        function cycleTheme(){ applyTheme(theme==='light'?'dark':(theme==='dark'?'eye-care':'light')); }

        function initApp() {
            if (!currentUser) return;
            questions = parseQuestionsFromText(userData.questionsText);
            $('.btn-prev').onclick = prevQ; $('.btn-next').onclick = nextQ;
            $('#starBtn').onclick = async () => { const id = filteredList[currentIndex]?.id; if(id){ const idx = userData.starList.indexOf(id); idx>-1 ? userData.starList.splice(idx,1) : userData.starList.push(id); await saveUserData({ starList: userData.starList }); updateStats(); render(); showToast(idx>-1?'取消收藏':'⭐已收藏'); } };
            $('#removeWrongBtn').onclick = async () => { const id = filteredList[currentIndex]?.id; if(id && userData.wrongList.includes(id)){ userData.wrongList = userData.wrongList.filter(i=>i!==id); await saveUserData({ wrongList: userData.wrongList }); filterQuestions(); showToast('已移出错题'); } };
            $('#confirmAns').onclick = () => { if(!locked){ const q=filteredList[currentIndex]; if(userSelected.length) recordAndJudge(q, userSelected); else alert('请选择'); $('#confirmAns').hide(); } };
            $('#submitExam').onclick = submitExam;
            $('#themeToggle').onclick = cycleTheme;
            $('#toggleChartBtn').onclick = toggleLeft; $('#toggleAnswerCardBtn').onclick = toggleRight;
            $('#clearWrongBtn').onclick = async () => { if(confirm('清空错题本？')){ userData.wrongList=[]; await saveUserData({ wrongList }); if(currentMode==='wrong') filterQuestions(); else updateStats(); showToast('已清空'); } };
            $$('.modules button').forEach(b => b.onclick = () => goMode(b.dataset.mode));
            $$('.tab').forEach(t => t.onclick = () => { const type=t.dataset.type; if(currentMode==='exam') setExamFilter(type); else { $$('.tab').forEach(tb=>tb.classList.remove('active')); t.classList.add('active'); currentType=type; filterQuestions(); } });
            $('#qOptions').addEventListener('click', e => { const item = e.target.closest('.answer-item'); if(!item) return; const idx = +item.dataset.i;
                if(currentMode==='exam'){ const q=examFiltered[currentIndex]; if(q.type==='single'||q.type==='judge') userSelected=[idx]; else { const p=userSelected.indexOf(idx); p>-1?userSelected.splice(p,1):userSelected.push(idx); } examAnswers[q.id]=[...userSelected]; $$('.answer-item').forEach((el,i)=>el.classList.toggle('selected', userSelected.includes(i))); renderExamCard(); }
                else if(currentMode!=='recite') handleSelect(idx);
            });
            $('#toggleAnalyzeBtn').onclick = () => { const a=$('#qAnalyze'); a.classList.toggle('show'); $('#toggleAnalyzeBtn').textContent = a.classList.contains('show')?'🔍 隐藏解析':'🔍 查看解析'; };
            $('#importBtn').onclick = () => $('#importModal').show();
            $('#resetDefaultBtn').onclick = async () => { if(confirm('恢复默认题库？')){ await saveUserData({ questionsText: DEFAULT_QUESTIONS_TEXT, wrongList:[], starList:[], doneList:[], correctList:[], qStats:{} }); questions=parseQuestionsFromText(DEFAULT_QUESTIONS_TEXT); goMode('normal'); showToast('已恢复'); } };
            $('#resetStatsBtn').onclick = async () => { if(confirm('重置统计？')){ userData.dailyStats={}; userData.examHistory=[]; await saveUserData({ dailyStats: {}, examHistory: [] }); if(leftVisible) renderCharts(); showToast('已重置'); } };
            $('#cancelImportBtn').onclick = () => $('#importModal').hide();
            $('#confirmImportBtn').onclick = async () => { const txt = $('#importTextArea').value.trim(); if(await importQuestionsFromText(txt)){ $('#importModal').hide(); $('#importTextArea').value=''; } };
            $('#fileInput').onchange = e => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = async ev => { if(await importQuestionsFromText(ev.target.result)) $('#importModal').hide(); }; r.readAsText(f,'UTF-8'); };
            window.addEventListener('click', e => { if(e.target === $('#importModal')) $('#importModal').hide(); });

            goMode('normal');
            applyTheme(theme);
            setInterval(() => { if(leftVisible) renderCharts(); }, 600000);
        }
    })();
</script>
</body>
</html>
