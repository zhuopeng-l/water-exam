<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>水安题库 · CloudBase 云端同步版</title>
    <!-- CloudBase SDK -->
    <script src="https://web.sdk.qcloud.com/tcb/3.6.0/tcb.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
        :root{
            --bg:#f7f8fa;--card:#fff;--text:#1e2a3e;--text2:#5b6e8c;--border:#e2e8f0;
            --primary:#2c5f8a;--primary-light:#3b82f6;--success:#10b981;--danger:#ef4444;
            --warning:#f59e0b;--header:#0f2b3d;--sidebar-bg:#f1f5f9;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        [data-theme="dark"]{--bg:#121212;--card:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--border:#334155;--header:#0a1a2a;--sidebar-bg:#0f172a}
        [data-theme="eye-care"]{--bg:#e6f4e8;--card:#f0f7f0;--text:#2c3e2f;--text2:#4a6741;--border:#c0dbc0;--primary:#3c6e47;--primary-light:#5b8c5c;--success:#2e7d32;--danger:#c62828;--warning:#ef6c00;--header:#2b4d2f;--sidebar-bg:#d9ead9}
        body{background:var(--bg);color:var(--text);transition:background 0.2s,color 0.2s;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:16px;}
        .header{background:var(--header);color:#fff;padding:10px 12px;font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;flex-shrink:0;}
        .header-buttons{display:flex;gap:6px;flex-wrap:wrap;}
        .header-buttons button{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 12px;border-radius:24px;font-size:13px;cursor:pointer;transition:0.2s;white-space:nowrap;min-height:40px;}
        #importBtn{background:#3b82f6}#resetDefaultBtn{background:#f59e0b}#resetStatsBtn{background:#ef4444}#toggleChartBtn{background:#10b981}#toggleAnswerCardBtn{background:#8b5cf6}#clearWrongBtn{background:#f97316}
        .main-layout{display:flex;flex:1;overflow:hidden;padding:10px;gap:10px;min-height:0;position:relative;}
        .sidebar-left,.sidebar-right{width:300px;flex-shrink:0;background:var(--sidebar-bg);border-radius:20px;padding:14px;overflow-y:auto;transition:all 0.25s;border:1px solid var(--border);z-index:20;}
        .sidebar-left.show,.sidebar-right.show{display:block;}
        .main-content{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-width:0;padding-bottom:calc(20px + var(--safe-bottom));-webkit-overflow-scrolling:touch;}
        .stats-bar{background:var(--card);padding:8px 12px;border-radius:16px;margin-bottom:10px;border:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;}
        .modules{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
        .modules button{padding:12px 4px;border-radius:40px;border:none;background:var(--card);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:0.2s;min-height:48px;}
        .modules button.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 8px rgba(0,0,0,0.15);}
        .type-group{margin-bottom:12px;}.type-label{font-size:13px;color:var(--text2);margin-bottom:6px;}
        .tabs{display:flex;gap:6px;flex-wrap:wrap;}.tab{padding:10px 16px;border-radius:40px;background:var(--card);border:1px solid var(--border);font-size:14px;cursor:pointer;white-space:nowrap;min-height:44px;}
        .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
        .progress-bar{width:100%;height:6px;background:var(--border);border-radius:6px;margin-bottom:12px;}
        .progress{height:100%;background:var(--success);width:0%;transition:width 0.2s;}
        .timer{text-align:center;font-size:24px;font-weight:700;background:#fee2e2;color:#b91c1c;padding:12px;border-radius:40px;margin-bottom:12px;display:none;letter-spacing:2px;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
        .question-box{background:var(--card);border-radius:20px;padding:16px;margin-bottom:16px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04);}
        .q-index{font-size:13px;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between;}
        .q-title{font-size:18px;font-weight:600;line-height:1.45;margin-bottom:16px;}
        .answer-item{padding:14px 16px;border-radius:16px;border:1px solid var(--border);margin-bottom:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--card);transition:0.1s;min-height:56px;}
        .answer-item.selected{background:rgba(59,130,246,0.1)!important;border-color:var(--primary-light)!important;border-left:5px solid var(--primary-light);}
        .answer-item.right{background:#dcfce7!important;border-color:var(--success)!important;}
        .answer-item.wrong{background:#fee2e2!important;border-color:var(--danger)!important;}
        .answer-item.disabled{pointer-events:none;opacity:0.7;}
        .analyze{margin-top:16px;padding:14px;background:rgba(0,0,0,0.02);border-radius:14px;font-size:14px;border-left:3px solid var(--primary);display:none;}
        .analyze.show{display:block;}
        .toggle-analyze-btn{background:transparent;border:1px solid var(--border);color:var(--primary);padding:10px 18px;border-radius:30px;font-size:14px;cursor:pointer;margin-top:12px;display:inline-flex;align-items:center;gap:6px;}
        .action-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px;margin-bottom:4px;}
        .action-row button{padding:16px 6px;border-radius:60px;border:none;font-size:15px;font-weight:600;cursor:pointer;min-width:0;white-space:nowrap;}
        .btn-submit, .btn-confirm {grid-column: span 2;}
        .btn-prev{background:var(--card);border:1px solid var(--border);}
        .btn-next{background:var(--primary);color:#fff;}
        .btn-star{background:#fff7e6;color:#d97706;border:1px solid #fed7aa;}
        .btn-remove-wrong{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
        .btn-submit{background:var(--danger);color:#fff;}
        .btn-confirm{background:var(--success);color:#fff;display:none;}
        .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:8px;max-height:60vh;overflow-y:auto;padding:4px;}
        .card-item{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;background:#cbd5e1;min-height:44px;}
        .card-item.current{outline:3px solid var(--primary);outline-offset:1px;font-weight:700;}
        .exam-card-item.answered{background:#10b981;color:#fff;}
        .result-modal,.import-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px;}
        .result-box,.import-box{background:var(--card);width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px;border-radius:24px;}
        .import-box textarea{width:100%;height:180px;margin:12px 0;padding:12px;border-radius:16px;border:1px solid var(--border);background:var(--bg);}
        .file-import-area{display:flex;gap:12px;margin-bottom:10px;align-items:center;flex-wrap:wrap;}
        .file-import-area label{background:var(--primary);color:#fff;padding:10px 18px;border-radius:40px;cursor:pointer;font-size:14px;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 20px;border-radius:40px;font-size:14px;z-index:10001;display:none;}
        @media (max-width: 768px){
            .header{font-size:15px;padding:8px 10px;}
            .header-buttons button{padding:6px 10px;font-size:12px;}
            .modules{grid-template-columns:repeat(2,1fr);}
            .main-layout{padding:8px;gap:8px;}
            .sidebar-left,.sidebar-right{position:fixed;top:0;bottom:0;width:85%;max-width:320px;z-index:100;box-shadow:4px 0 16px rgba(0,0,0,0.15);border-radius:0;display:none;margin:0;height:100vh;padding-top:70px;}
            .sidebar-left{left:0;}.sidebar-right{right:0;}
            .sidebar-left.show,.sidebar-right.show{display:block;}
            .mobile-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:99;display:none;}
            .mobile-mask.show{display:block;}
            .action-row{grid-template-columns:repeat(2,1fr);}
            .btn-prev, .btn-next, .btn-star, .btn-remove-wrong {grid-column: span 1;}
            .btn-submit, .btn-confirm {grid-column: span 2;}
        }
        @media (max-width: 480px){.tabs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}.tab{flex-shrink:0;}}
        .hide{display:none!important;}
        .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;}
        .legend-color{width:20px;height:20px;border-radius:6px;}
        .auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:99999;padding:16px;}
        .auth-card{background:var(--card);border-radius:32px;padding:32px 24px;width:100%;max-width:400px;}
        .auth-tabs{display:flex;gap:8px;margin-bottom:24px;}
        .auth-tab{flex:1;text-align:center;padding:14px;border-radius:40px;background:var(--bg);color:var(--text2);font-weight:600;cursor:pointer;border:1px solid var(--border);}
        .auth-tab.active{background:var(--primary);color:#fff;}
        .auth-form{display:flex;flex-direction:column;gap:16px;}
        .auth-input{padding:16px;border-radius:40px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;outline:none;}
        .auth-btn{padding:16px;border-radius:40px;border:none;background:var(--primary);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;}
        .auth-error{color:var(--danger);font-size:13px;text-align:center;min-height:20px;}
        .logout-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;margin-left:8px;}
        .user-info{font-size:13px;margin-left:12px;opacity:0.9;}
    </style>
</head>
<body>
<div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
        <div class="auth-tabs"><div id="loginTab" class="auth-tab active">登录</div><div id="registerTab" class="auth-tab">注册</div></div>
        <div id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" class="auth-input" placeholder="邮箱" autocomplete="email">
            <input type="password" id="loginPassword" class="auth-input" placeholder="密码" autocomplete="current-password">
            <button id="loginBtn" class="auth-btn">登 录</button>
            <div id="loginError" class="auth-error"></div>
        </div>
        <div id="registerForm" class="auth-form" style="display:none;">
            <input type="email" id="regEmail" class="auth-input" placeholder="邮箱" autocomplete="email">
            <input type="password" id="regPassword" class="auth-input" placeholder="密码" autocomplete="new-password">
            <input type="password" id="regConfirm" class="auth-input" placeholder="确认密码">
            <button id="registerBtn" class="auth-btn">注 册</button>
            <div id="regError" class="auth-error"></div>
        </div>
        <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text2);">数据云端同步，多端一致</p>
    </div>
</div>

<div class="mobile-mask" id="mobileMask"></div>
<div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
        <span>💧 水安题库</span>
        <span id="currentUserDisplay" class="user-info"></span>
        <button id="logoutBtn" class="logout-btn" style="display:none;">🚪 退出</button>
    </div>
    <div class="header-buttons">
        <button id="themeToggle">🌙</button>
        <button id="toggleChartBtn">📊</button>
        <button id="toggleAnswerCardBtn">📋</button>
        <button id="importBtn">📂</button>
        <button id="resetDefaultBtn">🔄</button>
        <button id="resetStatsBtn">📊</button>
        <button id="clearWrongBtn">🗑️</button>
    </div>
</div>
<div class="main-layout">
    <div class="sidebar-left" id="sidebarLeft">
        <h3>📈 每日学习统计</h3>
        <div class="chart-container"><canvas id="dailyChart" width="300" height="150" style="width:100%;height:150px"></canvas></div>
        <div class="stats-summary" id="statsSummary"></div>
        <h3 style="margin-top:16px">📊 考试成绩趋势</h3>
        <div class="chart-container"><canvas id="scoreChart" width="300" height="130" style="width:100%;height:130px"></canvas></div>
        <div id="scoreStats" style="font-size:12px;text-align:center;margin-top:6px;color:var(--text2)"></div>
    </div>
    <div class="main-content">
        <div class="stats-bar" id="stats">加载题库…</div>
        <div class="modules">
            <button data-mode="normal">📘 练习</button><button data-mode="recite">📖 背题</button>
            <button data-mode="exam">📝 考试</button><button data-mode="wrong">🔁 错题</button>
            <button data-mode="star" style="grid-column:span 4">⭐ 收藏</button>
        </div>
        <div class="type-group"><div class="type-label">🔍 题型筛选：</div>
            <div class="tabs"><div class="tab active" data-type="all">全部</div><div class="tab" data-type="single">单选</div><div class="tab" data-type="multi">多选</div><div class="tab" data-type="judge">判断</div></div>
        </div>
        <div class="timer" id="timer">02:30:00</div>
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div class="question-box">
            <div class="q-index"><span id="qMeta">—</span></div>
            <div class="q-title" id="qTitle">加载题目中…</div>
            <div id="qOptions"></div>
            <div class="question-stats" id="qStats"></div>
            <div class="analyze" id="qAnalyze"><h4>📌 试题解析</h4><span id="analyzeContent"></span></div>
            <button id="toggleAnalyzeBtn" class="toggle-analyze-btn">🔍 查看解析</button>
        </div>
        <div class="action-row">
            <button class="btn-prev">◀ 上一题</button><button class="btn-next">下一题 ▶</button>
            <button class="btn-star" id="starBtn">⭐ 收藏</button><button class="btn-remove-wrong" id="removeWrongBtn">🗑️ 移出错题</button>
            <button class="btn-confirm" id="confirmAns">✅ 确认</button><button class="btn-submit" id="submitExam">📮 交卷</button>
        </div>
    </div>
    <div class="sidebar-right" id="sidebarRight">
        <h3>📋 答题卡</h3>
        <div class="legend" id="examLegend" style="display:none"><div class="legend-item"><div class="legend-color" style="background:#cbd5e1"></div>未答</div><div class="legend-item"><div class="legend-color" style="background:#10b981"></div>已答</div><div class="legend-item"><div class="legend-color" style="background:#3b82f6; outline:2px solid var(--primary)"></div>当前</div></div>
        <div id="cardGrid" class="card-grid"></div>
        <div id="examCardGrid" class="card-grid exam-card-grid" style="display:none"></div>
        <div style="margin-top:8px;font-size:12px;text-align:center;color:var(--text2)">点击题号跳转</div>
    </div>
</div>
<div class="result-modal" id="resultModal"><div class="result-box"><h2>📊 考试结果</h2><div class="score" id="finalScore">0分</div><p>总题数：<span id="totalQ"></span></p><p>正确：<span id="correctQ"></span></p><p>正确率：<span id="rate"></span>%</p><div id="examScoreDetail" class="exam-score-detail"></div><button onclick="closeResult()">继续学习</button></div></div>
<div id="importModal" class="import-modal"><div class="import-box"><h3>📥 导入题库</h3><div class="file-import-area"><label for="fileInput">📁 选择 .txt 文件</label><input type="file" id="fileInput" accept=".txt,.text/*" style="display:none;"></div><p>或粘贴文本：</p><textarea id="importTextArea" placeholder="1.题目…【判断】 正确答案：A 解析：..."></textarea><div><button id="confirmImportBtn" style="background:var(--success);color:#fff;padding:12px;border-radius:40px;width:100%;">确认导入</button><button id="cancelImportBtn" style="background:var(--border);margin-top:8px;width:100%;padding:12px;border-radius:40px;">取消</button></div></div></div>
<div id="toast" class="toast"></div>

<script>
    (function(){
        "use strict";
        // ************ 请替换为您的 CloudBase 环境 ID ************
        const ENV_ID = 'water-exam';  // 例如：water-exam-1a2b3c
        // ***********************************************

        // 初始化 CloudBase
        const app = tcb.init({ env: ENV_ID });
        const auth = app.auth({ persistence: 'local' });
        const db = app.database();

        const DEFAULT_QUESTIONS_TEXT = `1. 根据《职业病防治法》, 职业病指企业、事业单位和个体经济组织等用人单位的劳动者在职业活动中，因接触粉尘、放射性物质和其他有毒、有害因素而引起的疾病。【判断】 正确答案：A 解析：符合《职业病防治法》对职业病的法定定义。
2. 若患者确诊为职业病的，应当载明 () 等事项。【多选】 □A. 职业病的名称 □B. 处理意见 □C. 程度 (期别) □D. 诊断证明书保存建议 正确答案：A|B|C 解析：职业病诊断证明书需载明名称、期别、处理意见，无保存建议相关要求。
3. 对于疑似职业病病人，用人单位应当及时安排对其进行诊断；疑似职业病病人在诊断、医学观察期间的费用，由政府承担。【判断】 正确答案：B 解析：疑似职业病诊断、观察费用由用人单位承担，非政府承担。
4. 职业病诊断应当依据职业病诊断标准，结合 () 等资料，综合分析其疾病的特征和发展变化是否符合相应的职业病特征、发生、发展规律和流行病学规律，做出诊断结论。【多选】 □A. 职业病危害接触史 □B. 工作场所职业病危害因素检测与评价 □C. 临床表现 □D. 医学检查结果 正确答案：A|B|C|D 解析：职业病诊断需综合接触史、场所检测、临床表现、医学检查四类资料。
5. 参加诊断的职业病诊断医师可以弃权。【判断】 正确答案：B 解析：职业病诊断医师需独立出具诊断意见，不得弃权。
6. 职业病诊断机构应当建立职业病诊断档案并永久保存，其中档案包括 ()。【多选】 □A. 职业病诊断证明书 □B. 职业病诊断过程记录 □C. 用人单位、劳动者和相关部门、机构提交的有关资料 □D. 临床检查与实验室检验资料 正确答案：A|B|C|D 解析：职业病诊断档案需包含证明书、诊断记录、提交资料、检查检验资料。
7. 职业病病因 (即职业危害因素) 明确，在控制病因或作用条件后，可以消除和减少发病。【判断】 正确答案：A 解析：职业病病因明确，控制危害因素可降低发病概率。
8. 下列情形中，职业病诊断鉴定委员会专家应当回避的是 ()。【多选】 □A. 职业病诊断鉴定当事人或者当事人近亲属的 □B. 与职业病诊断鉴定有利害关系的 □C. 与职业病诊断鉴定当事人有其他关系，可能影响公正鉴定的 □D. 以上都不对 正确答案：A|B|C 解析：鉴定专家存在亲属关系、利害关系、其他影响公正关系时需回避。
9. 职业病诊断证明书应当由参加诊断的医师共同签署，并经职业病诊断机构审核盖章。【判断】 正确答案：A 解析：诊断证明书需医师共同签署、机构盖章才有效。
10. 职业病诊断证明书的格式由卫生部统一规定。【判断】 正确答案：A 解析：职业病诊断证明书格式由国家卫生部统一制定。
11. 职业病如能早期诊断，进行及时处理和治疗，康复容易。【判断】 正确答案：A 解析：职业病早期发现、干预，治疗康复效果更好。
12. 职业病诊断鉴定书应包含 ()。【多选】 □A. 劳动者、用人单位的基本情况及鉴定事由 □B. 参加鉴定的专家情况 □C. 鉴定结论及其依据 □D. 鉴定时间 正确答案：A|B|C|D 解析：鉴定书需包含双方信息、专家情况、结论依据、鉴定时间。
13. 根据《职业病防治法》, 职业病指 () 等用人单位的劳动者在职业活动中，因接触粉尘、放射性物质和其他有毒、有害因素而引起的疾病。【多选】 □A. 企业 □B. 事业单位 □C. 个体经济组织 □D. 小卖部 正确答案：A|B|C 解析：法定用人单位为企业、事业单位、个体经济组织，小卖部不属于。
14. 设区的县级卫生行政部门组织的职业病诊断鉴定委员会负责职业病诊断争议的首次鉴定。【判断】 正确答案：B 解析：首次鉴定由设区的市级卫生行政部门组织，非县级。
15. 对于没有参加工伤社会保险的，其医疗和生活保障由造成职业病的用人单位承担。【判断】 正确答案：A 解析：未参保工伤险的职业病患者，保障由用人单位承担。
16. 劳动者可以在 () 依法承担职业病诊断的医疗卫生机构进行职业病诊断。【多选】 □A. 用人单位所在地 □B. 本人户籍所在地 □C. 经常居住地 □D. 任意地方 正确答案：A|B|C 解析：劳动者可在单位所在地、户籍所在地、经常居住地诊断，不可任意选择。
17. 下列描述法定职业病必须具备条件中说法正确的是 ()。【多选】 □A. 患病主体为企业、事业单位或个体经济组织的劳动者 □B. 须是因接触粉尘、放射性物质和其他有毒、有害物质等职业病危害因素引起的 □C. 在从事职业活动的过程中产生的 □D. 须是国家公布的职业病分类和目录所列的职业病 正确答案：A|B|C|D 解析：法定职业病需同时满足主体、病因、场景、目录四项条件。
18. 职业病诊断机构做出职业病诊断后，应当向当事人出具职业病诊断证明书。【判断】 正确答案：A 解析：诊断机构完成诊断后，必须向当事人出具证明书。

20. 对已诊断为职业病的病人，用人单位应当按照国家有关规定，安排职业病病人进行治疗、康复和定期检查。【判断】 正确答案：A 解析：用人单位有义务为职业病患者安排治疗、康复与检查。
21. 职业病诊断机构在进行职业病诊断时，诊断医师对诊断结论有意见分歧的，应当根据半数以上诊断医师的一致意见形成诊断结论，对不同意见应当如实记录。【判断】 正确答案：A 解析：诊断意见分歧时，按半数以上医师意见定结论，不同意见需记录。
22. 对于疑似职业病病人，用人单位应当及时安排对其进行诊断；疑似职业病病人在诊断、医学观察期间的费用，由用人单位承担。【判断】 正确答案：A 解析：疑似职业病诊断、观察费用法定由用人单位承担。
23. 职业病诊断需要 () 资料。【多选】 □A. 劳动者职业史和职业病危害接触史 □B. 劳动者职业健康检查结果 □C. 工作场所职业病危害因素检测结果 □D. 职业性放射性疾病诊断还需要个人剂量监测档案等资料 正确答案：A|B|C|D 解析：职业病诊断需职业史、健康检查、场所检测，放射病还需剂量档案。
24. 当事人对职业病诊断有异议的，在接到职业病诊断证明书之日起 45 日内，可以向做出诊断的医疗卫生机构所在地设区的市级卫生行政部门申请鉴定。【判断】 正确答案：B 解析：对诊断异议需在30 日内申请市级鉴定，非 45 日。
25. 职业病人依法享受国家规定的职业病待遇。【判断】 正确答案：A 解析：职业病患者依法享有法定职业病待遇。
26. 省、自治区、直辖市人民政府卫生行政部门应当向社会公布本行政区域内承担职业病诊断的医疗卫生机构的名单。【判断】 正确答案：A 解析：省级卫生部门需公示职业病诊断机构名单。
27. 职业病诊断证明书应当由参加诊断的医师 1/3 人员共同签署，并经职业病诊断机构审核盖章。【判断】 正确答案：B 解析：诊断证明书需全体参加诊断医师签署，非 1/3。
28. 职业病诊断证明书一式三份，劳动者、用人单位各一份，诊断机构存档一份。【判断】 正确答案：A 解析：诊断证明书法定一式三份，分属劳动者、单位、机构。
29. 职业病鉴定委员会由卫生行政部门组织，卫生行政部门可以委托办事机构承担职业病诊断鉴定的组织和日常性工作。【判断】 正确答案：A 解析：卫生部门可委托机构承担鉴定组织与日常工作。
30. 对于疑似职业病病人，用人单位应当及时安排对其进行诊断；疑似职业病病人在诊断、医学观察期间的费用，由病人承担。【判断】 正确答案：B 解析：疑似职业病费用由用人单位承担，非患者本人。
31. 职业病在接触同一因素的群体中常有一定发病率，很少只出现个别病人。【判断】 正确答案：A 解析：职业病具有群体性发病特征，极少单个发病。
32. 职业病病人的诊疗、康复费用，按照国家有关工伤社会保险的规定执行。【判断】 正确答案：A 解析：职业病诊疗康复费用按工伤保险规定执行。
33. 职业病诊断鉴定专家库含有 ()。【多选】 □A. 职业中毒诊断专家库 □B. 尘肺病诊断专家库 □C. 物理因素职业病诊断专家库 □D. 职业性放射病诊断专家库 正确答案：A|B|C|D 解析：专家库包含中毒、尘肺、物理因素、放射病四类诊断专家。
34. 劳动者可以在用人单位所在地、本人户籍所在地或者经常居住地依法承担职业病诊断的医疗卫生机构进行职业病诊断。【判断】 正确答案：A 解析：劳动者诊断地点法定为单位、户籍、经常居住地三地。
35. 不少职业病目前尚无特效治疗，只能对症治疗，所以发现越晚，疗效越差。【判断】 正确答案：A 解析：多数职业病无特效药，发现越晚治疗效果越差。
36. 最新修订颁布的《职业病分类与目录》中，公布的职业病共分 ()。【单选】 □A.10 类 115 种 □B.11 类 115 种 □C.10 类 132 种 □D.11 类 132 种 正确答案：C 解析：现行《职业病分类和目录》为 10 类 132 种。
37. 职业病与普通疾病的区别之一是职业病所接触的病因大多数是可以检测的，而且达到一定程度才使劳动者致病。【判断】 正确答案：A 解析：职业病危害因素可检测，需达到一定浓度 / 强度才致病。
38. 某生产车间生产过程中产生的粉尘较多，李某长期在该环境中作业，引发尘肺病，属于职业病。【判断】 正确答案：A 解析：尘肺病属于法定职业病，因接触粉尘职业危害导致。
39. 没有明确职业病危害接触史或者没有发现与所接触的职业病危害因素相对应的健康损害的情况职业诊断医疗卫生机构可以不予受理。【判断】 正确答案：A 解析：无接触史或无对应健康损害，诊断机构可不予受理。
40. 最新修订颁布的《职业病分类和目录》公布的职业病共分 10 类 115 种。【判断】 正确答案：B 解析：现行目录为 10 类 132 种，非 115 种。

42. 职业病诊断医师应当独立分析、判断，提出诊断意见，用人单位无权干预。【判断】 正确答案：A 解析：医师诊断独立进行，用人单位不得干预。
43. 设区的市级卫生行政部门组织的职业病诊断鉴定委员会负责职业病诊断争议的首次鉴定。【判断】 正确答案：A 解析：职业病诊断争议首次鉴定由市级卫生部门组织。

45. 职业病诊断证明书应当包括以下内容 ()。【多选】 □A. 劳动者职业史和职业病危害接触史 □B. 劳动者、用人单位基本信息 □C. 诊断结论 □D. 诊断时间 正确答案：B|C|D 解析：诊断证明书含双方信息、诊断结论、时间，职业史非必填项。

50.() 是生产经营单位为应对各种生产安全事故而制定的综合性工作方案，是本单位应对生产安全事故的总体工作程序、措施和应急预案体系的总纲。【单选】 □A. 综合应急预案 □B. 专项应急预案 □C. 现场处置方案 正确答案：A 解析：综合应急预案是单位应急总纲，应对各类事故。

52. 下列选项中不属于应急预案关键要素的是 ()。【单选】 □A. 信息报告 □B. 危险源与风险分析 □C. 工作原则 □D. 应急响应程序 正确答案：C 解析：工作原则属于一般要素，非关键要素。

58. 中央企业所属单位的应急预案报 () 备案。【单选】 □A. 国务院主管的负有安全生产监督管理职责的部门 □B. 所在地的省、自治区、直辖市或者设区的市级人民政府主管的负有安全生产监督管理职责的部门 □C. 所在地的市级人民政府主管的负有安全生产监督管理职责的部门 □D. 所在地的县级人民政府主管的负有安全生产监督管理职责的部门 正确答案：B 解析：央企所属单位预案报所在地省级或设区市级监管部门备案。

61.() 对那些没有预料的紧急情况也能起到一般的应急指导作用。【单选】 □A. 综合应急预案 □B. 专项应急预案 □C. 现场处置方案 正确答案：A 解析：综合应急预案可指导未预料的紧急情况。
62.() 是生产经营单位为应对某一种或者多种类型生产安全事故，或者针对重要生产设施、重大危险源、重大活动防止生产安全事故而制定的专项工作方案。【单选】 □A. 综合应急预案 □B. 专项应急预案 □C. 现场处置方案 正确答案：B 解析：专项应急预案针对特定事故类型、重大危险源制定。

104. 下列选项中属于应急预案一般要素的有 ()。【多选】 □A. 编制目的 □B. 工作原则 □C. 单位概况 □D. 危险源与风险分析 正确答案：A|B|C 解析：一般要素含目的、原则、单位概况，风险分析为关键要素。
105. 关于应急预案的更新与修订，下列说法正确的有 ()。【多选】 □A. 通过对应急预案更新与修订，可以保证应急预案的持续适应性 □B. 应急预案修订前，企业应组织对预案进行评估 □C. 更新的应急预案内容应通过有关负责人认可 □D. 修订的预案应经过相应的审批程序，并及时发布和备案 正确答案：A|B|C|D 解析：预案修订需评估、负责人认可、审批、发布备案。
106. 以下内容属于应急预案编制注意事项的是 ()。【多选】 □A. 应急预案责任要明晰 □B. 应急预案内容要保鲜 □C. 应急预案要衔接 □D. 应急预案改进要持续 正确答案：A|B|C|D 解析：预案编制需责任清、内容新、衔接好、持续改进。
107. 应急预案修订与更新是一项经常性工作，通过对应急预案更新与修订，可以保证应急预案的持续适应性。【判断】 正确答案：A 解析：预案需常态化修订，保障持续适用。
108. 预案编制工作组应邀请相关救援队伍以及周边相关企业、单位或社区代表参加。【判断】 正确答案：A 解析：编制组需邀请救援队伍、周边企业、社区代表参与。
109. 在编制应急预案的过程中，应急预案编制目的可根据情况简写或省略。【判断】 正确答案：A 解析：预案编制目的可根据实际情况简写或省略。
110. 根据《生产经营单位生产安全事故应急预案编制导则》, 应急预案是指为有效预防和控制可能发生的事故，最大程度减少事故及其造成损害而预先制定的工作方案。【判断】 正确答案：A 解析：符合导则对应急预案的定义。
111. 在编制应急预案过程中，危险源与风险分析可简写或省略。【判断】 正确答案：B 解析：危险源与风险分析是关键要素，不可简写或省略。
112. 根据《生产经营单位生产安全事故应急预案编制导则》, 响应分级不必照搬事故分级。【判断】 正确答案：A 解析：应急响应分级可结合单位实际，无需照搬事故分级。
113. 根据《生产经营单位生产安全事故应急预案编制导则》, 应急预案可分为综合应急预案、专项应急预案、现场处置方案。【判断】 正确答案：A 解析：导则将预案分为综合、专项、现场处置三类。
114. 应急预案宣传和培训工作是保证应急预案贯彻实施的重要手段，是提高事故防范能力的重要途径。【判断】 正确答案：A 解析：宣传培训是预案落地、提升防范能力的关键。
115. 应急预案修订与更新是一项经常性工作，修订与更新的应急预案应经过相应的审批程序，并及时发布和备案。【判断】 正确答案：A 解析：修订后预案需审批、发布、备案。
116. 应急预案编制应当体现自救互救和先期处置的特点。【判断】 正确答案：A 解析：预案需突出自救互救、先期处置的核心特点。
117. 根据《生产经营单位生产安全事故应急预案编制导则》, 专项应急预案编制要素包括适用范围、应急指挥机构及职责、响应启动、处置措施和应急保障五个方面。【判断】 正确答案：A 解析：专项预案要素为范围、机构职责、响应启动、处置、保障。
118. 依据《生产安全事故应急预案管理办法》, 若企业面临的事故风险发生重大变化，应及时修订更新应急预案。【判断】 正确答案：A 解析：风险重大变化需及时修订预案。
119. 专项应急预案与综合应急预案中的应急组织机构、应急响应程序相近时，可不编写专项应急预案，相应的应急处置措施并入综合应急预案。【判断】 正确答案：A 解析：专项与综合预案内容相近时，可合并至综合预案。
120. 企业主要负责人要参加应急预案评审会议。【判断】 正确答案：A 解析：企业主要负责人必须参与预案评审会议。
121. 依据《生产安全事故应急预案管理办法》, 若企业应急指挥机构及其职责发生调整，应及时修订更新应急预案。【判断】 正确答案：A 解析：应急机构职责调整需修订预案。
122. 企业编制应急预案时需要收集本企业历史事故与隐患、国内外同行业事故资料和属地政府及周边企业、单位应急预案等。【判断】 正确答案：A 解析：预案编制需收集事故、外部预案等资料。
123. 编制应急预案是应急救援准备工作的核心内容。【判断】 正确答案：A 解析：预案编制是应急准备的核心环节。
124. 根据《生产经营单位生产安全事故应急预案编制导则》, 综合应急预案应急响应的内容包括信息报告、预警、响应启动、应急处置、应急支援和响应终止。【判断】 正确答案：A 解析：综合预案应急响应含报告、预警、启动、处置、支援、终止。
125. 根据《生产经营单位生产安全事故应急预案编制导则》, 现场处置方案编制要素包括事故风险描述、应急工作职责、应急处置、注意事项。【判断】 正确答案：A 解析：现场处置方案要素符合导则要求。
126. 根据《生产经营单位生产安全事故应急预案编制导则》, 综合应急预案编制要素包括总则、应急组织机构及职责、应急响应、后期处置和应急保障。【判断】 正确答案：A 解析：综合预案要素符合导则规定。
127. 根据《生产经营单位生产安全事故应急预案编制导则》, 总则、应急组织机构及职责、应急响应、后期处置和应急保障等属于综合应急预案的主要内容。【判断】 正确答案：A 解析：综合预案主要内容符合导则要求。
128. 应急预案评审前，应将应急预案、编制说明、风险评估、应急资源调查报告及其他有关资料送达参加评审的单位或人员。【判断】 正确答案：A 解析：评审前需提前送达相关资料给评审方。
129. 应急预案应具备针对性、科学性、可操作性、合法合规性、权威性、相互协调一致、相互兼容等特征。【判断】 正确答案：A 解析：应急预案需具备上述全部特征。
130. 申请应急预案备案时，可以不用提交应急预案的文本，提交应急预案电子文档即可。【判断】 正确答案：B 解析：备案需同时提交预案文本与电子文档，不可只交电子档。
131. 应急预案评审时，应审查综合应急预案、专项应急预案、现场处置方案与相关部门或单位预案是否衔接。【判断】 正确答案：A 解析：评审需核查预案与外部预案的衔接性。
132. 应急预案修订前，企业应组织对应急预案进行评估，以确定应急预案是否需要进行修订和哪些内容需要修订。【判断】 正确答案：A 解析：修订预案前需先开展评估工作。
133. 小井掘进超过 () 后，应采用电力起爆或导爆管起爆，爆破前井口应设专人看守。【单选】 □A.2.0m □B.3.0m □C.4.0m □D.5.0m 正确答案：B 解析：小井掘进超 3m 需用电起爆或导爆管起爆，井口专人看守。
134. 在廊道内进行爆破作业时，装药区域应采用安全蓄电池灯、安全灯或绝缘手电筒照明，照明灯具需使用 () V 及以下安全电压。【单选】 □A.36 □B.42 □C.60 □D.220 正确答案：A 解析：廊道爆破装药区照明需用 36V 及以下安全电压。
135. 在进行洞室爆破作业时，起爆网路不可以用 () 引爆。【单选】 □A. 电雷管 □B. 导爆管 □C. 雷管 □D. 火雷管 正确答案：D 解析：洞室爆破起爆网路禁止使用火雷管。
136. 根据洞室开挖对爆破安全的要求，单向开挖隧道时，安全地点距爆破工作面的最小距离为 () m。【单选】 □A.100 □B.150 □C.200 □D.300 正确答案：C 解析：单向隧道开挖爆破，安全距离最小 200m。
137. 在进行洞室爆破作业时，连接网路人员应持起爆网路图，按从 () 的顺序连接，在接点部位应有明显段别标志。【单选】 □A. 后爆到先爆先里后外 □B. 先爆到后爆先里后外 □C. 后爆到先爆先外后里 □D. 先爆到后爆先外后里 正确答案：A 解析：网路连接顺序为后爆到先爆、先里后外。
138. 在进行洞室开挖作业时，洞口应设置防护棚。其顺洞轴方向的长度，可依据实际地形、地质和洞型断面选定，不宜小于 ()。【单选】 □A.5m □B.4m □C.3m □D.2m 正确答案：A 解析：洞口防护棚顺洞轴长度不宜小于 5m。
139. 在地下洞室作业时，下列做法不正确的是 ()。【单选】 □A. 门槽顶部应悬挂警示标志 □B. 设专人值班和配备通信联络工具 □C. 作业面浮石、危石及倒悬石不提前清理 □D. 洞口应设置防护棚 正确答案：C 解析：地下洞室作业需提前清理浮石、危石、倒悬石。
140. 洞室爆破时，每个起爆体的雷管数不应少于 () 发，起爆网路连接时应符合雷管段别。【单选】 □A.1 □B.2 □C.3 □D.4 正确答案：D 解析：每个起爆体雷管数不少于 4 发。
141. 洞室爆破应采用 (), 装药连线时操作人员应佩戴标志。【单选】 □A. 并联起爆网路 □B. 串联起爆网路 □C. 三通连接网路 □D. 复式起爆网路 正确答案：D 解析：洞室爆破必须采用复式起爆网路。
142. 洞室作业时，遇不良地质构造或易塌方地段，有害气体逸出及地下涌水等突发事件，应 ()。【单选】 □A. 经领导批准后撤离 □B. 查清突发事件后撤离 □C. 立即停工，并撤至安全地点 □D. 以上都不对 正确答案：C 解析：遇突发险情需立即停工撤至安全区。
143. 在进行洞室开挖时，以下说法正确的是 ()。【单选】 □A. 在地下洞室作业时，门槽顶部应悬挂警示标志，并应设专人值班和配备通信联络工具 □B. 洞口应设置防护棚，其顺洞轴方向的长度，可依据实际地形、地质和洞型断面选定，不宜小于 3m □C. 自洞口计起，当洞挖长度不超过 25~30m 时，应依据地质条件、断面尺寸，及时作好洞口永久性或临时性支护 □D. 当地质条件不良全部洞身应进行支护时，洞口则应进行临时性支护 正确答案：A 解析：A 正确：地下洞室作业时，门槽顶部属于危险区域，需悬挂警示标志，并设专人值班、配备通信联络工具，符合安全规程要求。B 错误：洞口防护棚顺洞轴方向的长度不宜小于 5m，而不是 3m。C 错误：当洞挖长度不超过 15~20m 时，就应及时做好洞口支护，而非 25~30m。D 错误：地质条件不良、全洞身需支护时，洞口应进行 永久性支护（或加强支护），而非仅临时性支护。
144. 在进行洞室爆破作业时，下列做法不正确的是 ()。【单选】 □A. 洞室爆破应采用复式起爆网路，装药连线时操作人员应佩戴标志 □B. 装入起爆体前、后，应进行电阻值检测，填塞过程中不可以进行电阻值检测 □C. 洞室爆破时，所有穿过填塞段的导线、导爆索和导爆管，均应采取保护措施，以防填塞时损坏 □D. 填塞完毕，应有专人负责进行验收 正确答案：B 解析：填塞过程中可进行电阻值检测，选项说法错误。
145. 下列对于廊道内施工用电的管理，做法不正确的是 ()。【单选】 □A. 施工使用的电动工具应接漏电保护装置 □B. 电源线不应接触潮湿地面 □C. 使用的电灯软线采用双芯橡皮绝缘软线 □D. 电源线绑挂在金属构件上 正确答案：D 解析：廊道内电源线禁止绑挂在金属构件上。
146. 在图示环境进行爆破作业时，以下行为错误的是 ()。【单选】 □A. 酒后作业 □B. 爆破材料必须做到分类并码放整齐 □C. 禁止烟火和从事电工和焊接作业 □D. 装药区域应采用安全电池灯、安全灯或绝缘手电筒照明 正确答案：A 解析：爆破作业严禁酒后上岗。
147. 导洞及小井掘进每循环进深在 () 以内，爆破时人员撤离的安全允许距离，应由设计确定。【单选】 □A.2.0m □B.3.0m □C.4.0m □D.5.0m 正确答案：D 解析：导洞小井掘进每循环进深≤5m，安全距离由设计定。
148. 廊道等狭窄部位内的照明灯具和线路悬挂高度不宜低于 (), 低压线路不得裸露。【单选】 □A.4.0m □B.3.0m □C.2.5m □D.1.5m 正确答案：C 解析：廊道照明线路悬挂高度不宜低于 2.5m。
149. 在廊道内进行爆破作业时，装药区域不能采用以下 () 照明方式。【单选】 □A. 安全蓄电池灯 □B. 安全灯 □C. 电压 42V 的照明灯具 □D. 绝缘手电筒 正确答案：C 解析：廊道爆破装药区禁止使用 42V 照明，需用 36V 及以下。
150. 洞室作业前，洞身长度大于洞径 () 倍时，应采取强制通风措施，否则不得继续施工。【单选】 □A.1~2 □B.2~3 □C.3~4 □D.3~5 正确答案：D 解析：洞身长于洞径 3~5 倍时，需强制通风。
151. 在进行洞室爆破作业时，下列关于洞室掘进施工的做法，错误的是 ()。【单选】 □A. 掘进时若采用电灯照明，其电压不应超过 36V □B. 小井深度大于 5m 时，作业人员应使用绳梯上下 □C. 掘进工程中地下水量过大时，应设临时排水设备 □D. 掘进工程通过岩石破碎带时，应加强支护 正确答案：B 解析：小井深度超 5m，禁止使用绳梯，需用安全梯。
152. 在进入图示环境作业时，相关要求有误的是 ()。【单选】 □A. 配备便携式照明器具 □B. 岔道处应设置交通安全警示标志 □C. 每次一个人单独进入 □D. 存在塌方等安全隐患的部位，应及时处理，并应悬挂安全警示标志，严禁无关人员进入。 正确答案：C 解析：洞室作业禁止单人单独进入。
153. 在洞室开挖过程中，下列关于土石方挖运出确说法不正确的是 ()。【单选】 □A. 出碴道路应保持平整通畅 □B. 出道路应设置排水沟 □C. 不在指定地点卸碴，随意倾倒 □D. 出碴作业专人指挥 正确答案：C 解析：洞室挖运出碴需在指定地点卸碴，禁止随意倾倒。
154. 廊道内的用电、消防安全管理包括以下几个方面 ()。【多选】 □A. 施工使用的电动工具和焊接设备应接漏电保护装置，电源线不应接触潮湿地面以及直接绑挂在金属构件上 □B. 电工和焊工作业须需按要求穿戴相应的劳保用品 (具), 电焊机要有可靠的接地保护 □C. 廊道内使用的电灯软线应采用单心橡皮绝缘，并应经常检查绝缘情况 □D. 配电柜上按要求张贴安全用电责任牌，确保漏电保护器灵敏可靠，各种线缆必须按要求规范敷设和架空，裸露破的线缆必须包扎 正确答案：A|B|D 解析：廊道用电需接漏保、规范接线、接地保护、线缆包扎，电灯软线需双芯绝缘。
155. 在进行洞室爆破作业时，下列做法正确的是 ()。【多选】 □A. 洞室装药，应使用 42V 以下的低压电源照明，照明线路应绝缘良好，照明灯应设保护网 □B. 灯泡与炸药堆之间的水平距离不应小于 1m □C. 洞室装药应将炸药成袋 (包) 码放整齐，相互密贴 □D. 填塞工作开始前，应在导洞或小井口附近备足填塞材料 正确答案：C|D 解析：洞室装药需码放整齐、提前备足填塞材料，照明需 36V 以下，灯泡距炸药≥1.5m。
156. 下列属于洞室爆破后重点检查内容的是 ()。【多选】 □A. 是否完全起爆 □B. 有无危险边坡、不稳定爆堆、滚石和超范围塌陷 □C. 爆区附近有隧道、涵洞和地下采矿场时，应对这些部位进行毒气检查，在检查结果明确之前，应进行局域封锁 □D. 如果发现或怀疑有拒爆药包，应向指挥长汇报，由其组织有关人员作进一步检查，并发出解除警戒信号 正确答案：A|B|C 解析：爆破后检查起爆、边坡、毒气，拒爆未处理前不得解除警戒。
157. 在廊道内常见的危险作业主要包括 ()。【多选】 □A. 爆破作业 □B. 动火作业 □C. 电焊作业 □D. 起重作业 正确答案：A|B|C 解析：廊道危险作业含爆破、动火、电焊，无起重作业。
158. 廊道内实行严格的烟火管制，严禁携带 () 进入警戒区域。【多选】 □A. 火柴 □B. 打火机 □C. 防爆手电筒 □D. 手机等其他手待式移动式通讯设备 正确答案：A|B|D 解析：廊道禁止携带火种、手机等通讯设备，防爆手电可携带。
159. 廊道内施工作业的特点是 ()。【多选】 □A. 空间相对封闭 □B. 作业环境相对简单 □C. 危险性较大 □D. 作业安全措施比较复杂 正确答案：A|C|D 解析：廊道作业封闭、危险大、安全措施复杂，环境不简单。
160. 进行廊道与洞室作业时，以下做法正确的是 ()。【多选】 □A. 在廊道及洞室内进行运输作业时，应规划便于人员通行的安全通道或其他保障人员安全的措施。岔道处应设置交通安全警示标志 □B. 在廊道及洞室内作业前检查周边孔洞的盖板、安全防护栏杆，应安全牢固 □C. 单人进入廊道及洞室内作业，配备便携式照明器具 □D. 施工廊道应视其作业环境情况，设置安全可靠的道风、除尘、排水等设施，运行人员应坚守岗位 正确答案：A|B|D 解析：廊道作业需设安全通道、检查防护、通风排水，禁止单人作业。
161. 在进行洞室开挖时，以下说法正确的是 ()。【多选】 □A. 进洞前，应对洞脸若体进行察看，确认稳定或采取可靠措施后方可开挖洞口 □B. 洞室开挖的洞口边坡上不应存在浮石、危石及倒悬石 □C. 作业施工环境和条件相对较差时，施工前应制定全方位的安全技术措施，并对作业人员进行交底 □D. 洞口削坡，应按照明挖要求进行，不应上下同时作业 正确答案：A|B|C|D 解析：洞室开挖需查洞脸、清危石、定措施、禁上下同时削坡。
162. 廊道内的用电、消防安全，需要从以下几个方面进行管理 ()。【多选】 □A. 廊道等狭窄部位内的照明灯具和线路悬挂高度不宜低于 2m, 照明灯具需使用 42V 及以下安全电压，低压线路不得裸露 □B. 廊道内的每个作业面或者班组应配备足够的灭火器材 □C. 氧气瓶与明火的安全距离一般不小于 5m, 必要时用防火材料隔档 □D. 作业结束后，作业人员及监护人员应全面检查现场四周是否可能留下潜伏的火种，确认无引发火灾危险后，才能离开现场 正确答案：B|C|D 解析：廊道消防需配灭火器材、氧气瓶距明火≥5m、作业后查火种，照明需 36V 及以下、高度≥2.5m。
163. 如图，在进行洞室爆破作业时，以下处理盲炮的做法正确的是 ()。【多选】 □A. 不可进行再次起爆 □B. 按原测药室位置在地面标出 □C. 清除堵塞物，取出炸药和起爆体 □D. 当网路、导爆索、导爆管经检查确认正常尚能使用时，可连线起爆。 正确答案：B|C|D 解析：盲炮处理可标记位置、清堵取药、网路完好可重新起爆。
164. 在廊道进行爆破作业的时候，需要从以下 () 进行安全管理。【多选】 □A. 在进行爆破作业时，装药区域应采用安全蓄电池灯、安全灯或绝缘手电筒照明，照明灯具需使用 42V 及以下安全电压 □B. 在进行爆破作业后，应立即启动通排风设备，以保证廓道内的空气质量 □C. 作业区和危险部位须悬桂安全警示牌和安全通道指示牌，各类标牌须采用反光材料制作 □D. 个体防护用品、工具和防护设施要齐全有效，佩戴使用合理，注意职业健康，佩戴专业防尘口罩 正确答案：B|C|D 解析：廊道爆破后通风、设反光警示牌、配防护用品，照明需 36V 及以下。
165. 进行洞室作业时应做好安全监测工作，大型洞室应重点监测 ()。【多选】 □A. 垂直纵轴线的典型洞室断面 □B. 贯穿于高边墙的小型隧洞口及其洞口内段 □C. 岩壁梁的岩台 (尤其下方有小洞室) 部分 □D. 不利于地质构造面组合切割的不稳定体 □E. 相邻洞室间的薄体若壁 正确答案：A|B|C|D|E 解析：大型洞室需监测断面、隧洞口、岩台、不稳定体、薄岩壁。
166. 在进行洞室爆破作业时，关于洞室掘进施工的描述正确的是 ()。【多选】 □A. 在开始掘进前，应做好防止落石及塌方的施工准备工作 □B. 导洞及小井掘进每循环进深在 10m 以内，爆破时人员撤离的安全允许距离，应由设计确定 □C. 小井掘进超过 3m 后，应采用电力起爆或导爆管起爆，爆破前井口应设专人看守 □D. 爆破等待 12min 后可进入工作面 正确答案：A|C 解析：掘进前防落石、小井超 3m 用电起爆，导洞进深≤5m，爆破后需等待 15min 以上。
167. 在洞室进行土方挖运作业时，以下说法正确的是 ()。【多选】 □A. 洞内允许使用汽油机为动力的挖运设备 □B. 机械设备操作人员须经培训考试取证上岗 □C. 操作人员应按照本机说明书规定，严格执行工作前的检查制度及工作后的检查保养制度，并在工作中注意观察 □D. 机械运转中其他人员不应登车，必须上下时应通知司机停车 正确答案：B|C|D 解析：洞室挖运禁止汽油机设备，人员需持证上岗、规范操作、禁机械运转登车。
168. 下列对洞室开挖作业描述正确的是 ()。【多选】 □A. 在地下洞室作业时，门槽顶部应悬挂警示标志，并应设专人值班和配备通信联络工具 □B. 洞口应设置防护棚，其顺洞轴方向的长度，可依据实际地形、地质和洞型断面选定，不宜小于 5m □C. 自洞口计起，当洞挖长度不超过 15~20m 时，应依据地质条件、断面尺寸，及时作好洞口永久性或临时性支护 □D. 当地质条件不良全部洞身应进行支护时，洞口段则应进行临时性支护 正确答案：A|B|C 解析：洞室开挖需挂警示、设 5m 防护棚、及时支护，地质差洞口需永久支护。
169. 洞室内施工作业的特点是 ()。【多选】 □A. 作业建设周期长 □B. 施工复杂 □C. 不同工种作业人员众多 □D. 现场作业环境恶劣 正确答案：A|B|C|D 解析：洞室作业周期长、复杂、人员多、环境恶劣。
170. 下列属于洞室爆破发生盲炮的表征的是 ()。【多选】 □A. 爆破效果与设计有较大差异 □B. 爆堆形态和设计有较大的差别 □C. 现场发现残药和导爆索残段 □D. 爆堆中留有岩坎陡壁 正确答案：A|B|C|D 解析：盲炮表现为效果差、形态异、有残药、留岩坎。
171. 进行盲炮处理时，应做到 ()。【多选】 □A. 按原测药室位置在地面标出 □B. 清除堵寒物，取出炸药和起爆体 □C. 清除堵塞物，不得取出炸药和起爆体 □D. 当网路、导爆索、导爆管经检查确认正常尚能使用时，可连线起爆 正确答案：A|B|D 解析：盲炮处理可标记、清堵取药、网路完好可起爆。
172. 下列对洞室开挖过程中的土方挖运作业描述正确的是 ()。【多选】 □A. 确保安全的情况下方可进行挖运 □B. 挖运现场应有足够的照明 □C. 出道路应保持平整通畅，并应设置排水沟；出地点应有明显标志，并应设专人指挥 □D. 人工装运时，作业人员应按规定穿戴好劳动保护用品，严禁把手伸入车内或放在斗车帮上，以免将手砸伤 正确答案：A|B|C|D 解析：挖运需安全作业、照明充足、道路通畅、规范装运。
173. 在进行洞室掘进时若采用电灯照明，其电压不应超过 36V。【判断】 正确答案：A 解析：洞室掘进照明电压≤36V。
174. 王某在进行洞室爆破时，每个起爆体的雷管数设置了 3 发，这种做法符合《廊道及洞室作业安全》的规定。【判断】 正确答案：B 解析：起爆体雷管数需≥4 发，3 发不符合规定。
175. 在进行洞室掘进施工时，小井掘进超过 3m 后，应采用雷管起爆，爆破前井口应设专人看守。【判断】 正确答案：B 解析：小井超 3m 需用电起爆或导爆管起爆，非普通雷管。
176. 洞口削坡应按照明挖要求进行，可上下同时作业。【判断】 正确答案：B 解析：洞口削坡禁止上下同时作业。
177. 在进行洞室爆破作业时，洞室装药应使用 36V 以下的低压电源照明，照明线路应绝缘良好。【判断】 正确答案：A 解析：洞室装药照明需 36V 以下、绝缘良好。
178. 洞室开挖时应提前清理危石，在确保安全的情况下方可进行挖运。【判断】 正确答案：A 解析：洞室开挖需先清危石，安全后再挖运。
179. 洞室开挖人工装运时，作业人员应按规定穿戴好劳动保护用品，严禁把手伸入车内或放在斗车帮上。【判断】 正确答案：A 解析：人工装运需规范操作，防止砸伤。
180. 廊道内的每个作业面或者班组应配备足够的灭火器材，确保消防安全。【判断】 正确答案：A 解析：廊道作业面需配齐灭火器材。
181. 进行盲炮处理时，当网路、导爆索、导爆管经检查确认正常尚能使用时，可连线起爆。【判断】 正确答案：A 解析：盲炮网路完好可重新连线起爆。
182. 洞室爆破使用的爆破材料应经现场检验，检验合格方可使用。【判断】 正确答案：A 解析：爆破材料需现场检验合格后使用。
183. 如图，廊道内使用的电灯软线应采用双芯橡皮绝缘或塑料绝缘软线，并应经常检查绝缘情况。【判断】 正确答案：A 解析：廊道电灯软线需双芯绝缘，定期检查。
184. 洞室开挖时，挖运现场应有足够的照明。【判断】 正确答案：A 解析：挖运现场需充足照明。
185. 廊道内实行严格的烟火管制，严禁携带火柴、打火机等火种和手机等其他手持式移动式通讯设备进入警戒区域。【判断】 正确答案：A 解析：廊道禁止携带火种、手机等设备。
186. 在廊道进行爆破作业时，爆破作业人员需持证上岗并进行登记，严禁酒后作业。【判断】 正确答案：A 解析：爆破人员需持证登记，严禁酒后作业。
187. 廊道内作业时，个体防护用品、工具和防护设施要齐全有效，佩戴使用合理，注意职业健康，佩戴专业防尘口罩。【判断】 正确答案：A 解析：廊道作业需配齐防护用品，做好职业健康防护。
188. 洞室爆破发生盲炮的表征是：爆破效果与设计有较大差异；爆堆形态和设计有较大的差别；现场发现残药和导爆索残段；爆堆中留有岩坎陡壁。【判断】 正确答案：A 解析：符合盲炮的典型表征。
189. 施工廊道应视其作业环境情况，设置安全可靠的通风、除尘、排水等设施，运行人员应坚守岗位。【判断】 正确答案：A 解析：廊道需配通风、除尘、排水设施，人员坚守岗位。
190. 在廊道及洞室内作业前检查周边孔洞的盖板、安全防护栏杆，确保安全牢固。【判断】 正确答案：A 解析：作业前需检查防护设施牢固性。
191. 洞室掘进施工通过岩石破碎带时，应加强支护。【判断】 正确答案：A 解析：破碎带掘进需加强支护防坍塌。
192. 廊道内作业时，当炸药、导爆管进入洞内后禁止烟火和从事电工和焊接作业。【判断】 正确答案：A 解析：洞内有爆破材料时，禁止烟火、电工、焊接作业。
193. 如图，在洞室开挖过程中，可以使用汽油机为动力的挖运设备。【判断】 正确答案：B 解析：洞室开挖禁止使用汽油机动力设备。
194. 进行洞室作业时应做好安全监测工作，防止坍塌、滑坡等地质灾害情况的发生。【判断】 正确答案：A 解析：洞室作业需监测地质，防坍塌滑坡。
195. 如果发现或怀疑有拒爆药包，应向指挥长汇报，由其组织有关人员作进一步检查；如果发现有其他不安全因素，应尽快采取措施进行处理；在上述情况下，不应发出解除警戒信号。【判断】 正确答案：A 解析：拒爆未处理、有安全隐患时，不得解除警戒。
196. 洞室开挖时，机械运转中其他人员不应登车，必须上下时应通知司机停车。【判断】 正确答案：A 解析：机械运转时禁止登车，上下需停车。
197. 廊道内使用的电灯软线应采用双芯橡皮绝缘或塑料绝缘软线，并应经常检查绝缘情况。【判断】 正确答案：A 解析：廊道电灯软线需双芯绝缘，定期检查。
198. 廊道内施工作业时，作业单位应从作业安全管理，用电、消防安全等方面进行管理，保证施工的安全进行。【判断】 正确答案：A 解析：廊道作业需做好安全、用电、消防管理。
199. 在地下洞室作业时，门槽顶部应悬挂警示标志，并应设专人值班和配备通信联络工具。【判断】 正确答案：A 解析：地下洞室门槽需警示、值班、通讯。
200. 洞室爆破时，所有穿过填塞段的导线、导爆索和导爆管，均应采取保护措施，以防填塞时损坏。【判断】 正确答案：B 解析：洞室爆破填塞段导线等需保护，题目表述无误，原答案错误，正确答案应为 A。
201. 地下洞室施工应有强制通风设施，确保洞内粉尘、烟尘、废气及时排出。【判断】 正确答案：A 解析：地下洞室需强制通风排粉尘废气。
202. 在进行洞室掘进施工时，若地下水量过大应设临时排水设备。【判断】 正确答案：A 解析：地下水量大需设临时排水设备。
203. 导洞及小井掘进每循环进深在 5m 以内，爆破时人员撤离的安全允许距离，应由设计确定。【判断】 正确答案：A 解析：导洞小井进深≤5m，安全距离由设计确定。
204. 洛氏硬度的符号是 ()。【单选】 □A.HRC □B.HB □C.HA 正确答案：A 解析：洛氏硬度符号为 HRC，布氏为 HB。
205. 在保证较好的韧性的同时，为提高铜铁材料的弹性极限和屈服强度，最好采用 () 的方法。【单选】 □A. 低温回火 □B. 中温回火 □C. 高温回火 正确答案：B 解析：中温回火可提升弹性极限与屈服强度，保持韧性。
206. 沸腾钢为脱氧不完全的碳素钢，其中的杂质较多，一般含有 ()。【单选】 □A. 硫 □B. 硅 □C. 锰 正确答案：A 解析：沸腾钢脱氧差，含硫等杂质较多。
207. 下列属于电弧焊的是 ()。【单选】 □A. 软钎焊 □B. 气体保护焊 □C. 埋弧焊 正确答案：C 解析：埋弧焊属于电弧焊，气体保护焊按工艺分类，软钎焊为钎焊。
208. 当温度低于 - 11°C 时，液态二氧化碳的密度比水 ()。【单选】 □A. 大 □B. 小 □C. 相等 正确答案：A 解析：-11℃以下液态二氧化碳密度大于水。
209. 能够提高金属材料切削性能的元素是 ()。【单选】 □A. 锰 □B. 硅 □C. 硫 正确答案：C 解析：硫元素可改善金属切削性能。
210. 下列铝合金中，强度最好的是 ()。【单选】 □A. 锻铝 □B. 硬铝 □C. 超硬铝 正确答案：C 解析：超硬铝合金强度在铝合金中最高。
211. 可以对于铜合金使用的脱氧剂是 ()。【单选】 □A. 锰 □B. 铝 □C. 钛 正确答案：C 解析：钛是铜合金常用脱氧剂。
212. 下列金属中，导电性最好的是 ()。【单选】 □A. 铁 □B. 铜 □C. 银 正确答案：C 解析：银的导电性在金属中最优。
213. 高碳钢焊接时对气孔的敏感性 ()。【单选】 □A. 大 □B. 小 □C. 一般 正确答案：A 解析：高碳钢含碳量高，焊接时气孔敏感性大。
214. 珠光体是一种 ()。【单选】 □A. 单质 □B. 混合物 □C. 化合物 正确答案：B 解析：珠光体是铁素体与渗碳体的混合物。
215. 钢铁材料淬火后形成的组织是 ()。【单选】 □A. 奥氏体 □B. 铁素体 □C. 马氏体 正确答案：C 解析：钢铁淬火后核心组织为马氏体。
216. 焊接中，焊后热处理一般是指 ()。【单选】 □A. 低温退火 □B. 中温退火 □C. 高温退火 正确答案：A 解析：焊接后热处理常用低温退火。
217. 钢中的渗碳体可增加钢的 ()。【单选】 □A. 韧性 □B. 塑性 □C. 强度 正确答案：C 解析：渗碳体可提升钢的强度。
218. 下列钢种中，焊接性好的是 ()。【单选】 □A. 低碳钢 □B. 中碳钢 □C. 高碳钢 正确答案：A 解析：低碳钢含碳量低，焊接性能最优。
219. 常用于焊接铸铁的方法有 ()。【单选】 □A. 氢弧焊 □B. 气体保护焊 □C. 焊条电弧焊 正确答案：C 解析：焊条电弧焊是铸铁焊接常用方法。
220. 为了改善焊接接头性能，消除粗晶组织及促使组织均匀等，常采用的热处理方式为 ()。【单选】 □A. 淬火 □B. 回火 □C. 正火 正确答案：C 解析：正火可细化晶粒、均匀组织，改善焊接接头性能。
221. 铸铁焊补主要用于 ()。【单选】 □A. 白口铸铁 □B. 麻口铸铁 □C. 灰口铸铁 正确答案：C 解析：铸铁焊补以灰口铸铁最为常用。
222. 铸件进行补焊前必须进行预热，热补焊的温度一般为 ()。【单选】 □A.400℃至 500℃ □B.500℃至 600℃ □C.600℃至 700℃ 正确答案：C 解析：铸件热补焊预热温度通常为 600℃至 700℃。
223. 下列焊接方法不属于熔化焊的是 ()。【单选】 □A. 氢弧焊 □B. 堆焊 □C. 扩散焊 正确答案：C 解析：扩散焊属于压力焊，不属于熔化焊。
224. 马氏体的体积比相同重量的奥氏体的体积 ()。【单选】 □A. 相同 □B. 小 □C. 大 正确答案：C 解析：相同重量下，马氏体体积大于奥氏体。
225. 魏氏组织对钢材性能影响为 ()。【单选】 □A. 韧性下降 □B. 塑性增大 □C. 脆性减小 正确答案：A 解析：魏氏组织会使钢材韧性显著下降。
226. 螺柱焊接属于 ()。【单选】 □A. 熔化焊 □B. 压力焊 □C. 钎焊 正确答案：A 解析：螺柱焊接属于熔化焊范畴。
227. 超硬铝合金的代号是 ()。【单选】 □A.LF □B.LY □C.LC 正确答案：C 解析：超硬铝合金代号为 LC。
228. 下列金属材料中，切削性能最好的是 ()。【单选】 □A. 灰铸铁 □B. 镁合金 □C. 铝合金 正确答案：A 解析：灰铸铁的切削加工性能最优。
229. 断裂前金属材料产生永久形变的能力称为塑性，硬铝合金的塑性 ()。【单选】 □A. 好 □B. 一般 □C. 差 正确答案：C 解析：硬铝合金塑性较差。
230. 耐热钢、低温钢、耐蚀钢的焊接不可选用 () 焊剂。【单选】 □A. 低硅 □B. 中硅 □C. 高硅 正确答案：C 解析：高硅焊剂不适合用于耐热钢、低温钢、耐蚀钢焊接。
231. 铜及铜合金导热性能好，所以焊接前 ()。【单选】 □A. 不预热 □B. 须预热 □C. 须气体保护预热 正确答案：B 解析：铜及铜合金导热快，焊接前必须预热。
232. 调质处理是指淬火后再进行 () 步骤。【单选】 □A. 低温回火 □B. 中温回火 □C. 高温回火 正确答案：C 解析：调质处理 = 淬火 + 高温回火。
233. 中碳钢焊接时，由于母材金属含碳量较高，所以焊缝的含碳量也较高，容易产生 ()。【单选】 □A. 冷裂纹 □B. 热裂纹 □C. 延迟裂纹 正确答案：B 解析：中碳钢高含碳量易引发焊接热裂纹。
234. 下列油中，发生自燃可能性最大的是 ()。【单选】 □A. 矿物油 □B. 植物油 □C. 动物油 正确答案：B 解析：植物油自燃倾向性最大。
235. 奥氏体的强度和硬度不高，塑性和韧性很好。【判断】 正确答案：A 解析：奥氏体属于面心立方晶格，塑性、韧性优良，强度硬度较低。
236. 在选择熔化焊机的焊接参数时，最好使用与工件相同材料和厚度裁成的试件进行试焊。【判断】 正确答案：A 解析：相同材料厚度试焊可精准匹配焊接参数，保证焊接质量。
237. 活性金属可以进行焊接。【判断】 正确答案：A 解析：活性金属可采用惰性气体保护等特殊工艺进行焊接。
238. 魏氏组织是一种过热组织，由彼此交叉约 90 度的铁素体针嵌入基体的显微组织。【判断】 正确答案：B 解析：魏氏组织铁素体针交叉角度约为 60°，非 90°。
239. 随着钢中含碳量增加，钢中渗碳体的量将逐步减小。【判断】 正确答案：B 解析：钢中含碳量越高，渗碳体含量越多。
240. 对一般工件的焊接，用试件焊接一定数量后，经目视检查，若无过深的压痕、裂纹和过烧，即可投入生产使用。【判断】 正确答案：B 解析：试件焊接后需进行力学性能等检测，仅目视检查不符合要求。
241. 在钎焊作业生产过程中，无论如何气瓶都不会发生泄漏。【判断】 正确答案：B 解析：气瓶存在老化、操作不当等情况，可能发生泄漏。
242. 中碳钢焊接时，在热影响区易产生淬硬组织。【判断】 正确答案：A 解析：中碳钢含碳量较高，焊接热影响区冷却易形成淬硬组织。
243. 黄铜中加入硅，可提高力学性能、耐腐蚀性和耐磨性，可用于制造海船零件及化工机械零件。【判断】 正确答案：A 解析：硅元素能改善黄铜综合性能，适配海洋、化工工况。
244. 螺柱焊是电容储能点焊的典型应用。【判断】 正确答案：A 解析：螺柱焊常采用电容储能方式实现点焊连接。
245. 镇静钢中杂质少，但偏析较多。【判断】 正确答案：B 解析：镇静钢脱氧完全，杂质少且偏析小。
246. 铜的密度比铁的密度小，熔点比铁的熔点高。【判断】 正确答案：B 解析：铜密度大于铁，熔点低于铁。
247. 在焊接过程中加入的二氧化碳，可能会对母材产生渗碳作用。【判断】 正确答案：A 解析：二氧化碳在高温下可分解出碳原子，对母材产生渗碳。
248. 金属材料的屈服强度越高，那么其抗拉强度也会越大。【判断】 正确答案：A 解析：通常金属材料屈服强度与抗拉强度呈正相关关系。
249. 一辆汽车上的焊点最多不能超过 10000 个。【判断】 正确答案：B 解析：汽车焊点数量无 10000 个的上限规定。
250. 一般说导电性好的材料，其导热性较差。【判断】 正确答案：B 解析：导电性好的材料通常导热性也优良。
251. 低碳钢焊接时，由于焊接高温的影响，晶粒长大快，碳化物容易在晶界上积聚、长大，使焊缝脆弱，焊接接头强度降低。【判断】 正确答案：B 解析：低碳钢焊接性能优良，不会出现该类晶粒与碳化物问题。
252. 铝硅系列铝合金是不能进行热处理强化铝合金。【判断】 正确答案：A 解析：铝硅合金属于非热处理强化铝合金。
253. 钎焊时必须施加一定的压力才能进行。【判断】 正确答案：B 解析：钎焊依靠钎料润湿填充，无需施加压力。
254. 金属的原子按一定方式有规则地排列成一定空间几何形状的结晶格子，称为晶格，能够完整地反映晶格特征的最小几何单元称为晶胞。【判断】 正确答案：A 解析：符合晶格与晶胞的标准定义。
255. 根据焊接方法的不同，电弧焊可分为手工焊、自动焊、半自动焊和氩弧焊。【判断】 正确答案：B 解析：氩弧焊属于电弧焊工艺分类，手工 / 自动 / 半自动是操作方式分类。
256. 熔化焊设备采用的加热原理为电阻加热。【判断】 正确答案：B 解析：熔化焊主要采用电弧加热，非电阻加热。
257. 化合物具有较高的硬度和大的塑性，而脆性较低。【判断】 正确答案：B 解析：金属化合物硬度高、脆性大，塑性差。
258. 屈服强度越高，金属材料的抗拉强度也会越大。【判断】 正确答案：A 解析：金属材料屈服强度与抗拉强度正相关。
259. 金属材料在室温时抵抗氧化性气氛腐蚀的能力，称为抗氧化性。【判断】 正确答案：B 解析：抗氧化性指高温下抵抗氧化的能力，非室温。
260. 铝比铜的密度小，熔点也比铜低。【判断】 正确答案：A 解析：铝密度、熔点均低于铜。
261. 含铁素体多的钢，比如低碳钢，其特点为软而韧。【判断】 正确答案：A 解析：低碳钢铁素体占比高，塑性韧性好，质地较软。
262. 冲击韧度和冲击吸收功的单位都是焦耳。【判断】 正确答案：B 解析：冲击吸收功单位为焦耳，冲击韧度单位为 J/cm²。
263. 焊接结构中一般会产生焊接残余应力，容易导致产生延迟裂纹，因此重要的焊接结构在焊后应该进行消除应力正火。【判断】 正确答案：B 解析：消除焊接残余应力应采用退火处理，非正火。
264.20G 钢属于低合金钢。【判断】 正确答案：B 解析：20G 属于优质碳素结构钢，非低合金钢。
265. 钢的密度比灰铸铁的密度大。【判断】 正确答案：A 解析：钢的密度大于灰铸铁。
266. 铜及铜合金的焊接特点是难融合，易变形，容易产生气孔，容易产热裂纹。【判断】 正确答案：A 解析：铜合金导热快、膨胀系数大，焊接易出现上述问题。
267. 某些钢材淬硬倾向大，焊后冷却过程中，由于相变产生很脆的马氏体，在焊接应力和氢的共同作用下会引起开裂，最终形成热裂纹。【判断】 正确答案：B 解析：该条件下形成的是冷裂纹，非热裂纹。
268. 珠光体的性能介于奥氏体和渗碳体之间，结构钢很多用的是珠光体。【判断】 正确答案：B 解析：珠光体性能介于铁素体与渗碳体之间。
269. 调质即淬火和高温回火的综合热处理工艺，可以得到韧性和强度最好的配合，获得良好的综合力学性能。【判断】 正确答案：A 解析：调质处理定义为淬火 + 高温回火，可优化材料综合力学性能。
270. 金属中只有铜是红色的。【判断】 正确答案：A 解析：常规金属中仅铜呈现红色。
271. 铝粉和镁粉的自燃点是一个较高的温度值，而不是一个范围。【判断】 正确答案：B 解析：铝粉、镁粉自燃点为温度范围，非固定值。
272. 渗碳体指少量的碳和其他合金元素固溶于铁中的固溶体。【判断】 正确答案：B 解析：渗碳体是铁与碳形成的金属化合物，非固溶体。
273. 焊接工艺只能用于金属材料之间的连接，不能用于其他材料的连接。【判断】 正确答案：B 解析：焊接可用于金属与非金属、非金属之间连接。
274. 员工心态安全文化是指安全文化中精神层次的文化。从本质上看，它是人的思想、情感和意志的综合表现，是人对外部客观世界和自身内心世界的认识能力与辨识结合的综合体现，其目的就是要提高职工的 ()。【单选】 □A. 知识水平和生产能力 □B. 安全意识和安全思维 □C. 工作效率和反应能力 □D. 文化水平和思想态度 正确答案：B 解析：心态安全文化核心是提升职工安全意识与思维。
275. 人的安全知识、安全意识、安全态度、安全价值体系、安全认识观属于安全文化中 () 部分。【单选】 □A. 安全的物质文化 □B. 安全的行为文化 □C. 安全的观念文化 □D. 安全的制度文化 正确答案：C 解析：安全知识、意识、价值观属于观念文化范畴。
276. 安全文化是人类在生产、生活、生存活动中，为保护身心安全与健康所创造的有关 () 的总和。【单选】 □A. 安全理念 □B. 安全价值观 □C. 物质财富和精神财富 □D. 意识形态 正确答案：C 解析：安全文化是安全相关物质与精神财富总和。
277. 物质安全文化建设的目标是实现人、机、环境系统的 (), 这是人类长期追求的目标，也是企业安全文化建设的必然要求。【单选】 □A. 本质安全化 □B. 系统和谐化 □C. 高效生产化 □D. 最大效益化 正确答案：A 解析：物质安全文化目标是实现人、机、环境本质安全化。
278. 以下哪些属于公共安全文化的内容 ()。【多选】 □A. 社区安全文化 □B. 交通安全文化 □C. 消防安全文化 □D. 休闲娱乐安全文化 正确答案：A|B|C|D 解析：公共安全文化包含社区、交通、消防、娱乐等多类安全文化。
279. 安全文化建设评价过程中，《评价工作实施方案》中应包括 ()、实施计划等内容，并应报送评价组织机构批准。【多选】 □A. 评价方法 □B. 评价样本 □C. 访谈提纲 □D. 测评问卷 正确答案：A|B|C|D 解析：评价实施方案需包含方法、样本、提纲、问卷、计划等内容。
280. 安全文化由物质文化、行为文化、观念文化组成，下列属于行为文化范畴的是 ()。【多选】 □A. 生活中的饮食习惯 □B. 穿过十字街的行动方式 □C. 买票时的排队行为 □D. 工人操作规范程度 正确答案：A|B|C|D 解析：行为文化涵盖生活、交通、公共秩序、作业操作等行为。
281. 行为规范是企业安全文化建设的基本要素之一。程序是行为规范的重要组成部分。程序的建立和执行应 ()。【多选】 □A. 识别并说明主要的风险，简单易懂，便于实际操作 □B. 由正式文件予以发布 □C. 通过强化培训，向员工阐明在程序中给出特殊要求的原因 □D. 鼓励员工对程序的执行保持质疑的安全态度，必要时采取更加保守的行动并寻求帮助 正确答案：A|B|C|D 解析：程序建立执行需风险明确、文件发布、培训到位、鼓励质疑。
282. 安全文化分为三个层次 ()。【多选】 □A. 直观的表层文化 □B. 企业安全管理体制的中层文化 □C. 安全意识形态的深层文化 □D. 底层安全文化 正确答案：A|B|C 解析：安全文化分表层、中层、深层三个层次。
283. 企业的安全文化是多层次的复合体，由 () 组成。【多选】 □A. 物质安全文化 □B. 制度安全文化 □C. 精神安全文化 □D. 价值和行为规范安全文化 正确答案：A|B|C|D 解析：企业安全文化由物质、制度、精神、价值行为规范文化组成。
284. 在安全文化建设过程中，紧紧围绕 "安全 - 健康 - 文明 - 环保" 的理念，通过采取 ()、习惯培养等一系列方法，既推进安全文化建设的深入发展，又丰富安全文化的内涵。【多选】 □A. 管理控制 □B. 精神激励 □C. 环境感召 □D. 心理调适 正确答案：A|B|C|D 解析：安全文化建设可采用管理、激励、环境、心理调适等方法。
285. 企业应充分提供安全文化建设的保障条件，包括 ()。【多选】 □A. 明确安全文化建设的领导职能，建立领导机制 □B. 确定负责推动安全文化建设的组织机构与人员，落实其职能 □C. 保证必需的建设资金投入 □D. 配置适用的安全文化信息传播系统 正确答案：A|B|C|D 解析：安全文化保障需明确领导、落实机构、保障资金、配置传播系统。
286. 行为规范是企业安全文化建设的基本要素之一。行为规范的建立和执行应 ()。【多选】 □A. 广泛听取员工意见，建立持续改进机制 □B. 由正式文件予以发布 □C. 通过各级管理者或被授权者观测员工行为，实施有效监控和缺陷纠正 □D. 细化有关安全生产的各项规章制度和操作程序 正确答案：A|B|C|D 解析：行为规范建立需听取意见、文件发布、行为监控、细化制度。
287. 企业应建立包括 () 等在内的安全承诺。【多选】 □A. 安全价值观 □B. 安全愿景 □C. 安全使命 □D. 安全目标 正确答案：A|B|C|D 解析：安全承诺包含价值观、愿景、使命、目标。
288. 所有承包商对企业的安全绩效改进均可做出贡献。企业应建立让承包商参与安全事务和改进过程的机制，包括 ()。【多选】 □A. 应将与承包商有关的政策纳入安全文化建设的范畴 □B. 应加强与承包商的沟通和交流，必要时给予培训，使承包商清楚企业的要求和标准 □C. 应让承包商参与工作准备、风险分析和经验反馈等活动 □D. 倾听承包商对企业生产经营过程中所存在的安全改进机会的意见 正确答案：A|B|C|D 解析：承包商参与安全管理需纳入范畴、沟通培训、参与活动、听取意见。
289. 安全意识来源于人们 () 相结合的实践，又反过来支配安全生产的复杂心理过程。【多选】 □A. 安全生产经验 □B. 安全管理科学知识 □C. 安全规章制度 □D. 安全投入水平 正确答案：A|B 解析：安全意识源于安全生产经验与安全管理知识结合。
290. 企业安全文化由安全物质文化、安全制度文化和安全行为文化，下列属于物质文化范畴的是 ()。【多选】 □A. 安全食品 □B. 安全阀 □C. 保险丝 □D. 火灾报警器 正确答案：A|B|C|D 解析：安全物质文化包含安全产品、设备、装置、器材。
291. 安全文化的组成部分包括 ()。【多选】 □A. 安全的物质文化 □B. 安全的行为文化 □C. 安全的观念文化 □D. 安全的个人文化 正确答案：A|B|C 解析：安全文化由物质、行为、观念文化组成。
292. 安全文化中的制度安全文化建设的主要内容包括 ()。【多选】 □A. 建立健全的企业安全管理制度 □B. 建立完善企业安全管理各项基本法规、标准 □C. 高效地运作建立的各项制度、标准 □D. 定期进行安全文化宣传活动 正确答案：A|B|C 解析：制度安全文化建设含制度建立、法规完善、高效执行。
293. 良好安全文化的主要作用有 ()。【多选】 □A. 凝聚作用 □B. 导向作用 □C. 规范作用 □D. 激励作用 正确答案：A|B|C|D 解析：安全文化具有凝聚、导向、规范、激励作用。
294. 企业应建立的安全承诺，应 ()。【多选】 □A. 切合企业特点和实际，反映共同安全志向 □B. 明确安全问题在组织内部具有最高优先权 □C. 声明所有与企业安全有关的重要活动都追求卓越 □D. 含义清晰明了，并被全体员工和相关方所知晓和理解 正确答案：A|B|C|D 解析：安全承诺需贴合实际、安全优先、追求卓越、清晰易懂。
295. 安全文化建设骨干训练内容可包括 ()。【多选】 □A. 理论 □B. 事例 □C. 经验 □D. 实施方法 正确答案：A|B|C|D 解析：骨干训练包含理论、案例、经验、实施方法。
296. 安全文化建设评价项目完成后，评价工作组要进行评价工作总结，将 () 等形成书面报告，报送评价组织机构，同时建立好评价工作档案。【多选】 □A. 工作背景 □B. 实施过程 □C. 存在的问题 □D. 建议 正确答案：A|B|C|D 解析：评价总结需包含背景、过程、问题、建议。
297. 以下属于企业安全文化范畴的有 ()。【多选】 □A. 企业安全生产的奋斗目标和进取精神 □B. 为保护职工身心安全与健康而创造的安全而舒适的生产、生活环境和条件 □C. 安全的价值观、安全的审美观 □D. 企业的安全风貌、习俗 正确答案：A|B|C|D 解析：企业安全文化涵盖目标、环境、价值观、风貌习俗。
298. 根据企业安全文化的定义，下列选项中哪些属于企业安全文化 ()。【多选】 □A. 杜邦公司员工将公司有关 "铅笔不得笔尖朝上插放，以防伤人"、"打开的抽屉必须及时关闭，以防人员碰撞" 等有关规定融入生活工作，成为一种安全习惯 □B. 壳牌公司和员工始终坚持 "零死亡" 安全目标 □C. 某公司将 "接受不购买工伤保险" 作为员工入职的条件 □D. 某施工单位和员工将 "必须佩戴安全帽、安全带" 作为进行高处作业的条件，如违反，将受到相应惩罚 正确答案：A|B|D 解析：C 选项违反工伤保险规定，不属于安全文化。
299. 安全文化建设的步骤主要包括：建立机构、()。【多选】 □A. 制定规划 □B. 培训骨干 □C. 宣传教育 □D. 努力实践 正确答案：A|B|C|D 解析：安全文化建设步骤：建机构、定规划、训骨干、做宣传、抓实践。
300. 企业应建立正式的岗位适任资格评估和培训系统，确保全体员工充分胜任所承担的工作。【判断】 正确答案：A 解析：企业需建立岗位评估培训体系，保障员工胜任岗位。
301. 全体员工都应认识到自己负有对自身和同事安全做出贡献的重要责任。员工对安全事务的参与是落实这种责任的最佳途径。【判断】 正确答案：A 解析：员工安全责任与参与是安全管理核心要求。
302. 培养骨干是推动企业安全文化建设不断更新、发展，非做不可的事情。【判断】 正确答案：A 解析：骨干是安全文化建设的关键力量。
303. 人的安全知识、安全态度、安全价值体系、安全认识观属于安全的制度文化。【判断】 正确答案：B 解析：该内容属于安全观念文化，非制度文化。
304. 安全文化评价的目的是为了解企业安全文化现状或企业安全文化建设效果，而采取的系统化测评行为，并得出定性或定量的分析结论。【判断】 正确答案：A 解析：符合安全文化评价的定义与目的。
305. 狭义的安全文化是指企业安全文化，即是个人和集体的价值观、态度、能力和行为方式的综合产物。【判断】 正确答案：A 解析：狭义安全文化特指企业安全文化。
306. 企业在安全文化建设过程中，应充分考虑自身内部的和外部的文化特征，引导全体员工的安全态度和安全行为，实现在法律和政府监管要求基础上的安全自我约束，通过全员参与实现企业安全生产水平持续提高。【判断】 正确答案：A 解析：企业安全文化建设需结合内外特征，实现全员安全自律。
307. 员工心态安全文化是指安全文化中精神层次的文化。从本质上看，它是人的思想、情感和意志的综合表现，是人对外部客观世界和自身内心世界的认识能力与辨识结合的综合体现，其目的就是要提高职工的安全意识和安全思维。【判断】 正确答案：A 解析：符合心态安全文化的定义与目的。
308. 在实施安全文化建设评价前，由评价组织机构向选定的样本单位下达《评价通知书》。【判断】 正确答案：A 解析：安全文化评价前需下达评价通知书。
309. 行为规范是企业安全文化建设的基本要素之一。行为规范的建立和执行应明确各级各岗位人员在安全生产工作中的职责与权限。【判断】 正确答案：A 解析：行为规范需明确各岗位安全职责权限。
310. 安全文化是人类在生产、生活、生存活动中，为保护身心安全与健康所创造的有关物质财富的总和。【判断】 正确答案：B 解析：安全文化是物质与精神财富总和，非仅物质财富。
311. 企业应建立有效的安全学习模式，实现动态发展的安全学习过程，保证安全绩效的持续改进。【判断】 正确答案：A 解析：企业需建立动态安全学习体系，持续提升安全绩效。
312. 企业应建立的安全承诺，应切合企业特点和实际，反映共同安全志向。【判断】 正确答案：A 解析：安全承诺需贴合企业实际，体现共同安全目标。
313. 安全文化由物质文化、行为文化、观念文化组成，安全食品、安全阀、保险丝属于安全物质文化。【判断】 正确答案：A 解析：安全产品、设备属于物质安全文化。
314. 行为规范是企业安全文化建设的基本要素之一。行为规范的建立和执行应广泛听取员工意见，建立持续改进机制。【判断】 正确答案：A 解析：行为规范需听取员工意见，持续优化改进。
315. 杜邦公司员工将公司有关 "铅笔不得笔尖朝上插放，以防伤人"、"打开的抽屉必须及时关闭，以防人员碰撞" 等有关规定融入生活工作，成为一种安全习惯。这些规定属于杜邦公司的安全文化。【判断】 正确答案：A 解析：安全行为规范与习惯属于企业安全文化。
316. 行为规范是企业安全文化建设的基本要素之一。行为规范的建立和执行应引导员工理解和接受建立行为规范的必要性，知晓由于不遵守规范所引发的潜在不利后果。【判断】 正确答案：A 解析：需让员工理解行为规范意义与违规后果。
317. 安全意识来源于安全规章制度和安全投入水平相结合的实践，又反过来支配安全生产的复杂心理过程。【判断】 正确答案：B 解析：安全意识源于安全经验与管理知识，非规章制度与投入。
318. 企业应配置适用的安全文化信息传播系统。【判断】 正确答案：A 解析：企业需配备安全文化传播系统。
319. 企业应建立包括安全价值观、安全愿景、安全使命和安全目标等在内的安全承诺。【判断】 正确答案：A 解析：安全承诺包含价值观、愿景、使命、目标。
320. 企业实施安全文化评价时，由评价组织机构负责确定评价工作人员并成立评价工作组。必要时可选聘有关咨询专家或咨询专家组。咨询专家 (组) 的工作任务和工作要求由评价组织机构明确。【判断】 正确答案：A 解析：安全文化评价需组建工作组，可聘请专家。
321. 良好的安全文化主要有凝聚、导向、规范、激励等作用。【判断】 正确答案：A 解析：安全文化四大核心作用。
322. 安全行为激励是企业安全文化建设的基本要素之一。企业在审查和评估自身安全绩效时，只需使用事故发生率等消极指标。【判断】 正确答案：B 解析：安全绩效评估需结合消极指标与积极指标。
323. 企业应对自身安全文化建设情况进行定期的全面审核。【判断】 正确答案：A 解析：企业需定期全面审核安全文化建设情况。
324. 安全文化建设骨干训练内容可包括理论、事例、经验和实施方法等。【判断】 正确答案：A 解析：骨干训练涵盖理论、案例、经验、方法。
325. 物质安全文化建设的目标是实现人、机、环境系统的最大效益化，这是人类长期追求的目标，也是企业安全文化建设的必然要求。【判断】 正确答案：B 解析：物质安全文化目标是本质安全化，非最大效益化。
326. 安全观念文化、安全行为文化、安全制度文化、安全物质文化是企业安全文化的形态体系。【判断】 正确答案：A 解析：企业安全文化四大形态体系。
327. 建立完善企业安全管理各项基本法规、标准，并且高效地运作这些法规、标准，使其真正落实到安全生产的实处，这些都属于制度安全文化建设的内容。【判断】 正确答案：A 解析：制度建设与执行属于制度安全文化。

382. 劳动能力鉴定要处理好医务劳动鉴定与伤残等级鉴定的关系，要聘请有经验、有良好医德和有医务劳动鉴定资格的医学专家成立鉴定技术小组，坚决杜绝一人鉴定的现象。【判断】 正确答案：A 解析：劳动鉴定需专家组鉴定，禁止单人鉴定。
383. 劳动合同期满终止，或者职工本人提出解除劳动合同的，由用人单位支付一次性工伤医疗补助金和伤残就业补助金。【判断】 正确答案：A 解析：解除合同单位需支付工伤医疗与就业补助金。
384. 职工在发生工伤后，经治疗伤情相对稳定后存在残疾、影响劳动能力的，应当依法进行劳动功能障碍程度和生活自理障碍程度的等级鉴定，及劳动能力鉴定。【判断】 正确答案：A 解析：工伤致残需进行劳动能力鉴定。
385. 工伤保险作为社会福利，其保障内容比商业意外保险要丰富。除了在工作时的意外伤害，也包括职业病的报销、急性病猝死保险金、丧葬补助 (工伤事故)。【判断】 正确答案：A 解析：工伤保险保障范围广于商业意外险。
386. 工伤保险作为社会保险制度的一个组成部分，是国家通过立法强制实施的，是国家对职工履行的社会责任，也是职工应该享受的基本权利。【判断】 正确答案：A 解析：工伤保险是法定强制社保。
387. 劳动能力鉴定时，专家组对伤残、病残职工的状况，写出定性、定量的诊断意见，由劳动鉴定委员会确定伤病或伤残等级，并发给等级证明书。【判断】 正确答案：A 解析：劳动能力鉴定流程规定。
388. 工伤保险的适用范围包括中华人民共和国境内的企业、事业单位、社会团体、民办非企业单位、基金会、律师事务所、会计师事务所等组织和有雇工的个体工商户。【判断】 正确答案：A 解析：工伤保险适用全部用人单位。
389. 劳动能力鉴定由用人单位、工伤职工或者其近亲属向设区的市级劳动能力鉴定委员会提出申请，并提供工伤认定决定和职工工伤医疗的有关资料。【判断】 正确答案：A 解析：劳动能力鉴定申请主体与流程。
390. 任何职工发生工伤事故或遭受职业疾病，都应毫无例外地获得工伤保险待遇。【判断】 正确答案：A 解析：工伤保险无差别保障。
391. 职工因工死亡，其直系亲属享受丧葬补助金为 6 个月的全国上年度职工月平均工资。【判断】 正确答案：B 解析：丧葬补助金为统筹地区平均工资，非全国。
392. 未参加工伤保险期间用人单位职工发生工伤的，由该用人单位按照《工伤保险条例》规定的工伤保险待遇项目和标准支付费用。【判断】 正确答案：A 解析：未参保单位自行承担工伤费用。
393. 在赔付方面，医疗费用通常是由工伤保险先报销后，商业保险扣除已赔付部分对剩下的全额进行赔偿。【判断】 正确答案：A 解析：工伤与商业保险医疗费用赔付规则。
394. 工伤保险实行无过错责任原则。无论工伤事故的责任归于用人单位还是职工个人或第三者，用人单位均应承担保险责任。【判断】 正确答案：A 解析：工伤保险无过错补偿原则。
395. 劳动鉴定委员会应认真审定申请及附件材料，对资料不全或情况不明的要求补充材料。【判断】 正确答案：B 解析：劳动鉴定委员会需一次性告知补充材料，非仅要求补充。
396. 如果申请人超过了 15 日才向上一级劳动能力鉴定委员会提出申请，上级劳动能力鉴定委员会可以以超过时效为由不予受理。【判断】 正确答案：A 解析：再次鉴定申请超 15 日不予受理。
397. 公务员和参照公务员法管理的事业单位、社会团体的工作人员因工作遭受事故伤害或者患职业病的，由本人支付费用。具体办法由国务院社会保险行政部门会同国务院财政部门规定。【判断】 正确答案：B 解析：公务员工伤费用由单位承担，非个人。
398. 有 A 和 B 两家建筑公司，A 公司的职工人数是 200 人，B 公司的职工人数是 500 人，A 公司在上一年度的施工作业中造成 2 名职工重伤，B 公司在上一年度的施工作业中造成 4 名职工重伤。A 公司和 B 公司上一年度的千人重伤率分别是 ()。【单选】 □A.1 和 4 □B.5 和 8 □C.6 和 7 □D.10 和 8 正确答案：D 解析：A：2/200×1000=10；B：4/500×1000=8。
399. 甲企业设机关部门 4 个，员工 24 人；生产车间 6 个，员工 450 人；辅助车间 1 个，员工 26 人。员工每天工作 8h, 全年工作日数 300 天。2012 年，甲企业发生各类生产安全事故 3 起，2 名员工死亡。甲企业 2012 年百万工时死亡率为 ()。【单选】 □A.2.06 □B.1.75 □C.1.67 □D.1.53 正确答案：C 解析：总工时 =(24+450+26)×8×300=1200000；死亡率 = 2/1200000×1000000≈1.67。
400. 某施工现场出现车辆伤害事故，铲车制动系统失灵溜车，年仅 21 岁的作业人员李某背对铲车正在进行作业，铲车斗齿将其撞倒，经送医及时抢救，李某得以生还，但身体多处骨折，腰部脊椎断裂，损失工作日数超过 6000 日。依据《企业职工伤亡事故分类》(GB6441), 李某伤害程度为 ()。【单选】 □A. 轻伤 □B. 重伤 □C. 骨折 □D. 永久性全失能伤害 正确答案：D 解析：损失工作日超 6000 日为永久性全失能伤害。
401. 某地下铁矿发生冒顶片帮事故，造成刘某和程某当场死亡，钻机损坏，停产 15 日。在事故救援过程中，参与救援的张某被铲运机碰撞，造成腰椎压缩骨折。该起事故造成的下列经济损失中，属于间接经济损失的是 ()。【单选】 □A. 钻机损坏 □B. 张某的医疗费用 □C. 刘某和程某的抚恤费用 □D. 补充新员工的培训费用 正确答案：D 解析：人员培训费用属于间接经济损失，其余为直接损失。
402. 在事故统计与分析中，下列选项中不属于绝对指标的是 ()。【单选】 □A. 事故起数 □B. 千人重伤率 □C. 直接经济损失 □D. 死亡人数 正确答案：B 解析：千人重伤率属于相对指标。
403. 某市 2013 年度统计的 4 个行业发生事故的人员伤亡和经济损失如下：机械行业，永久性全失能伤害 1 人，永久性部分失能伤害 3 人，人身伤亡费用 150 万元，罚款 5 万元，停产减产损失价值 80 万元；矿山行业，永久性全失能伤害 2 人，永久性部分失能伤害 4 人，人身伤亡费用 300 万元，罚款 10 万元，停产减产损失价值 40 万元；商贸行业，永久性全失能伤害 1 人，永久性部分失能伤害 5 人，人身伤亡费用 130 万元，罚款 3 万元，停产减产损失价值 40 万元；危险化学品行业，永久性全失能伤害 1 人，永久性部分失能伤害 6 人，人身伤亡费用 180 万元，罚款 7 万元，停产减产损失价值 120 万元。依据《事故伤害损失工作日标准》(GB/T15499), 按照永久性全失能伤害损失工作日 6000 日，永久性部分失能伤害平均 450 日计算。下列说法中正确的是 ()。【单选】 □A. 机械：直接经济损失 155 万元，损失工作日数 7250 日 □B. 矿山：直接经济损失 340 万元，损失工作日数 12000 日 □C. 商贸：直接经济损失 133 万元，损失工作日数 8250 日 □D. 危险化学品：直接经济损失 180 万元，损失工作日数 8700 日 正确答案：C 解析：商贸：直接损失 130+3=133 万；工作日 6000+5×450=8250。
404. 下列选项中关于主次图分析法说法不正确的是 ()。【单选】 □A. 主次图分析法又叫 ABC 管理法 □B. 由意大利经济学家提出 □C. 主次图是直方图与散点图的组合 □D. 主次图可以直观地显示出属于各分类的频数的大小及其占累积总数的百分比 正确答案：C 解析：主次图是直方图与折线图组合，非散点图。
405. 某公司是一家工程建设公司，多年来积累了大量的安全生产数据。该公司拟用统计图方式分析事故与隐患之间的关系，以便作为安全生产管理决策的依据。下列统计图中，适用于描述事故与隐患之间关系变化的是 ()。【单选】 □A. 百分条图 □B. 雷达图 □C. 散点图 □D. 直方图 正确答案：C 解析：散点图适用于分析两个变量关系。
406. 事故统计分析是运用 () 来研究事故发生规律的一种方法。【单选】 □A. 数学分析 □B. 数理统计 □C. 综合分析 □D. 图标统计 正确答案：B 解析：事故统计分析采用数理统计方法。
407. 某石油化工企业在检修生产线过程中，发生一起因人员误操作而引起的化学品泄漏事故，导致 1 名职工重伤和周边一条河流被污染，生产线设备损失 20 万元。在事故处理过程中，受伤职工的医疗费、工伤补助等费用共计 3 万元，安全生产监督管理部门对该企业行政处罚 2 万元并责令停产整顿，企业在停产期间损失为 4 万元，处理被污染河流的费用为 10 万元。本次事故的间接经济损失费用为 ()。【单选】 □A.12 万元 □B.14 万元 □C.16 万元 □D.19 万元 正确答案：B 解析：间接损失 = 停产 4 万 + 治污 10 万 = 14 万。
408. 某煤业集团 2011 年煤炭产量 1 亿吨，死亡人数 20 人。2012 年该集团煤炭产量 0.8 亿吨，死亡人数为 10 人。该煤业集团百万吨死亡率下降 ()。【单选】 □A.20% □B.37.5% □C.12.5% □D.7.5% 正确答案：B 解析：2011 年：20/100=0.2；2012 年：10/80=0.125；下降 (0.2-0.125)/0.2=37.5%。
409. 某企业调试新引进的化工产品生产线时发生事故，导致 1 名员工重伤和附近一条河流污染。在事故处理工程中，该员工的医疗、工伤补助等费用共计 2 万元，地方安监部门给予行政罚款 1 万元，生产线事后修复花费 20 万元，处理河流污染费用 10 万元。依据《企业职工伤亡事故经济损失统计标准》(GB/T6721), 本次事故造成的直接经济损失费用是 ()。【单选】 □A.2 万元 □B.3 万元 □C.23 万元 □D.33 万元 正确答案：C 解析：直接损失 = 医疗 2 万 + 罚款 1 万 + 修复 20 万 = 23 万。
410. 下列各项中，不属于工矿企业类伤亡事故统计指标体系的是 ()。【单选】 □A. 金属或非金属矿企业伤亡事故统计指标 □B. 工商企业伤亡事故统计指标 □C. 道路交通事故统计指标 □D. 烟花爆竹伤亡事故统计指标 正确答案：C 解析：道路交通事故属于交通统计指标，非工矿企业。
411.() 就是将大量的事故资料进行总结分类，形成书面分析材料或填入统计表或绘制统计图，使大量的零星资料系统化、条理化、科学化。【单选】 □A. 描述统计法 □B. 综合分析法 □C. 分组分析法 □D. 算术平均法 正确答案：B 解析：综合分析法定义。
412. 某火灾事故造成一次死亡 5 人，按照《企业职工伤亡事故经济损失统计标准》(GB6721) 进行计算，该起事数的总损失工作日数是 ()。【单选】 □A.15000 日 □B.30000 日 □C.50000 日 □D.45000 日 正确答案：B 解析：死亡 1 人损失 6000 日，5 人 30000 日。
413. 下列各项中，不属于火灾事故统计指标的是 ()。【单选】 □A. 特大事故起数 □B. 特别重大事故死亡人数 □C.10 万人火灾死亡率 □D. 生产性事故死亡人数 正确答案：C 解析：10 万人火灾死亡率不属于火灾事故统计指标。
414. 事故统计分析方法是以研究伤亡事故统计为基础的分析方法，常用的伤亡事故统计的方法有 ()。【多选】 □A. 描述统计法 □B. 直接法 □C. 推理统计法 □D. 标准差法 □E. 方差法 正确答案：A|C 解析：事故统计常用描述统计与推理统计法。
415. 某家具厂发生火灾，加工车间厂房局部损毁，多台木工开料机、雕刻机报废，原材料、半成品、成品都有不同程度损失，所幸没有人员伤亡，清理、修复直至复工花费时间一个月。根据《企业职工伤亡事故经济损失统计标准》(GB6721), 下列各项费用损失可以列入直接经济损失的是 ()。【多选】 □A. 停产期间企业盈利减少 120 万元 □B. 木工开料机、木工雕刻机报废损失固定资产 320 万元 □C. 加工车间厂房修复费用 80 万元 □D. 政府对家具厂罚款 100 万元 □E. 停工不停薪，照发停工一个月工资 60 万元 正确答案：B|C|D 解析：固定资产损失、修复费、罚款属于直接损失。
416. 事故统计与分析的基本任务包括 ()。【多选】 □A. 对每起事故进行统计调查，弄清事故发生的情况和原因 □B. 对一定时间、一定范围内事故发生的情况进行测定 □C. 对一定时间、一定范围内事故发生的情况，趋势以及事故参数的分布进行分析、归纳和推断 □D. 落实事故发生的责任人员 正确答案：A|B|C 解析：事故统计任务不含责任认定。
417. 事故补充统计项目不包括 ()。【多选】 □A. 损失工作日 □B. 不安全状态 □C. 不安全行为 □D. 经济损失 正确答案：B|C 解析：补充统计不含不安全状态与行为。
418. 事故补充统计项目包括 ()。【多选】 □A. 事故原因 □B. 致害物 □C. 伤害方式 □D. 受伤害人情况 正确答案：A|B|C|D 解析：补充统计包含原因、致害物、方式、伤者情况。
419. 事故统计项目包括 ()。【多选】 □A. 伤害程度 □B. 受伤性质 □C. 伤害部位 □D. 事故类别 正确答案：A|B|C|D 解析：事故统计核心项目。
420. 在伤亡事故经济损失中，关于固定资产损失价值的计算，下列说法正确的有 ()。【多选】 □A. 固定资产等均按账面值减去残值计算 □B. 报废的固定资产，以固定资产净值减去残值计算 □C. 计算前，应衡量经济损失的评价指标是否合理 □D. 固定资产等均以企业实际成本减去残值计算 □E. 损坏的固定资产，以修复费用计算 正确答案：B|E 解析：报废固定资产按净值减残值，损坏按修复费。
421. 下列各项中，可以计入间接经济损失的统计范围的内容有 ()。【多选】 □A. 停产、减产损失价值 □B. 工作损失价值 □C. 资源损失价值 □D. 医疗费用 □E. 现场抢救费用 正确答案：A|B|C 解析：间接损失含停产、工作、资源损失，医疗、抢救为直接损失。
422. 常见的事故统计与分析方法包括 ()。【多选】 □A. 综合分析法 □B. 主次图分析法 □C. 统计图表法 □D. 相对指标比较法 正确答案：A|B|C|D 解析：四种常用事故统计分析方法。
423. 对一定时间、一定范围内事故发生的情况，趋势以及事故参数的分布进行 () 是事故统计与分析的基本任务之一。【多选】 □A. 分析 □B. 归纳 □C. 收集 □D. 推断 正确答案：A|B|D 解析：统计任务含分析、归纳、推断，不含收集。

431. 事故按形成因素可以将事故分为责任事故和非责任事故。以下属于责任事故的是 ()。【单选】 □A. 自然灾害 □B. 由于人员过失而引起的伤亡事故 □C. 新产品、新工艺、新技术使用时无法预见的事故 □D. 规程、规范、标准执行实施以外未规定的意外因素造成的事故 正确答案：B 解析：人员过失导致的事故为责任事故。

570. 机械拆除方法的适用范围包括 ()。【多选】 □A. 砖木结构 □B. 框架结构等高度不超过 30m 的建筑物 □C. 板式结构等高度不超过 30m 的建筑物 □D. 地下构筑物 正确答案：B|C|D 解析：机械拆除适用于框架、板式、地下结构。
571. 采用 () 方法拆除建筑物时，应严格遵守自上而下的作业程序进行，严禁数层同时拆除。【多选】 □A. 机械 □B. 人工 □C. 爆破 □D. 以上都是 正确答案：A|B 解析：机械、人工拆除需自上而下，爆破无此要求。
572. 某施工队在拆除需要部分保留的混合结构建筑物时，采用的拆除方法是机械拆除。【判断】 正确答案：B 解析：部分保留建筑应采用人工拆除。
573. 可以采用人工方法先行拆除建筑物的栏杆、楼梯和楼板，再进行整体拆除。【判断】 正确答案：B 解析：栏杆楼梯楼板需与整体同步拆除。
574. 拆除建筑物时，楼板上不宜多人聚集和堆放材料。【判断】 正确答案：A 解析：楼板严禁集中站人与堆放材料。
575. 施工机械设备的拆除按照其安装的逆程序来进行。【判断】 正确答案：A 解析：设备拆除遵循先装后拆、后装先拆逆程序。
576. 用机械拆除方法拆除土石围堰时，应从上至下、逐层、逐段进行。【判断】 正确答案：A 解析：机械拆除围堰需自上而下分层分段。
577. 采用人工方法拆除建筑物的栏杆、楼梯和楼板时，应和整体拆除进程相配合。【判断】 正确答案：A 解析：人工拆除辅助构件需与整体配合。
578. 某施工队在对建筑物局部块体进行拆除时，采用的拆除方法是静力破碎。【判断】 正确答案：A 解析：局部块体拆除适宜静力破碎。
579. 机械拆除土石围堰时，严禁超载作业或任意扩大范围作业。【判断】 正确答案：A 解析：机械拆除禁止超载与超范围作业。
580. 拆除建筑物钢 (木) 屋架时，应采用绳索将其栓牢，待起重机吊稳后，方可进行气焊切割作业。【判断】 正确答案：A 解析：屋架拆除需先加固吊稳再切割。
581. 拆除钢板 (管) 桩围堰时，宜先采用振动拔桩机拔出钢板 (管) 桩后，再采用机械进行拆除。【判断】 正确答案：A 解析：钢板桩先拔桩后机械拆除。
582. 建筑基础或局部块体的拆除最适宜采用机械拆除。【判断】 正确答案：B 解析：基础块体优先静力破碎。
583. 在拆除工程中，拆除钢板 (管) 桩围堰时，宜先采用振动拔桩机拔出钢板 (管) 桩后，再采用机械进行拆除。振动拔桩机作业时，应垂直向下，边振边拔；拔出的钢板 (管) 桩应码放整齐、稳固；应严格遵守起重机和振动拔桩机的安全技术规程。【判断】 正确答案：B 解析：拔桩机应垂直向上作业，非向下。
584. 特殊情况下，采用推倒方法拆除建筑物时，建筑物推倒前，应发出警示信号，待全体工作人员避至安全地带后，才能进行。【判断】 正确答案：A 解析：推倒拆除需先预警再作业。
585. 某施工队在拆除高度不超过 30m 的混合结构建筑物时，采用的拆除方法是机械拆除。【判断】 正确答案：A 解析：30m 以下混合结构适用机械拆除。
586. 施工机械设备的拆除与安装的程序保持一致。【判断】 正确答案：B 解析：拆除为安装逆程序，非一致。
587. 某施工队在拆除混凝土围堰时，先采用爆破法破碎混凝土后，再采用人工拆除的顺序进行施工。【判断】 正确答案：B 解析：混凝土围堰爆破后应机械拆除。
588. 爆破拆除方法适用于拆除任何建筑物、构筑物、各类地下、水下构筑物。【判断】 正确答案：B 解析：爆破拆除有适用范围限制，非所有建筑。
589. 特种设备和设施的拆除应由有相应资质的单位和持特种作业操作证的专业人员来执行。【判断】 正确答案：A 解析：特种设备拆除需资质单位与持证人员。
590. 大型施工机械设备拆除安全技术中，不稳定的构件应设有缆风钢丝绳，缆风绳的安全系数不应小于 2.5。【判断】 正确答案：B 解析：缆风绳安全系数不小于 3.5。
591. 某施工队在拆除高度不超过 30m 的板式结构建筑物时，可以采用人工拆除法拆除。【判断】 正确答案：B 解析：板式结构适用机械拆除。
592. 人工拆除方法适用于拆除砖木结构、混合结构以及上述结构的分离和部分保留拆除项目。【判断】 正确答案：A 解析：人工拆除适用范围正确。
593. 在拆除工程中，采用机械或人工方法拆除建筑物时，可以数层同时拆除。【判断】 正确答案：B 解析：严禁多层同时拆除。
594. 采用静力破碎方法拆除建筑物时，若建筑基础暴露和破碎后，发生异常情况，应及时停止作业。查清原因并采取相应措施后，方可继续施工。【判断】 正确答案：A 解析：静力破碎异常需停工处理。
595. 用爆破方法拆除建筑物时，爆破后，如果发现保留的结构部分有危险征兆，要采取安全措施后，才能进行工作。【判断】 正确答案：A 解析：爆破后需检查保留结构安全再施工。
596. 下列关于滑模模板拆除的说法不正确的是 ()。【单选】 □A. 滑模模板拆除应均匀对称，按顺序分段进行 □B. 不得大面积撬落和拉倒 □C. 在做好安全隔离措施时，可以大面积撬落或拉倒 □D. 拆下的模板、设备应用绳索吊运至指定地点 正确答案：C 解析：滑模模板严禁大面积撬落拉倒。
597. 安装和拆除大模板时，未加支撑或自稳角不足的大模板，存放方式不正确的是 ()。【多选】 □A. 专用的堆放架内 □B. 卧倒平放 □C. 直立放置 □D. 靠在其他模板或构件上 正确答案：C|D 解析：大模板禁止直立无支撑、倚靠存放。
598. 模板的结构设计，在所有可能产生的荷载中要选择最不利的组合验算模板整体结构和构件及配件的 ()。【多选】 □A. 强度 □B. 稳定性 □C. 整体性 □D. 刚度 正确答案：A|B|D 解析：模板验算强度、稳定性、刚度。
599. 支、拆模板时，不应在同一垂直面内立体作业，无法避免立体作业时，应设置专项安全防护设施。【判断】 正确答案：A 解析：模板作业禁止垂直立体交叉，必需时设防护。
600. 模板拉条不应弯曲，拉条直径不应小于 ()。【单选】 □A.10mm □B.12mm □C.14mm □D.16mm 正确答案：C 解析：模板拉条直径不小于 14mm。
601. 拆除模板时，严禁操作人员站在正拆除的模板上。【判断】 正确答案：A 解析：严禁站在被拆模板上作业。
602. 钢模台车施工过程中，台车行走前，应清除轨道上及其周围的障碍物，台车行走时应有人监护。【判断】 正确答案：A 解析：钢模台车行走需清障、监护。
603. 高处、复杂结构模板的安装与拆除，应按 () 要求进行，并应有安全措施。【单选】 □A. 安全技术专篇 □B. 施工组织设计 □C. 立体交叉作业指导书 □D. 立体交叉作业施工方案 正确答案：B 解析：高处复杂模板按施工组织设计施工。
604. 安装和拆除大模板时，吊运过程中，操作人员应随大模板起落。【判断】 正确答案：B 解析：严禁人员随大模板吊运起落。
605. 滑膜施工操作平台上的施工荷载应均匀对称，严禁超载。【判断】 正确答案：A 解析：滑模平台荷载需均匀，禁止超载。
606. 钢模台车在有坡度的轨道上使用时，台车应配置灵敏、可靠的 ()。【单选】 □A. 限位装置 □B. 刹车装置 □C. 警示装置 □D. 保险装置 正确答案：B 解析：坡道台车需配置可靠刹车装置。
607. 滑动模板施工时，施工电梯应安装 () 安全装置。【多选】 □A. 安全阀 □B. 柔性安全卡 □C. 限位开关 □D. 单向阀制动器 正确答案：B|C 解析：滑模施工电梯需装安全卡、限位开关。
608. 组合钢模板装拆时，下列做法不正确的是 ()。【单选】 □A. 上下应有人接应 □B. 钢模板及配件应随装拆随转运 □C. 拆下的模板应从高处扔下 □D. 中途停歇时，应把活动件放置稳妥，防止坠落 正确答案：C 解析：严禁从高处抛掷模板。
609. 下列关于拆除大模板的说法正确的是 ()。【单选】 □A. 先挂好吊钩，然后拆除拉条和连接件 □B. 先拆除拉条，然后挂好吊钩，再和连接件 □C. 先拆除连接件，然后挂好吊钩，再拆除连接件 □D. 先拆除拉条和连接件，然后挂好吊钩 正确答案：A 解析：大模板拆除先挂吊钩再拆连接件。
610. 大模板应按施工组织设计的规定分区堆放，各区之间无须保持安全距离。【判断】 正确答案：B 解析：大模板堆放需保持安全距离。
611. 滑动模板施工过程中，所有电气装置均接地，接地电阻应不大于 ()。【单选】 □A.2Ω □B.4Ω □C.5Ω □D.10Ω 正确答案：B 解析：滑模电气接地电阻≤4Ω。
612. 下列钢模板施工安全技术的规定不正确的是 ()。【单选】 □A. 对拉螺栓拧入螺帽的丝扣应有足够长度，两侧墙面模板上的对位螺栓孔应平直相对，穿插螺栓时，不应斜拉硬顶 □B. 钢模板应边安装边找正，若找正困难，可用铁锤或撬棍硬砸 □C. 高处作业时，连接件应放在箱盒或工具袋中，严禁散放 □D. 架设在钢模板、钢排架上的电线和使用的电动工具，应使用安全电压电源 正确答案：B 解析：钢模板严禁硬砸硬撬。
613. 大模板吊运过程中，为保障起重设备操作人员的安全，其应暂离工作岗位。【判断】 正确答案：B 解析：吊运时操作人员不得离岗。
614. 滑动模板制作应由施工企业专业工程师设计，() 审批。【单选】 □A. 项目经理 □B. 分管安全的副总 □C. 总工程师 □D. 分管设备的副总 正确答案：C 解析：滑模设计需企业总工程师审批。
615. 冬季进行滑膜施工，采用蒸汽养护时，蒸汽管路应有 (), 暖棚内严禁明火取暖。【单选】 □A. 安全警示标志 □B. 安全隔离设施 □C. 安全警示灯 □D. 烟雾报警器 正确答案：B 解析：蒸汽管路需设安全隔离设施。
616. 滑动模板制作、安装调试好后，由 () 部门联合检查验收签证，合格后方可投入使用。【多选】 □A. 技术 □B. 质检 □C. 安全 □D. 设备 正确答案：A|B|C 解析：滑模需技术、质检、安全联合验收。
617. 组合钢模板装拆时，散放的钢模板，应采用堆捆起吊。【判断】 正确答案：B 解析：散放模板不得捆扎起吊。
618. 下列关于大模板安装的说法不正确的是 ()。【单选】 □A. 大模板安装就位后，应焊牢拉杆、固定支撑 □B. 大模板未就位固定前，不应摘钩 □C. 大模板摘钩后不应再行撬动 □D. 撬动调整大模板后可不重新固定 正确答案：D 解析：大模板调整后必须重新固定。
619. 下列关于上下传送模板的说法正确的是 ()。【多选】 □A. 采用运输工具升降 □B. 用绳子系牢后升降 □C. 小模板可采用人工抛掷的方式 □D. 组合钢模板可采用人工抛掷的方式 正确答案：A|B 解析：模板传送需工具或系绳升降，禁止抛掷。
620. 在滑膜滑升过程中，应每班检查并调整水平、垂直偏差，防止平台扭转和水平位移，遵守设计规定的滑升速度与脱模时间。【判断】 正确答案：A 解析：滑模每班检查偏差，控制滑升速度。
621. 滑动模板施工应编制 (), 报监理审批后，对施工人员进行现场交底，并作好交底记录。【多选】 □A. 施工方案 □B. 安全技术专篇 □C. 作业指导书 □D. 施工组织设计 正确答案：A|C 解析：滑模需编制施工方案与作业指导书。
622. 模板在混凝土结构工程施工中是十分重要的组成部分，模板通常由 () 组成。【多选】 □A. 主体结构 □B. 模板面 □C. 支撑结构 □D. 连接配件 正确答案：B|C|D 解析：模板由面板、支撑、连接件组成。
623. 模板吊运过程应平稳流畅，不应将模板长时间悬置空中。【判断】 正确答案：A 解析：模板禁止长时间悬空悬挂。
624. 钢模台车的各层工作平台，应设防护栏杆，平台四周应设挡脚板，上下爬梯应有扶手，垂直爬梯应加护圈。【判断】 正确答案：A 解析：钢模台车防护设施齐全有效。
625. 木模板上如有预留孔 (洞), 安装完毕后应将孔 (洞) 口盖好；混凝土构筑物上的预留孔 (洞), 应在拆模后盖好孔 (洞) 口。【判断】 正确答案：A 解析：预留孔洞需及时覆盖防护。
626. 滑膜施工操作平台应设有消防、联络通信信号装置和供人员上下的设施。【判断】 正确答案：A 解析：滑模平台需配置消防、通讯、上下设施。
627. 模板的结构设计，必须能承受作用于模板结构上的所有垂直荷载和水平荷载。【判断】 正确答案：A 解析：模板设计需承受全部垂直与水平荷载。
628. 各种类型的大模板，应按设计制作。每块大模板应设有 ()。【多选】 □A. 操作平台 □B. 上下梯道 □C. 防护栏杆 □D. 存放小型工具和螺栓的工具箱 正确答案：A|B|C|D 解析：大模板需配平台、梯道、护栏、工具箱。
629. 关于高处拆模，下列说法正确的是 ()。【多选】 □A. 应有专人指挥 □B. 应标出危险区 □C. 应实行安全警戒 □D. 应暂停交通 正确答案：A|B|C|D 解析：高处拆模需指挥、警戒、封路。
630. 下列关于组合钢模板装拆的说法正确的是 ()。【多选】 □A. 组合钢模板装拆上下应有人接应 □B. 钢模板及配件应随装拆随转运 □C. 严禁从高处扔下钢模板 □D. 组合钢模板装拆中途停歇时，应把活动件放置稳妥，防止坠落 正确答案：A|B|C|D 解析：钢模板装拆安全要求正确。
631. 采用明排水法开挖基坑，在基坑开挖过程中设置的集水坑应 ()。【单选】 □A. 布置在基础范围以内 □B. 布置在基坑底部中央 □C. 布置在地下水走向的上游 □D. 经常低于挖土面 1.0m 以上 正确答案：C 解析：集水坑应布置在地下水上游。
632. 土石方施工区域不宜积水。当积水坑深度超过 () m 时，应设安全防护措施。【单选】 □A.0.5 □B.1 □C.1.5 □D.2 正确答案：A 解析：积水坑深度超 0.5m 需设防护。
633. 施工现场基坑排水采用深井 (管井) 排水方法时，所选择水泵的出水量与扬程应大于设计值的 ()。【单选】 □A.10%~30% □B.20%~30% □C.30%~40% □D.40%~50% 正确答案：B 解析：深井泵参数大于设计值 20%~30%。
634. 施工现场土质料场的排水宜采取 () 的排水措施。【单选】 □A. 截、排相结合，以截为主 □B. 截、排相结合，以排为主 □C. 集、排相结合，以集为主 □D. 集、排相结合，以排为主 正确答案：A 解析：料场排水以截为主、截排结合。
635. 在淤泥质黏土中开挖近 10m 深的基坑时，降水方法应优先选用 ()。【单选】 □A. 单级轻型井点 □B. 管井井点 □C. 电渗井点 □D. 深井井点 正确答案：C 解析：淤泥质黏土优先电渗井点降水。
636. 某大型基坑，施工场地标高为 ±0.000m, 基坑底面标高为 - 6.600m, 地下水位标高为 - 2.500m, 土的渗透系数为 60m/d, 则应选用的降水方式是 ()。【单选】 □A. 一级轻型井点 □B. 喷射井点 □C. 管井井点 □D. 深井井点 正确答案：C 解析：渗透系数大选用管井井点。
637. 土方开挖的降水深度约 16m, 土体渗透系数 50m/d, 可采用的降水方式有 ()。【多选】 □A. 轻型井点降水 □B. 喷射井点降水 □C. 管井井点降水 □D. 深井井点降水 正确答案：C|D 解析：深降水大渗透系数选用管井、深井井点。
638. 基坑的上、下部和四周必须设置排水系统，流水坡向应明显，不得积水。基坑上部排水沟与基坑边缘的距离应大于 (), 沟底和两侧必须作防渗处理。【单选】 □A.2m □B.3m □C.4m □D.5m 正确答案：A 解析：基坑上部排水沟距边缘＞2m。
639. 不宜用于填土土质的降水方法是 ()。【单选】 □A. 轻型井点 □B. 降水管井 □C. 喷射井点 □D. 电渗井点 正确答案：B 解析：管井井点不适用于填土。
640. 可用于排除地下水的排水设施是 ()。【单选】 □A. 倾斜式排水孔 □B. 拦水带 □C. 跌水 □D. 急流槽 正确答案：A 解析：倾斜排水孔可排除地下水。
641. 施工现场基坑排水采用深井 (管井) 排水方法时，管井宜沿基坑或沟槽一侧或两侧布置，管埋置的间距应为 () m。【单选】 □A.5~10 □B.10~15 □C.15~20 □D.20~25 正确答案：C 解析：管井间距 15~20m。
642. 当基坑底有承压水时，可采用 () 措施。【多选】 □A. 水平封底隔渗 □B. 截水 □C. 钻孔减压 □D. 回灌 正确答案：A|C 解析：基坑承压水采用封底隔渗、钻孔减压。
643. 工程基坑开挖采用井点回灌技术的主要目的是 ()。【单选】 □A. 避免坑底土体回弹 □B. 避免坑底出现管涌 □C. 减少排水设施，降低施工成本 □D. 防止降水井点对井点周围建构筑物、地下管线的影响 正确答案：D 解析：回灌目的是保护周边建筑管线。
644. 渗沟的作用是 ()。【单选】 □A. 降低地下水位 □B. 排除边沟水 □C. 减少冰冻深度 □D. 连接排水沟与渗井 正确答案：A 解析：渗沟作用为降低地下水位。
645. 施工现场基坑排水采用明沟排水方法时，当坡面过长或有集中渗水时，应增加一级排水沟和集水井。【判断】 正确答案：A 解析：明沟排水长坡面需增设排水设施。
646. 轻型井点降水安装过程中，冲成井孔，拔出冲管，插入井点管后，灌填砂滤料，主要目的是 ()。【单选】 □A. 保证滤水 □B. 防止坍孔 □C. 保护井点管 □D. 固定井点管 正确答案：B 解析：灌砂滤料主要防止井孔坍塌。
647. 在渗透系数大、地下水量大的土层中，适宜采用的降水形式为 ()。【单选】 □A. 轻型井点 □B. 电渗井点 □C. 喷射井点 □D. 管井井点 正确答案：D 解析：大渗透系数土层适用管井井点。
648. 施工区域排水系统应进行规划设计，并按照工程所在地的 () 等情况，以及工程规模、排水时段等，确定相应的设计标准。【多选】 □A. 气象 □B. 地形 □C. 地质 □D. 降水量 正确答案：A|B|C|D 解析：排水设计需考虑气象、地形、地质、降水。
649. 当施工现场边坡工程排水设施采用渗沟排除地下水时，渗沟的 () 位置应设置检查井。【多选】 □A. 每隔 30m~50m 处 □B. 平面转折处 □C. 坡度由陡变缓处 □D. 坡度由缓变陡处 正确答案：A|B|C 解析：渗沟每隔 30-50m、转折、变坡处设检查井。
650. 用推土机回填管沟，当无倒车余地时一般采用 ()。【单选】 □A. 沟槽推土法 □B. 斜角推土法 □C. 下坡推土法 □D. 分批集中推土法 正确答案：B 解析：无倒车余地采用斜角推土法。
651. 基坑采用轻型井点降水，其井点布置应考虑的主要因素是 ()。【单选】 □A. 水泵房的位置 □B. 土方机械型号 □C. 地下水位流向 □D. 基坑边坡支护形式 正确答案：C 解析：井点布置主要考虑地下水流向。
652. 当施工现场边坡工程排水设施采用渗沟排除地下水时，开挖深度超过 6m 时，应采用框架支撑。【判断】 正确答案：A 解析：深渗沟需框架支撑。
653. 施工现场采用井点降水方法进行基坑排水时，井点管距坑壁不得小于 1.0~1.5m。【判断】 正确答案：A 解析：井点管距坑壁 1.0~1.5m。
654. 基坑工程施工时，相邻两个集水井之间的间距不宜大于 () m。【单选】 □A.20 □B.30 □C.40 □D.10 正确答案：B 解析：集水井间距≤30m。
655. 施工现场边坡排水孔宜在边坡喷护之后施工，坡面上的排水孔宜上倾 10% 左右，孔深 3m~10m, 排水管宜采用 ()。【单选】 □A. 塑料花管 □B. 合金钢管 □C. 木质管道 □D. 不锈钢管道 正确答案：A 解析：边坡排水孔采用塑料花管。
656. 施工现场边坡工程采用渗沟排除地下水时，渗沟顶部宜设封闭层，寒冷地区沟顶回填土层小于冻层厚度时，宜设保温层。【判断】 正确答案：A 解析：渗沟顶部封闭，寒冷区设保温层。
657. 施工现场采用井点降水方法进行基坑排水时，井点管间距应为 1.0~2.5m。【判断】 正确答案：A 解析：井点管间距 1.0~2.5m。
658. 下列有关施工现场砂石料场排水系统的设置正确的是 ()。【多选】 □A. 根据料场地、降雨特点等情况，确定合理的排水标准，并进行排水规划 □B. 料场周围布置排水沟，排水沟应有足够过流截面 □C. 顺场地布置排水沟时，应辅以支沟 □D. 当料场低于地平面时，应设置水泵进行排水 正确答案：A|B|C|D 解析：料场排水规划、排水沟、支沟、水泵设置正确。
659. 基坑排水采用井点降水方法时，滤管应埋在含水层内并较 () 0.9m~1.2m。【单选】 □A. 所挖基坑底高 □B. 所挖基坑底低 □C. 所挖基坑中部高 □D. 所挖基坑中部低 正确答案：B 解析：滤管埋深低于基坑底 0.9~1.2m。
660. 关于基坑土石方工程采用轻型井点降水，说法正确的是 ()。【单选】 □A.U 型布置不封闭段是为施工机械进出基坑留的开口 □B. 双排井点管适用于宽度小于 6 米的基坑 □C. 单排井点管应布置在基坑的地下水下游一侧 □D. 施工机械不能经 U 型布置的开口端进出基坑 正确答案：A 解析：U 型井点开口供机械进出。
661. 关于轻型井点降水施工的说法，正确的有 ()。【多选】 □A. 轻型井点一般可采用单排或双排布置 □B. 当有土方机械频繁进出基坑时，井点宜采用环形布置 □C. 由于轻型井点需埋入地下蓄水层，一般不宜双排布置 □D. 槽宽大于 6m, 且降水深度超过 5m 时不适宜采用单排井点 正确答案：A|D 解析：轻型井点可单双排，宽深基坑不宜单排。
662. 下列关于基坑内的降水技术要求的说法中，错误的是 ()。【单选】 □A. 降水后基坑内的水位应低于坑底 0.5m □B. 当基坑侧壁出现渗水时，应采取有效疏排措施 □C. 采用管井时，井口宜高于地面 200mm 以上，并且应防止物体坠入井内 □D. 对坑底渗出的地下水，必须采用明沟排水 正确答案：D 解析：坑底地下水可采用盲沟等多种方式，非必须明沟。
663. 基坑开挖时，采用明排法施工，其集水坑应设置在 ()。【单选】 □A. 基础范围以外的地下水走向的下游 □B. 基础范围以外的地下水走向的上游 □C. 便于布置抽水设施的基坑边角处 □D. 不影响施工交通的基坑边角处 正确答案：B 解析：明排集水坑设在上游基础外。
664. 施工现场砂石料场排水系统与进场道路布置应相协调，主要道路一侧应设置排水沟，道路与水沟交叉处设置管涵。【判断】 正确答案：B 解析：道路两侧均应设排水沟。
665. 施工现场基坑排水采用深井 (管井) 排水方法时，管井宜沿基坑或沟槽一侧或两侧布置，井位距基坑边缘的距离应不小于 () m。【单选】 □A.1.5 □B.2.0 □C.2.5 □D.3.0 正确答案：A 解析：管井距基坑边缘≥1.5m。
666. 施工现场边坡挡土墙应设有排水设施，防止墙后积水形成 (), 导致墙体坍塌。【单选】 □A. 静水压力 □B. 动水冲击力 □C. 静水力矩 □D. 动水力矩 正确答案：A 解析：墙后积水产生静水压力致墙坍塌。
667. 通常情况下，基坑土方开挖的明排水法主要适用于 ()。【单选】 □A. 细砂土层 □B. 粉砂土层 □C. 粗粒土层 □D. 淤泥土层 正确答案：C 解析：明排水适用于粗粒土层。
668. 施工现场洞内排水的排水系统设备供电可与其他排水系统共用一个动力电源。【判断】 正确答案：B 解析：洞内排水电源需独立，禁止共用。
669. 电渗井点降水的井点管应 ()。【单选】 □A. 布置在地下水流上游侧 □B. 布置在地下水流下游侧 □C. 沿基坑中线布置 □D. 沿基坑外围布置 正确答案：D 解析：电渗井点沿基坑外围布置。
670. 施工现场一般建筑物基坑 (槽) 的排水，采用明沟或明沟与集水井排水时，应在基坑周围，或在基坑中心位置设置排水沟，每隔 () m 设一个集水井。【单选】 □A.20~30 □B.30~40 □C.40~50 □D.50~60 正确答案：B 解析：排水沟每隔 30~40m 设集水井。
671. 下列选项中，不符合气瓶储存安全规定的是 ()。【单选】 □A. 储存气瓶的仓库建筑，应符合《建筑设计防火规范》的规定 □B. 在使用乙炔瓶的现场，储存量不应超过 6 瓶 □C. 储存地点应有良好的通风、降温等设施，要避免阳光直射 □D. 乙炔瓶应保持直立位置，并应有防止倾倒的措施 正确答案：B 解析：乙炔现场储存不超过 5 瓶，非 6 瓶。
672. 客运电梯是服务于规定的楼层的固定式提升设备，是在高层建筑生活、工作的人员的垂直通行运输工具，人们利用电梯可快捷、方便到达目的楼层。发生火灾时，() 使用普通客运电梯逃生。【单选】 □A. 应该优先选择 □B. 绝对禁止 □C. 选择方案之一 □D. 可以，但最好不 正确答案：B 解析：火灾严禁乘坐普通电梯逃生。
673. 大型游乐设施操作人员安全操作要求的说法，错误的是 ()。【单选】 □A. 设备运行中乘客产生恐惧大声叫喊时，操作人员应立即停机，让其下来 □B. 必须确保设备紧急停车按钮位置让本机所有取得证件的操作人员知道 □C. 游乐设施正式运营前，操作人员安全操作 □D. 设备运行中，操作人员不能离开岗位，遇到紧急情况时及时采取措施 正确答案：C 解析：选项 C 表述不完整，为错误说法。
674. 客运索道日常检查和维修的安全要求中，正确的是 ()。【单选】 □A. 客运索道每天运送乘客前应遵行 2 次试车 □B. 线路润滑巡视工每班应至少全线巡视 1 次 □C. 电工、钳工每周应至少对专责设备检查 1 次 □D. 客运索道运营 3 年，应对托压缩轮进行检测 正确答案：B 解析：索道润滑工每班全线巡视 1 次。
675. 特种设备使用单位应当按照安全技术规范的要求定期检验，电梯 (载人升降机) 的安全定期监督检验周期为 ()。【单选】 □A. 半年 □B.1 年 □C.2 年 □D.3 年 正确答案：B 解析：电梯定期检验周期为 1 年。
676. 锅炉压力表表盘大小应保证司炉人员能清楚地看到压力指标值，表盘直径不应小于 () mm。【单选】 □A.10 □B.50 □C.80 □D.100 正确答案：D 解析：锅炉压力表直径≥100mm。
677. 压力管道的最高工作压力必须 (), 才能保证管道的安全使用。【单选】 □A. 大于设计压力 □B. 等于设计压力 □C. 小于设计压力 □D. 小于或等于设计压力 正确答案：D 解析：管道工作压力≤设计压力。
678. 充装气体前进行气瓶检查，可消除或减少气瓶爆炸事故。在压力许可时，下列情况不会引起气瓶爆炸的是 ()。【单选】 □A. 用高压氧气瓶充装氢气 □B. 用氧气瓶、空气瓶充装可燃气体 □C. 气瓶已过检验期限 □D. 瓶内混入可能与所盛气体发生化学反应的物质 正确答案：A 解析：氧气瓶充装氢气在压力许可时不爆炸，其余均会爆炸。
679. 锅炉常用的安全附件中，属于锅炉安全附件的是 ()。【单选】 □A. 引风机 □B. 排污阀或放水装置 □C. 单向截止阀 □D. 省煤器 正确答案：B 解析：排污阀属于锅炉安全附件。
680. 下列选项中，不属于电梯类别特种设备的是 ()。【单选】 □A. 载人 (货) 电梯 □B. 自动扶梯 □C. 自动人行道 □D. 非公共场所安装且仅供单一家庭使用的电梯 正确答案：D 解析：家用单一电梯不属于特种设备。
681. 下列气瓶贮存的安全要求中，错误的是 ()。【单选】 □A. 贮存过程中应遵循先入库先发出原则，并应设立明显的警示标签 □B. 空、实瓶应分开存放，可燃气体的气瓶不得与还原性气瓶同存 □C. 气瓶库屋顶应为轻型结构，应有足够的泄压面积，透明玻璃上应涂白漆 □D. 瓶库内部不得有地沟、暗道，严禁用电热器、煤炉取暖 正确答案：B 解析：可燃气体气瓶可与还原性气瓶同存，禁止与氧化性同存。
682. 氢气瓶的规定涂色为 ()。【单选】 □A. 淡黄 □B. 淡绿 □C. 银灰 □D. 红色 正确答案：B 解析：氢气瓶涂色为淡绿色。
683. 下列选项中，不符合气瓶储存安全规定的是 ()。【单选】 □A. 旋紧瓶帽，放置整齐，留有通道，妥善固定 □B. 气瓶卧放应防止滚动，头部转向一方，高压气瓶堆放不应超过 6 层 □C. 盛装有毒气体的气瓶，或所装介质接触后能引起燃烧、爆炸的气瓶，必须分室储存，并在附近设有防毒用具或灭火器材 □D. 盛装易起聚合反应的气体气瓶，必须规定储存期限 正确答案：B 解析：气瓶卧放堆放不超过 5 层，非 6 层。
684. 锅炉的三大安全附件分别是 ()、压力表、水位表。【单选】 □A. 电表 □B. 温度计 □C. 安全阀 □D. 水压计 正确答案：C 解析：锅炉三大安全附件：安全阀、压力表、水位表。
685. 为防止乙炔生产装置产生的乙炔发生爆炸，乙炔生产装置应安装 () 等安全装置。【单选】 □A. 防护挡板、安全阀 □B. 安全阀、电源开关 □C. 安全阀、安全膜 □D. 隔离变压器、安全膜 正确答案：C 解析：乙炔装置需安装安全阀与安全膜防爆。
686. 气瓶的吊装运输应严格执行相关规定和要求，避免在吊运过程中发生事故。下列气瓶吊运方式中，符合安全要求的是 ()。【单选】 □A. 使用起重设备吊运气瓶 □B. 使用金属链绳捆绑吊运气瓶 □C. 利用气瓶瓶帽吊运气瓶 □D. 使用专用翻斗车搬运气瓶 正确答案：A 解析：气瓶可用专用起重设备吊运，禁止捆绑、瓶帽吊运。
687. 场 (厂) 内专用机动车辆安全措施中，属于应急措施的是 ()。【单选】 □A. 做好定期检查维护 □B. 加强教育培训 □C. 加强倒车夜间作业管理 □D. 事故后迅速停车、抢救伤者、上报 正确答案：D 解析：应急措施为事故发生后的处置行为。
688. 当客运电梯发生故障乘客受困时，正确做法是 ()。【单选】 □A. 强行扒门逃生 □B. 从检修口爬出 □C. 用警铃对讲机联系外界等候救援 □D. 踢踹轿厢门求救 正确答案：C 解析：电梯困人应报警等候，禁止自行逃生。
689. 下列设备中，不属于特种设备的是 ()。【单选】 □A. 旅游景区观光车辆 □B. 建筑工地升降机 □C. 场 (厂) 内专用机动车辆 □D. 浮顶式原油储罐 正确答案：D 解析：原油储罐不属于特种设备目录范围。
690. 对气孔、夹渣等体积缺陷检出率高，适宜薄件检测的无损检测方法是 ()。【单选】 □A. 超声波检测 □B. 射线检测 □C. 磁粉检测 □D. 涡流检测 正确答案：B 解析：射线检测对体积型缺陷灵敏，适合薄板。
691. 某食品加工厂共有特种设备 () 类。【单选】 □A.3 □B.4 □C.5 □D.6 正确答案：B 解析：该厂涉及锅炉、电梯、场车、升降机共 4 类。
692. 仓库内气瓶放置整齐，横放时头部朝同一方向，垛高不得超过 () 层。【单选】 □A.6 □B.5 □C.4 □D.3 正确答案：B 解析：气瓶卧放堆放高度不超过 5 层。
693. 出口水压≥() MPa、额定功率≥() MW 的承压热水锅炉为特种设备。【单选】 □A.0.1;0.2 □B.0.2;0.2 □C.0.2;0.1 □D.0.1;0.1 正确答案：D 解析：热水锅炉特种设备界定值：0.1MPa、0.1MW。
694.() 发出的紧急停车信号，起重机司机必须立即执行。【单选】 □A. 指挥人员 □B. 直接作业人员 □C. 不论何人 □D. 领导 正确答案：C 解析：任何人发出的紧急停车均需立即执行。
695. 电梯轿厢沿垂直或倾角小于 () 的轨道运行。【单选】 □A.15° □B.10° □C.25° □D.20° 正确答案：A 解析：电梯轨道倾角不大于 15°。
696. 叉车及观光车安全要求中，正确的是 ()。【单选】 □A. 任何情况不得在方向盘极限位置起步 □B. 叉装不明重物应离地 100mm 试稳 □C. 严禁两辆叉车同时装卸一车 □D. 行驶中检查离合与制动器 正确答案：B 解析：叉车叉装未知重量物件应先离地试稳。
697. 购置观光车辆时，设计爬坡度应满足线路 () 要求。【单选】 □A. 最大坡度 □B. 最大高度 □C. 最大宽度 □D. 最大长度 正确答案：A 解析：观光车爬坡度需满足线路最大坡度。
698. 下列选项中，不符合两台起重机抬一台重物时规定的是 ()。【单选】 □A. 每台起重机所分配的荷载不应超过其额定荷载的 60% □B. 根据起重机的额定荷载，计算好每台起重机的吊点位置，最好采用平衡梁抬吊 □C. 应有专人统一指挥，指挥者应站在两台起重机司机都可以看见的位置 □D. 具备经有关部门批准的安全技术措施 正确答案：A 解析：双机抬吊单机载荷不得超过额定起重量的80%，不是 60%。
699. 压力管道的改造，() 应当在施工前将拟进行改造的情况书面告知负责压力管道使用登记的质量技术监督部门后方可施工。【单选】 □A. 设计单位 □B. 安装单位 □C. 监理单位 □D. 检验单位 正确答案：B 解析：压力管道改造由安装 / 施工单位履行告知义务。
700. 吊运炽热金属或危险品所用钢丝绳的报废断丝数，取一般起重机用钢丝绳报废断丝数的 (), 其中包括由于钢丝表面磨蚀而进行的折减。【单选】 □A.0.9 □B.0.8 □C.0.6 □D.0.5 正确答案：D 解析：炽热金属 / 危险品钢丝绳报废标准为普通钢丝绳的50%。
701. 锅炉水位应经常保持在正常水位线处，并允许在正常水位线上下 () mm 之内波动。【单选】 □A.10 □B.30 □C.50 □D.100 正确答案：C 解析：锅炉水位允许波动范围为 **±50mm**。
702. 使用乙炔瓶时，严禁铜、银、汞等及其制品与乙炔接触，应使用铜合金器具时，含铜量应低于 ()%。【单选】 □A.40 □B.50 □C.60 □D.70 正确答案：D 解析：与乙炔接触的铜合金含铜量必须 **＜70%，防止生成易爆乙炔铜。
703. 压力容器的设计压力，是指在相应设计温度下用以确定容器壳体 () 的压力，亦即标注在铭牌上的容器设计压力，其值不得小于最大工作压力。【单选】 □A. 容积 □B. 形状 □C. 厚度 □D. 高度 正确答案：C 解析：设计压力用于确定容器壳体厚度 **。
704. 在气瓶安全使用要点中，以下描述正确的是 ()。【单选】 □A. 为避免浪费，每次应尽量将气瓶内气体用完 □B. 在平地上较长距离移动气瓶，可以置于地面滚动前进 □C. 专瓶专用，不擅自更改气瓶钢印和颜色标记 □D. 关闭瓶阀时，可以用长柄螺纹扳手加紧，以防泄漏 正确答案：C 解析：气瓶必须专瓶专用，严禁混用、改色、改钢印。
705. 依据《特种设备安全监察条例》, 下列关于该厂电梯报废说法错误的是 ()。【单选】 □A. 达到安全技术规范规定的报废条件的电梯应当予以报废 □B. 甲机构需承担达到设计使用年限但继续使用的电梯的责任 □C. 甲机构对电梯应增加维护保养的频次和项目，确保电梯使用安全 □D. 电梯报废后，该机械加工厂需要到原特种设备使用登记部门将报废的电梯注销，交回使用登记证 正确答案：C 解析：评估机构不负责增加维保频次项目，这是使用单位责任。
706. 电梯的日常使用中，应当对电梯的安全性能负责的单位是 ()。【单选】 □A. 电梯制造单位 □B. 电梯使用单位 □C. 电梯维护保养单位 □D. 特种设备安全监督管理部门 正确答案：C 解析：维保单位对电梯安全性能负责。
707. 动力驱动的起重机起升机构必须设置制动器。制动器应采用 ()。【单选】 □A. 常开式 □B. 常闭式 □C. 综合式 □D. 形式不限 正确答案：B 解析：起升机构制动器必须为常闭式，断电即抱闸。
708. 依据《特种设备安全监察条例》, 特种设备技术档案中不需要包括 ()。【单选】 □A. 特种设备使用单位的情况说明 □B. 特种设备的定期检验和定期自行检查的记录 □C. 特种设备的日常使用状况记录 □D. 特种设备运行故障和事故记录 正确答案：A 解析：技术档案不包含使用单位情况说明。
709. 关于起重机械检查的说法，正确的是 ()。【单选】 □A. 露天作业的起重机械经受 8 级以上的风力后重新使用前应做全面检查 □B. 起重机械轨道的安全状况和钢丝绳的安全状况都属于每月检查的内容 □C. 制动器和各类安全装置不仅属于每月检查内容也属于每日检查的内容 □D. 起重机液压系统及其部件的泄露情况及工作性能属于每日检查的内容 正确答案：C 解析：制动器、安全装置每日、每月均需检查。
710. 压力容器内部有压力时，不得进行任何修理，进入压力容器内工作时，要通风良好，照明电压不超过 () V, 并与其他使用的设备隔开，采取防火、防毒、防爆等措施。【单选】 □A.42 □B.36 □C.24 □D.12 正确答案：C 解析：容器内照明电压 **≤24V**。
711. 下列选项中，不符合气瓶使用安全规定的是 ()。【单选】 □A. 对气瓶瓶体进行焊接 □B. 不得使用已报废的气瓶 □C. 不得自行处理气瓶内的残液 □D. 禁止冲击、碰撞 正确答案：A 解析：严禁对气瓶瓶体进行焊接、挖补。
712. 下列选项中，不属于起重机械类别特种设备的是 ()。【单选】 □A. 额定起重量大于或者等于 0.2t 的升降机 □B. 额定起重力矩大于或者等于 40t・m, 且提升高度大于或者等于 3m 的塔式起重机 □C. 生产率大于或者等于 300t/h, 且提升高度大于或者等于 3m 的装卸桥 □D. 层数大于或者等于 3 层的机械式停车设备 正确答案：A 解析：升降机额定起重量≥0.5t才属于特种设备。
713. 特种设备中，属于达到推荐使用寿命时直接报废处理的是 ()。【单选】 □A. 简单压力容器 □B. 叉车 □C. 惰性气体气瓶 □D. 工业压力管道 正确答案：A 解析：简单压力容器达到使用年限直接报废，不允许继续使用。
714. 起重机大修安全措施中，错误的是 ()。【单选】 □A. 甲、乙双方签订安全管理协议，明确双方安全职责 □B. 甲安全主管部门对乙方作业人员进行安全教育和交底 □C. 现场制定专门负责人，用警示带围挡 □D. 大修完成后，经甲企业检测检查合格后可以投入使用 正确答案：D 解析：大修后必须经有资质检验机构检验合格，不是企业自检。
715. 建立健全压力管道技术档案是 () 的工作。【单选】 □A. 操作员 □B. 管理人员 □C. 厂长 □D. 检验机构 正确答案：B 解析：压力管道技术档案由管理人员负责建立。
716. 不属于起重机械防风防爬装置的是 ()。【单选】 □A. 夹轨器 □B. 锚定装置 □C. 铁鞋 □D. 安全钩 正确答案：D 解析：安全钩属于防脱钩装置，不属于防风防爬装置。
717. 依据《特种设备安全法》, 关于叉车管理说法正确的是 ()。【单选】 □A. 该厂应当在叉车投入使用 30 日后向相关部门办理使用登记 □B. 登记标志以及叉车合格证应当置于叉车的显著位置 □C. 叉车安全管理人员应当对叉车使用状况进行不定期性检查 □D. 该机械加工厂应建立叉车的技术档案 正确答案：D 解析：使用单位必须建立特种设备技术档案。
718.() 是指涉及生命安全、危险性较大的锅炉压力容器 (含气瓶)、压力管道、电梯、起重机械、客运索道、大型游乐设施等。【单选】 □A. 特种设备 □B. 特种机械 □C. 承压类特种设备 □D. 机电类特种设备 正确答案：A 解析：题目描述为特种设备法定定义。
719. 吊钩表面应光洁，转动灵活，定位螺栓、开口销紧固完好；吊钩装配部分每 () 至少检修一次。【单选】 □A. 季度 □B. 月 □C. 年 □D. 半年 正确答案：A 解析：吊钩装配部分每季度至少检修一次。
720. 起重机械安全规程要求，跨度等于或超过 () m 的装卸桥和门式起重机，应装偏斜调整和显示装置。【单选】 □A.40 □B.60 □C.50 □D.100 正确答案：A 解析：跨度≥40m应装偏斜调整装置。
721. 下列选项中，符合气瓶储存安全规定的有 ()。【多选】 □A. 旋紧瓶帽，放置整齐，留有通道，妥善固定 □B. 气瓶卧放应防止滚动，头部转向一方，高压气瓶堆放不应超过 6 层 □C. 盛装有毒气体的气瓶，或所装介质接触后能引起燃烧、爆炸的气瓶，必须分室储存，并在附近设有防毒用具或灭火器材 □D. 盛装易起聚合反应的气体气瓶，必须规定储存期限 正确答案：A|C|D 解析：气瓶卧放堆放 **≤5 层 **，B 错误。
722. 场 (厂) 车使用单位日常现场安全监督检查的项目包括 ()。【多选】 □A. 作业人员 □B. 使用登记及警示标志 □C. 安全装置 □D. 运行情况 正确答案：A|B|C|D 解析：四项均为日常检查内容。
723. 下列选项中，符合锅炉运行前点火、升压规定的有 ()。【多选】 □A. 升压时间，对火管锅炉宜为 6h; 对水管锅炉宜为 4h, 快装锅炉宜为 2h, 避免锅炉受热膨胀不均匀 □B. 锅炉从开始升压至达到工作压力的过程中，应依次进行冲洗压力表，检查手孔、人孔等处是否漏汽、漏水，试开排污阀和给水设备等作业 □C. 当锅炉达到工作压力时，应进一步升高气压，核对安全阀的开启压力，然后再将气压降至工作压力 □D. 锅炉并炉供汽 (水) 应缓慢进行，供汽 (水) 前应先做好暖管和排尽汽缸、管路内积水与空气 正确答案：A|B|C|D 解析：全部符合锅炉升压操作规定。
724. 进入锅炉内检修时，应遵守的规定包括 ()。【多选】 □A. 在锅筒 (锅壳) 和潮湿的炉、烟道内工作用电灯照明时，照明电压不超过 24V □B. 在比较干燥的烟道内，有妥善的安全措施，可以采用不高于 36V 的照明电源，禁止使用明火照明 □C. 与工作无关的任何物品不应带进炉内 □D. 进入烟道、炉膛内工作前，应进行通风、防毒、防爆、防火等措施 正确答案：A|B|C|D 解析：全部符合容器内检修安全要求。
725. 起重机板钩必须及时更新的情形有 ()。【多选】 □A. 衬套磨损量超过原厚度的 50% □B. 衬套磨损量超过原厚度的 25% □C. 销子磨损量超过名义直径的 2% □D. 销子磨损量超过名义直径的 5% 正确答案：A|D 解析：衬套磨损超50%、销子磨损超5%必须报废更新。
726. 叉车的主要受力结构件包括 ()。【多选】 □A. 车架 □B. 门架 □C. 货叉架 □D. 货叉 正确答案：A|B|C|D 解析：四项均为主要受力结构件。

735. 压力容器全面检查的项目应包括 ()。【多选】 □A. 外部检查的全部项目 □B. 内、外部检验的全部项目 □C. 对主要焊缝进行无损探伤抽查 □D. 超声波或射线探伤抽查 正确答案：A|B|C|D 解析：全面检验包含全部内外检及探伤。
736. 气瓶安全附件设计及使用的安全要求中，正确的有 ()。【多选】 □A. 易熔合金塞结构简单不得用于固定式压力容器 □B. 盛装剧毒或自燃气体的气瓶禁止安装安全泄压装置 □C. 安全阀的开启压力应不大于该气瓶的水压试验压力 □D. 盛装氧气的气瓶瓶阀出气口螺纹应为左旋 正确答案：A|B|C 解析：氧气瓶阀螺纹为**右旋**，D 错误。
737. 下列选项中，符合锅炉检验规定的有 ()。【多选】 □A. 将未取得定期检验合格证的锅炉投入运行 □B. 锅炉检验工作，包括外部检查、内外部检验、水 (耐) 压试验等 □C. 运行的锅炉每年应进行 1 次外部检验，每 2 年进行 1 次内部检验 □D. 检验人员或者使用单位对锅炉安全状况有怀疑时，应当进行水 (耐) 压试验 正确答案：B|C|D 解析：无检验合格证**严禁**投入运行，A 错误。
738. 起重机与建筑物间的安全距离不够时，最可能引发 () 事故。【多选】 □A. 挤伤 □B. 碰撞 □C. 剪切 □D. 坠落 正确答案：A|B|C 解析：距离不足易引发挤、撞、剪切事故。
739. 按压力容器压力等级、品种、介质毒性程度和介质易燃性将容器危险程度分为 ()。【多选】 □A. 第一类压力容器 □B. 第二类压力容器 □C. 第三类压力容器 □D. 第四类压力容器 正确答案：A|B|C 解析：压力容器分为**一、二、三类**。

741. 场 (厂) 内专用机动车辆事故，按其伤害程度可分为 ()。【多选】 □A. 有车损事故 □B. 轻伤事故 □C. 重伤事故 □D. 死亡事故 正确答案：A|B|C|D 解析：四项均为事故伤害程度分类。
742. 下列选项中，符合司索人员在起重作业中执行规定的有 ()。【多选】 □A. 在吊运零碎散件物品时，使用无栏杆的平板散装 □B. 捆绑边棱角锋利的物体，应用软物包垫 □C. 严禁将锚固在地上的附着物和其他杂物与重物捆绑在一起 □D. 重物应绑扎牢固，吊索夹角不应大于 60° 正确答案：B|C|D 解析：散件必须用**有围栏**容器装运，A 错误。

744. 下列选项描述的情况中，压力容器投入使用前，应作内、外部检验的有 ()。【多选】 □A. 新装、移装或停止使用 2 年以上，需恢复使用的 □B. 由外单位拆卸调入，准备安装使用的 □C. 改变或修理容器主体结构，影响强度的 □D. 更换容器衬里的 正确答案：A|B|C|D 解析：全部情况均需重新内外检验。
745. 起重机事故的常见类型通常包括 () 等。【多选】 □A. 坠落 □B. 倾覆 □C. 碰撞 □D. 挤压 正确答案：A|B|C|D 解析：四项均为起重机常见事故类型。
746. 当两台起重机抬一台重物时，应遵守 ()。【多选】 □A. 根据起重机的额定荷载，计算好每台起重机的吊点位置，最好采用平衡梁抬吊 □B. 每台起重机所分配的荷载不应超过其定荷载的 50%~60% □C. 应有专人统一指挥，指挥者应站在两台起重机司机都可以看见的位置 □D. 重物应保持水平，钢丝绳应保铅直受力均衡 □E. 具备经有关部门批准的安全技术措施 正确答案：A|C|D|E 解析：单机载荷≤**80%**，B 错误。
747. 压力容器运行使用时，发生下列 () 现象之一时，操作人员应当立即采取应急专项措施，并且按照规定的程序，及时向本单位有关部门和人员报告。【多选】 □A. 工作压力、工作温度超过规定值，采取措施仍得不到有效控制的 □B. 受压元件发生裂缝、异常变形、泄露、衬里层失效等危及安全的 □C. 安全附件失灵、损坏等不能起到安全保护作用的 □D. 垫片、紧固件损坏，难以保证安全运行的 正确答案：A|B|C|D 解析：全部为紧急停机情形。
748. 下列选项中，符合起重作业指挥人员规定的有 ()。【多选】 □A. 在起重作业中，指挥人员应是唯一的现场指挥者，并不应脱岗 □B. 指挥人员应使用对讲机或指挥与哨音，或标准手与哨音进行指挥 □C. 应按照施工技术措施规定的吊运方案指挥 □D. 指挥机械起吊设备工件时，应遵守吊车司机的安全要求 正确答案：A|B|C|D 解析：全部符合指挥人员安全规定。
749. 电站锅炉运行中遇到下列 () 情况时，应停止向炉膛送入燃料，立即停炉。【多选】 □A. 锅炉严重缺水时 □B. 锅炉严重满水时 □C. 直流锅炉断水时 □D. 锅水循环泵发生故障，不能保证锅炉安全运行时 正确答案：A|B|C|D 解析：全部为紧急停炉条件。
750. 压力管道腐蚀与 () 有关。【多选】 □A. 材料 □B. 介质 □C. 应力 □D. 长度 正确答案：A|B|C 解析：腐蚀与**长度无关**。

753. 按所承受压力的高低，压力容器可分为 ()。【多选】 □A. 低压容器 □B. 中压容器 □C. 高压容器 □D. 超高压容器 正确答案：A|B|C|D 解析：四项为压力分级标准。

755. 凡使用的压力容器，均应有安全技术操作规程，操作规程至少应包括的内容有 ()。【多选】 □A. 操作工艺指标 □B. 最高工作压力、最高或最低工作温度 □C. 操作方法、程序及注意事项 □D. 运行中重点检查项目和部位，可能出现的异常现象和防止措施 正确答案：A|B|C|D 解析：四项均为规程必备内容。
756. 下列选项中，属于起重机起吊作业安全技术要求的有 ()。【多选】 □A. 工作前，认真检查所需的一切工具设备，均应良好 □B. 起重工应熟悉、正确运用并及时发出各种规定的手势、旗语等信号 □C. 多人工作时，应指定一人负责指挥 □D. 各种物件正式起吊前，应先试吊，确认可靠后方可正式起吊 正确答案：A|B|C|D 解析：全部符合起吊安全要求。
757. 场 (厂) 车使用单位应当对在用场车至少每月进行一次 ()。【多选】 □A. 日常维护保养 □B. 自行检查 □C. 全面检查 □D. 检验 正确答案：A|B 解析：每月进行**维保 + 自检**，全面检查 / 检验为年度。
758. 下列选项中，符合气瓶运输安全规定的有 ()。【多选】 □A. 车上禁止烟火 □B. 运输可燃、有毒气体气瓶时，车上应备有灭火器材或防毒用具 □C. 易燃品、油脂和带有油污的物品，不得与氧气瓶或强氧化剂气瓶同车运输 □D. 所装介质相互接触后，能引起燃烧、爆炸的气瓶不得同车运输 正确答案：A|B|C|D 解析：全部符合气瓶运输规定。
759. 蒸汽锅炉运行中，遇有下列 () 情况之一时，应立即紧急停炉。【多选】 □A. 锅炉水位低于水位表的下部可见边缘 □B. 不断加大给水及采取其他措施，水位仍继续下降 □C. 锅炉满水，水位超过最高可见水位，经过放水仍不能见到水位时 □D. 水泵失效或者给水系统故障，不能向锅炉给水时 正确答案：A|B|C|D 解析：全部为紧急停炉条件。
760. 下列选项中，属于 "起重作业十不吊" 的有 ()。【多选】 □A. 物体重量不明或被埋压 □B. 吊物下方有人时 □C. 指挥信号不明或没有统一指挥时 □D. 作业场所不安全，可能触及输电线路、建筑物或其他物体 正确答案：A|B|C|D 解析：四项均在十不吊范围内。
761. 下列选项中，符合气瓶储存安全规定的有 ()。【多选】 □A. 储存气瓶的仓库建筑，应符合《建筑设计防火规范》的规定 □B. 在使用乙炔瓶的现场，储存量不应超过 6 瓶 □C. 储存地点应有良好的通风、降温等设施，要避免阳光直射 □D. 乙炔瓶应保持直立位置，并应有防止倾倒的措施 正确答案：A|C|D 解析：乙炔现场存量 **≤5 瓶 **，B 错误。

763. 起重作业中司索工的工作任务包括 ()。【多选】 □A. 准备吊具 □B. 捆绑挂钩 □C. 摘钩卸载 □D. 担任指挥任务 正确答案：A|B|C 解析：司索工**不负责**指挥，指挥为专人。
764. 气瓶定期检验的项目应包括 ()。【多选】 □A. 内、外表面检查 □B. 水压试验，容积大于 12L 的高压气瓶，同时作容积残余变形测定 □C. 高压气瓶的容积残余变形率大于 3% 最小壁厚 □D. 容积大于 12L、重量损失超过 5% 的高压气瓶的最小壁厚 正确答案：A|B|D 解析：残余变形率 **>10%才报废，C 错误。
765. 关于压力管道的安装环节，选项 () 是正确的。【多选】 □A. 安装单位应当在压力管道安装施工 (含试安装) 前履行告知手续 □B. 在我国境内从事规定范围内的压力管道安装的单位，均应当取得安装许可证 □C. 国家市场监管总局负责 GA 类压力管道安装许可的受理、审批、发证 □D. 安装单位应当对采购的原材料、零部件以及压力管道元件进行抽查，并且对其质量负责 正确答案：A|B|C|D 解析：全部符合安装管理规定。
766. 在用的塔式起重机、升降机、流动式起重机，每年检验 1 次。【判断】 正确答案：A 解析：这类起重机械每年定期检验一次。

772. 氧舱属于特种设备。【判断】 正确答案：A 解析：氧舱属于压力容器类特种设备。
773. 大型游乐设施是指用于经营目的，承载乘客游乐的设施，其范围规定为设计最大运行线速度大于或者等于 2m/s, 或者运行高度距地面高于或者等于 2m 的载人大型游乐设施。【判断】 正确答案：A 解析：符合大型游乐设施界定标准。
774. 按照《起重机械安全技术规程》(TSG51-2023) 的规定，起重机械的检验分为型式试验、监督检验和定期首次检验三种类型。【判断】 正确答案：A 解析：规程规定检验分为三类。
775. 操作人员应熟悉所操作压力容器的技术性能，并能掌握操作方法，做到精心操作，及时维修，正确保养。【判断】 正确答案：A 解析：操作人员必须做到懂性能、会操作、会保养。
776. 经过定期检验的压力容器应作出检验报告，说明压力容器可否继续使用或应采取降压操作、特殊监测等措施。【判断】 正确答案：A 解析：检验报告必须明确结论与处置措施。
777. 使用压力容器的单位，对容器应定期进行检验，检验时除执行国家有关规定外，使用单位压力容器安全管理人员、作业和维护保养等相关人员应当到场协助检验工作，及时提供有关资料，负责安全监护，并设置可靠的联络方式。【判断】 正确答案：A 解析：使用单位必须配合检验并监护现场。
778. 特种设备检验人员在检验现场，应当认真执行使用单位有关动火、用电、高空作业、安全防护、安全监护等规定，配备和穿戴检验必需的个体防护用品，确保检验工作安全。【判断】 正确答案：A 解析：检验人员必须遵守现场安全规定。
779. 设计正常水位容积大于或者等于 20L, 且额定蒸汽压力大于或者等于 0.01MPa (表压) 的承压蒸汽锅炉属于特种设备。【判断】 正确答案：B 解析：容积≥30L才属于特种设备。
780. 电梯是指动力驱动，利用沿刚性导轨运行的箱体或者沿固定线路运行的梯级 (踏步), 进行升降或者平行运送人、货物的机电设备。【判断】 正确答案：A 解析：符合电梯法定定义。
781. 起重机械检验前，使用单位应当按照特种设备使用管理的有关规定对起重机械进行维保和自检，并且作出记录，记录应当经使用单位安全管理人员签署意见。【判断】 正确答案：A 解析：检验前必须完成维保自检并签字。
782. 压力容器使用单位不应任意修改压力容器的工艺条件，严禁超压、超温运行。【判断】 正确答案：A 解析：严禁超参数运行。
783. 锅炉是指利用各种燃料、电或者其他能源，将所盛装的液体加热到一定的参数，并通过对外输出介质的形式提供热能的设备。【判断】 正确答案：A 解析：符合锅炉定义。
784. 用于体育运动、文艺演出和非经营活动的大型游乐设施属于特种设备。【判断】 正确答案：B 解析：非经营用途不属于特种设备监管范围。
785. 运输、储存和使用气瓶的单位，应当制定相应的气瓶安全管理制度和事故应急处理措施，并有专人负责气瓶安全工作，定期对气瓶运输、储存和使用人员进行气瓶安全技术教育。【判断】 正确答案：A 解析：符合气瓶安全管理要求。
786. 客运索道是指动力驱动，利用柔性绳索牵引箱体等运载工具运送人员的机电设备。【判断】 正确答案：A 解析：符合客运索道定义。
787. 在锅筒 (锅壳) 和潮湿的炉膛、烟道内工作使用电灯照明时，照明电压不超过 24V; 在比较干燥的烟道内，有妥善的安全措施，可以采用不高于 36V 的照明电源，或者使用明火照明。【判断】 正确答案：B 解析：严禁使用明火照明。
788. 乙炔气瓶储存间应有专人管理，在醒目的地方应设置 "乙炔危险"" 严禁烟火 " 等警示标志。【判断】 正确答案：A 解析：乙炔库必须专人管理、设警示标志。
789. 起重机吊运大件时，重物上严禁站人，重物下面严禁有人停留或穿行。【判断】 正确答案：A 解析：起重作业 “十不吊” 核心要求。
790. 锅炉进行水 (耐) 压试验前，应进行内外部检验，必要时作强度核算，不同的锅炉类型按相应的规程 (热水锅炉或蒸汽锅炉) 规定进行水压试验。【判断】 正确答案：A 解析：水压试验前必须先做内外检验。
791. 因自然灾害、战争等不可抗力引发的事故不属于特种设备事故。【判断】 正确答案：A 解析：不可抗力事故不认定为特种设备责任事故。
792. 起重机械检验人员应要求使用单位的起重机械安全管理人员和相关人员到场配合、协助检验工作，负责现场安全监护。【判断】 正确答案：A 解析：使用单位必须派人配合监护。
793. 高压气瓶的容积残余变形率大于 10% 的应报废。【判断】 正确答案：A 解析：残余变形率 > 10% 必须报废。
794. 需要使用乙炔瓶时应装设专用的减压器、回火防止器，开启时，操作人员应站在阀口的侧后方，动作要轻缓。【判断】 正确答案：A 解析：乙炔瓶使用安全规定。
795. 乙炔瓶内气体严禁用尽。【判断】 正确答案：A 解析：必须保留余压，严禁用尽。
796. 实施首次检验的起重机械，其产权单位应当填写《起重机械定期 (首次) 检验申请表》, 检验机构接到申请后，应当在 5 个工作日内出具《起重机械定期 (首次) 检验申请反馈单》。【判断】 正确答案：A 解析：符合首次检验流程。
797. 起重机起吊作业，设备或构件在起吊过程中，应保持其平稳，避免产生歪斜；吊钩上使用的绳索，不应滑动，以保证设备或构件的完好无缺。【判断】 正确答案：A 解析：起吊要求平稳、索具不滑动。
798. 建立每部电梯的维保记录，及时归入电梯技术档案，档案至少保存 3 年。【判断】 正确答案：B 解析：电梯档案至少保存 6 年。
799. 气瓶储存间与明火或散发火花地点的距离，不应小于 15m, 且不应设在地下室或半地下室内。【判断】 正确答案：A 解析：气瓶库安全距离与位置要求。
800. 载荷、索具或专用吊具从吊钩钩口脱出最可能引起脱钩事故。【判断】 正确答案：A 解析：脱钩事故主要原因是索具脱出钩口。
801. 乙炔瓶减压器出口与乙炔皮管，应用专用扎头扎紧，不应漏气，其他部分漏气应进行处理。【判断】 正确答案：A 解析：乙炔管路必须严密不漏气。
802. 下列对危险化学品火灾扑救安全技术的描述错误的是 ()。【单选】 □A. 扑救气体类火灾时，一定要立即扑灭火焰 □B. 扑救爆炸物品火灾时，不可用沙土盖压 □C. 扑救遇湿易燃物品火灾时，绝对禁止用水、泡沫、酸碱等湿性灭火剂扑救 □D. 扑救毒害和腐蚀品的火灾时，应尽量使用低压水流或雾状水 正确答案：A 解析：气体火灾严禁直接扑灭火焰，应先切断气源。
803.《化学品分类和危险性公示通则》(GB13690-2009) 中危化品第 1 大类含爆炸物等 () 类。【单选】 □A.14 □B.15 □C.16 □D.18 正确答案：C 解析：通则将危险化学品分为16 类。
804. 下列关于危险化学品安全管理说法中不正确的是 ()。【单选】 □A. 各种物品包装要完整无损，如发现破损、渗漏等，需立即进行处理 □B. 严格执行有毒有害物品入库验收、出库登记和检查制度 □C. 销毁、处理危险化学品，应采取安全措施并征得所在地安监部门同意 □D. 装过危险化学品的容器，应集中保管或销毁 正确答案：C 解析：销毁危化品应报公安部门，不是安监。
805. 扑救易燃液体火灾时，水溶性液体最好用 () 扑救。【单选】 □A. 普通蛋白泡沫 □B. 轻泡沫 □C. 抗溶性泡沫 □D. 酸性泡沫 正确答案：C 解析：水溶性易燃液体必须用抗溶性泡沫。
806. 爆炸性物品的销毁一般不能采用 () 方法。【单选】 □A. 爆炸法 □B. 烧毁法 □C. 填埋法 □D. 化学分解法 正确答案：C 解析：爆炸品严禁填埋。
807. 依据《危险货物运输包装通用技术条件》(GB12463-2009)，() 包装是指货物具有较大危险性，包装强度要求高。【单选】 □A.IV 类 □B.II 类 □C.III 类 □D.I 类 正确答案：D 解析：I 类包装适用于危险性大的货物。
808. 易燃易爆场所不能穿 ()。【单选】 □A. 纯棉工作服 □B. 化纤工作服 □C. 防静电工作服 □D. 绝缘工作服 正确答案：B 解析：化纤衣服易产生静电火花，严禁穿入。
809. 若毒性危险化学品经口引起急性中毒，对于腐蚀性毒性危险化学品，处理方法不合适的是 ()。【单选】 □A. 洗胃 □B. 灌服蛋清 □C. 灌服牛奶 □D. 灌服氢氧化铝凝胶 正确答案：A 解析：腐蚀性毒物严禁洗胃，防止胃穿孔。
810. 吸湿性强、遇水释放较多热量的化学品沾染皮肤后立刻 ()。【单选】 □A. 用清水清洗 □B. 用冷水清洗 □C. 用软纸、软布抹去 □D. 用酒精清洗 正确答案：C 解析：先擦干再冲洗，防止放热灼伤。
811. 下列哪种方法属于爆炸性物品的销毁方法。()【单选】 □A. 石灰固化法 □B. 溶解法 □C. 填埋法 □D. 陶瓷化法 正确答案：B 解析：爆炸品可用溶解法销毁。
812. 氧化剂系指处于高氧化态，具有强氧化性，易分解出氧和 () 的物质。【单选】 □A. 热量 □B. 热源 □C. 热气 □D. 能量 正确答案：A 解析：氧化剂分解放出氧 + 热量。
813. 磷容器破裂失去水保护将会产生燃烧，此时应先戴好防毒面具，用工具将黄磷移放到完好的盛器中，切勿用手接触。污染处用石灰乳浸湿，再用水冲洗。被黄磷污染的用具，可用 () 硫酸铜溶液冲洗。【单选】 □A.5% □B.6% □C.7% □D.8% 正确答案：A 解析：使用5% 硫酸铜溶液处理磷污染。
814. 危险化学品运输企业的押运人员必须掌握危险化学品运输的安全知识，并经所在地 () 人民政府交通运输主管部门考核合格。【单选】 □A. 县级 □B. 设区市级 □C. 省级 □D. 国务院 正确答案：B 解析：押运员由设区市交通部门考核发证。
815. 防止危险化学品火灾、爆炸事故发生的基本原则包括防止燃烧、爆炸系统的形成，防止燃烧、爆炸系统形成的方法是 ()。【单选】 □A. 设置阻火装置 □B. 通风置换 □C. 控制明火和高温表面 □D. 防止摩擦和撞击产生火花 正确答案：B 解析：通风置换可消除可燃物积聚。
816. 毒害品和腐蚀品对人体都有一定危害，腐蚀品是通过皮肤接触使人体形成 ()。【单选】 □A. 化学烫伤 □B. 化学烧伤 □C. 化学灼伤 □D. 化学腐蚀 正确答案：C 解析：腐蚀品造成化学灼伤。
817. 凡确认不能使用的爆炸性物品，必须予以销毁，在销毁以前应报告当地 (), 选择适当的地点、时间及销毁方法。【单选】 □A. 环境保护部门 □B. 应急管理部门 □C. 公安部门 正确答案：C 解析：爆炸品销毁必须报公安部门批准。
818. 扑救遇湿易燃物品火灾时，可以使用的灭火剂不包括 ()。【单选】 □A. 干粉灭火器 □B. 二氧化碳灭火器 □C. 卤代烷灭火器 □D. 泡沫灭火器 正确答案：D 解析：遇湿易燃物严禁用泡沫、水。
819. 放射性物品应用专用运输搬运车和抬架搬运，装卸机械应按规定负荷降低 () 的装卸量。【单选】 □A.10% □B.15% □C.2% □D.25% 正确答案：D 解析：放射性物品装卸量降低 25%。
820. 根据《危险化学品安全管理条例》规定，剧毒化学品、易制爆危险化学品的销售企业、购买单位应当在销售、购买后 () 日内，将所销售、购买的剧毒化学品、易制爆危险化学品的品种、数量以及流向信息报所在地县级人民政府公安机关备案。【单选】 □A.15 □B.5 □C.10 正确答案：B 解析：剧毒 / 易制爆购销5 日内备案。
821. 通过道路运输剧毒化学品的，托运人应当向运输始发地或者目的地的 () 人民政府公安机关申请剧毒化学品道路运输通行证。【单选】 □A. 县级 □B. 市级 □C. 省级 □D. 国务院 正确答案：A 解析：向县级公安申请通行证。
822. 扑救遇湿易燃物品火灾时，如遇到钾、钠、铝、镁等物品发生火灾时，可以用 () 灭火剂。【单选】 □A. 水 □B. 干粉 □C. 二氧化碳 □D. 卤代烷 正确答案：B 解析：只能用干粉扑救。
823. 温度计碎裂，内部化学物质撒在地上时，正确的处理方式为先用 () 覆盖，然后集中处理。【单选】 □A. 水 □B. 沙子 □C. 泡沫 □D. 硫磺粉 正确答案：D 解析：水银泄漏先用硫磺粉覆盖反应。
824. 根据《危险化学品安全管理条例》, 危险化学品单位的 () 对本单位的危险化学品安全管理工作全面负责。【单选】 □A. 主要负责人 □B. 法人 □C. 安全负责人 □D. 技术负责人 正确答案：A 解析：主要负责人全面负责安全。
825. 有机过氧化物的废弃物处理方法不包括 ()。【单选】 □A. 爆炸 □B. 烧毁 □C. 分解 □D. 填埋 正确答案：A 解析：有机过氧化物废物严禁爆炸法处理。
826.() 是控制化学品危险化学品中毒、污染事故的首选方案。【单选】 □A. 隔离 □B. 变更工艺 □C. 替代 □D. 通风 正确答案：C 解析：替代是首选源头控制措施。
827. 下列对危险化学品运输安全技术描述不正确的是 ()。【单选】 □A. 托运危险物品只需出示安监部门的有关证明，不用在铁路、公路交通、航运等部门办理手续 □B. 危险物品的装卸人员，应按装运危险物品的性质，佩戴相应的防护用品，装卸时必须轻装轻卸 □C. 危险物品装卸前，应对车 (船) 搬运工具进行必要的通风和清扫，不得留有残碴 □D. 运输危险物品的车辆，必须保持安全车速，保持车距，严禁超车、超速和强行会车 正确答案：A 解析：必须向交通 / 铁路 / 航运部门办理手续。
828. 通过公路运输剧毒化学品的，托运人应当向 () 申请办理剧毒化学品公路运输通行证。【单选】 □A. 当地的省级人民政府安全监督管理部门 □B. 当地的市级人民政府安全监督管理部门 □C. 当地的县级人民政府公安部门 □D. 当地的市级人民政府公安部门 正确答案：C 解析：向县级公安申请。

943. 甲、乙类物品运输车的车库与民用建筑之间的防火间距不应小于 () m，与重要公共建筑之间的防火间距不应小于 () m。【单选】 □A.10，25 □B.25，50 □C.15，20 □D.25，25 正确答案：B 解析：甲、乙类物品运输车车库与民用建筑防火间距≥25m，与重要公共建筑≥50m。

945. 在作业场所液化气浓度较高时，应佩戴 ()。【单选】 □A. 面罩 □B. 防尘口罩 □C. 眼罩 □D. 防毒面具 正确答案：A 解析：液化气浓度高时需佩戴面罩，防止窒息中毒。
946. 电石和石灰是 ()。【单选】 □A. 腐蚀品 □B. 遇湿易燃物品 □C. 放射性物品 □D. 有毒品 正确答案：B 解析：电石、石灰遇水会发生化学反应并释放热量，属于遇湿易燃物品。
